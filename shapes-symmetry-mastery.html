lert`,[[`path`,{d:`m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3`,key:`wmoenq`}],[`path`,{d:`M12 9v4`,key:`juzpu7`}],[`path`,{d:`M12 17h.01`,key:`p32p05`}]]),xm=Q(`x`,[[`path`,{d:`M18 6 6 18`,key:`1bl5f8`}],[`path`,{d:`m6 6 12 12`,key:`d8bk6v`}]]),Sm={id:`symmetry-of-2d-shapes`,code:`8.1`,slug:`symmetry-of-2d-shapes`,title:`Identifying the symmetry of 2D shapes`,shortTitle:`Symmetry`,color:`berry`,summary:`Spot lines of symmetry and work out the order of rotational symmetry for any 2D shape — and discover that a shape can have one kind of symmetry, both, or neither.`,learningGoals:[`Identify the number of lines of symmetry a 2D shape has`,`Identify the order of rotational symmetry of a 2D shape`,`Recognise that line symmetry and rotational symmetry are independent of each other`],sections:[{id:`line-symmetry`,heading:`Lines of symmetry`,body:[`A shape has a **line of symmetry** if you can draw a straight line through it so that one side is the exact mirror image of the other.`,`Fold the shape along that line — the two halves must land exactly on top of each other. Some shapes have several lines of symmetry, and some have none at all.`,`Try it below: toggle the lines of symmetry on this regular hexagon.`],facts:[{title:`Quick check`,body:`If you can fold a shape in half and both halves match perfectly, the fold line is a line of symmetry.`}],visual:{kind:`shape-symmetry`,shapeId:`regular-hexagon`,mode:`lines`}},{id:`rotational-symmetry`,heading:`Rotational symmetry`,body:[`A shape has **rotational symmetry** if, when you rotate it less than a full turn about its centre, it looks exactly the same as it did before.`,`The **order** of rotational symmetry is how many times the shape matches its original position during one full 360° turn.`,`A shape that only matches itself after the complete 360° turn has **order 1** — in other words, no rotational symmetry at all.`],facts:[{title:`Order of rotational symmetry`,body:`Order 1 means "no rotational symmetry" — every shape technically matches itself after a full turn, so order 1 is the minimum possible.`}],visual:{kind:`shape-symmetry`,shapeId:`regular-pentagon`,mode:`rotation`}},{id:`independent-symmetries`,heading:`Line symmetry and rotational symmetry are independent`,body:[`It is tempting to assume that lots of lines of symmetry means lots of rotational symmetry too — but the two properties are separate, and a shape can have any combination of them.`,`This **S-shape** is a great example: rotate it 180° about its centre and it lands back on itself perfectly (rotational symmetry order 2) — but there is no line you can fold it along that makes the two halves match (0 lines of symmetry).`,`A kite is the opposite case: it has exactly 1 line of symmetry (the vertical line through its two unequal diagonals) but no rotational symmetry beyond the trivial 360° turn (order 1). A regular hexagon has both (6 lines, order 6). A scalene triangle has neither (0 lines, order 1).`],visual:{kind:`shape-symmetry`,shapeId:`s-shape`,mode:`both`}}],workedExamples:[{id:`we1`,title:`Lines of symmetry of a rectangle`,problem:`A rectangle is 2 units longer than it is wide. How many lines of symmetry does it have?`,visual:{kind:`shape-symmetry`,shapeId:`rectangle`,mode:`lines`},steps:[{label:`Try the horizontal fold`,detail:`Folding along the horizontal midline maps the top edge onto the bottom edge exactly — this is a line of symmetry.`},{label:`Try the vertical fold`,detail:`Folding along the vertical midline maps the left edge onto the right edge exactly — this is also a line of symmetry.`},{label:`Try a diagonal fold`,detail:`Because the rectangle is not a square, folding along a diagonal does NOT make the two halves match — the corners overshoot each other.`}],answer:`2 lines of symmetry (horizontal and vertical) — a non-square rectangle never has diagonal lines of symmetry.`},{id:`we2`,title:`Order of rotational symmetry of a regular hexagon`,problem:`What is the order of rotational symmetry of a regular hexagon?`,visual:{kind:`shape-symmetry`,shapeId:`regular-hexagon`,mode:`rotation`},steps:[{label:`Rotate by 60°`,detail:`A regular hexagon has 6 equal sides spaced evenly around the centre, so rotating by 360° ÷ 6 = 60° maps the hexagon exactly onto itself.`},{label:`Count the matches in a full turn`,detail:`Continuing to rotate by 60° each time, the hexagon matches its start position at 60°, 120°, 180°, 240°, 300° and 360° — six matches in total.`}],answer:`Order 6 — for any regular polygon, the order of rotational symmetry always equals the number of sides.`},{id:`we3`,title:`A shape with rotational symmetry but no line symmetry`,problem:`Does the S-shape shown have any lines of symmetry? What is its order of rotational symmetry?`,visual:{kind:`shape-symmetry`,shapeId:`s-shape`,mode:`both`},steps:[{label:`Test every possible fold line`,detail:`Checking horizontal, vertical and diagonal folds, none of them make the two halves of the S-shape match — so it has 0 lines of symmetry.`},{label:`Test a 180° rotation`,detail:`Rotating the S-shape by 180° about its centre point does map it exactly back onto itself.`}],answer:`0 lines of symmetry, but rotational symmetry of order 2 — line symmetry and rotational symmetry do not have to come together.`}],commonMistakes:[{id:`cm1`,student:`Ali`,scenario:`Ali is asked how many lines of symmetry a parallelogram has (one that is not a rectangle or a rhombus). He says "2, like a rectangle, because it has two pairs of parallel sides."`,wrongWorking:`Ali assumes that having parallel sides is enough to guarantee reflection symmetry, the way it does for a rectangle.`,wrongAnswer:`Ali's answer: 2 lines of symmetry.`,correctWorking:`A general parallelogram (not a rectangle or rhombus) has slanted sides of two different lengths meeting at angles that are not 90°. Folding it along either diagonal, or along the horizontal or vertical midline, never makes the two halves land on top of each other exactly.`,correctAnswer:`Correct answer: 0 lines of symmetry (it does still have rotational symmetry of order 2, though!).`,tip:`Having parallel sides is not enough on its own — always test the actual fold, don't assume from the general shape category.`},{id:`cm2`,student:`Sofia`,scenario:`Sofia is told a shape has "rotational symmetry of order 1" and concludes "so it must have 1 line of symmetry too."`,wrongWorking:`Sofia assumes the order number for rotational symmetry tells you the number of lines of symmetry.`,wrongAnswer:`Sofia's answer: the shape has 1 line of symmetry.`,correctWorking:`Order 1 rotational symmetry actually means the shape has NO rotational symmetry (it only matches itself after the trivial full 360° turn). This tells you nothing at all about lines of symmetry — a shape with order 1 could have 0, 1, or more lines of symmetry.`,correctAnswer:`Correct answer: you cannot tell the number of lines of symmetry from the rotational order — they must be checked separately.`,tip:`Line symmetry and rotational symmetry are two completely separate properties. Always check each one on its own.`}],practiceQuestions:[{id:`s1q1`,lessonId:`symmetry-of-2d-shapes`,type:`mcq`,category:`skill`,prompt:`How many lines of symmetry does a square have?`,choices:[{id:`a`,label:`1`},{id:`b`,label:`2`},{id:`c`,label:`4`},{id:`d`,label:`8`}],correctChoiceId:`c`,explanation:`A square has 4 lines of symmetry: the horizontal midline, the vertical midline, and both diagonals.`,visual:{kind:`shape-symmetry`,shapeId:`square`,mode:`lines`}},{id:`s1q2`,lessonId:`symmetry-of-2d-shapes`,type:`mcq`,category:`skill`,prompt:`What is the order of rotational symmetry of an equilateral triangle?`,choices:[{id:`a`,label:`1`},{id:`b`,label:`2`},{id:`c`,label:`3`},{id:`d`,label:`6`}],correctChoiceId:`c`,explanation:`Rotating an equilateral triangle by 360° ÷ 3 = 120° maps it exactly onto itself, and this happens 3 times in a full turn — order 3.`,visual:{kind:`shape-symmetry`,shapeId:`equilateral-triangle`,mode:`rotation`}},{id:`s1q3`,lessonId:`symmetry-of-2d-shapes`,type:`true-false`,category:`skill`,prompt:`True or false: a regular pentagon has 5 lines of symmetry.`,trueFalseAnswer:!0,explanation:`True — every regular polygon has as many lines of symmetry as it has sides, so a regular pentagon has 5.`,visual:{kind:`shape-symmetry`,shapeId:`regular-pentagon`,mode:`lines`}},{id:`s1q4`,lessonId:`symmetry-of-2d-shapes`,type:`true-false`,category:`error-analysis`,prompt:`True or false: a parallelogram (that is not a rectangle or a rhombus) has at least one line of symmetry.`,trueFalseAnswer:!1,hint:`Try the toggle below — can you find a fold line that actually works?`,explanation:`False — a general parallelogram has 0 lines of symmetry, even though it does have rotational symmetry of order 2. Try toggling the lines of symmetry on the diagram — none of them work.`,visual:{kind:`shape-symmetry`,shapeId:`parallelogram`,mode:`both`}},{id:`s1q5`,lessonId:`symmetry-of-2d-shapes`,type:`numeric`,category:`skill`,prompt:`What is the order of rotational symmetry of a regular octagon?`,correctAnswer:`8`,explanation:`A regular octagon has 8 sides, and for any regular polygon the order of rotational symmetry equals the number of sides — so the order is 8.`,visual:{kind:`shape-symmetry`,shapeId:`regular-octagon`,mode:`rotation`}},{id:`s1q6`,lessonId:`symmetry-of-2d-shapes`,type:`matching`,category:`application`,prompt:`Match each shape to its number of lines of symmetry.`,matchPairs:[{id:`p1`,left:`Square`,right:`4`},{id:`p2`,left:`Kite`,right:`1`},{id:`p3`,left:`Scalene triangle`,right:`0`},{id:`p4`,left:`Regular hexagon`,right:`6`}],explanation:`A square has 4 lines of symmetry, a kite has 1 (through its axis of symmetry), a scalene triangle has 0 (all its sides and angles are different), and a regular hexagon has 6.`},{id:`s1q7`,lessonId:`symmetry-of-2d-shapes`,type:`order`,category:`application`,prompt:`Order these shapes from the FEWEST lines of symmetry to the MOST.`,orderItems:[{id:`o1`,label:`Scalene triangle (0 lines)`},{id:`o2`,label:`Kite (1 line)`},{id:`o3`,label:`Rectangle (2 lines)`},{id:`o4`,label:`Square (4 lines)`}],correctOrder:[`o1`,`o2`,`o3`,`o4`],explanation:`From fewest to most lines of symmetry: scalene triangle (0), kite (1), rectangle (2), square (4).`},{id:`s1q8`,lessonId:`symmetry-of-2d-shapes`,type:`true-false`,category:`error-analysis`,prompt:`True or false: an isosceles triangle that is not equilateral has rotational symmetry of order 2.`,trueFalseAnswer:!1,explanation:`False — an isosceles (non-equilateral) triangle has rotational symmetry of order 1 (none). It does have 1 line of symmetry, but that is a different property from rotational order.`,visual:{kind:`shape-symmetry`,shapeId:`isosceles-triangle`,mode:`rotation`}},{id:`s1q9`,lessonId:`symmetry-of-2d-shapes`,type:`mcq`,category:`challenge`,prompt:`Which of these shapes has rotational symmetry but NO lines of symmetry?`,choices:[{id:`a`,label:`Kite`},{id:`b`,label:`Rectangle`},{id:`c`,label:`S-shape`},{id:`d`,label:`Square`}],correctChoiceId:`c`,explanation:`The S-shape has rotational symmetry of order 2 but 0 lines of symmetry. The kite has a line but no rotation; the rectangle and square have both.`,hint:`Rule out any shape that has a line of symmetry first.`}]},Cm={id:`circles-and-polygons`,code:`8.2`,slug:`circles-and-polygons`,title:`Circles and polygons`,shortTitle:`Circles & Polygons`,color:`cobalt`,summary:`Name the parts of a circle, tell chords apart from tangents, and discover the properties that make a polygon "regular".`,learningGoals:[`Identify and name the parts of a circle: centre, radius, diameter, chord, tangent and circumference`,`Understand that a tangent meets the circle at exactly one point, at right angles to the radius`,`Identify the properties of regular polygons, including interior and exterior angles`],sections:[{id:`circle-parts`,heading:`Parts of a circle`,body:[`The **centre** is the point in the exact middle of the circle.`,`The **radius** is the distance (or a line segment) from the centre to any point on the circle.`,`The **diameter** is a line segment that passes through the centre and joins two points on the circle. The diameter is always exactly twice the radius.`],facts:[{title:`Remember`,body:`diameter = 2 × radius, always — for every circle, no matter its size.`}],visual:{kind:`circle`,parts:[`centre`,`radius`,`diameter`]}},{id:`chords-and-tangents`,heading:`Chords and tangents`,body:[`A **chord** is a straight line joining any two points on a circle. Unlike a diameter, a chord does not have to pass through the centre.`,`A **tangent** is a straight line that touches the circle at exactly one point, without crossing into the circle at all.`,`A tangent always meets the radius drawn to that touching point at a right angle (90°) — this is one of the most useful facts in circle geometry.`],facts:[{title:`Tangent fact`,body:`A tangent is always perpendicular to the radius at the point where it touches the circle.`}],visual:{kind:`circle`,parts:[`chord`,`tangent`]}},{id:`regular-polygons`,heading:`Regular polygons`,body:[`A polygon is **regular** if all of its sides are the same length AND all of its interior angles are the same size.`,`The interior angles of any polygon with n sides always add up to (n − 2) × 180°. For a regular polygon, dividing that total by n gives the size of each individual interior angle.`,`A regular polygon with n sides also always has n lines of symmetry and rotational symmetry of order n.`],facts:[{title:`Worked totals`,body:`Triangle: 180°. Quadrilateral: 360°. Pentagon: 540°. Hexagon: 720°. Heptagon: 900°. Octagon: 1080°.`}],visual:{kind:`regular-polygon`,shapeId:`regular-hexagon`}}],workedExamples:[{id:`we1`,title:`Naming a line on a circle`,problem:`A straight line touches a circle at exactly one point and does not cross into the circle. What is this line called, and what angle does it make with the radius at that point?`,visual:{kind:`circle`,parts:[`radius`,`tangent`]},steps:[{label:`Check how many points it meets`,detail:`The line meets the circle at exactly one point, not two — this rules out "chord" and "diameter", which both join two points.`},{label:`Name the line`,detail:`A line meeting a circle at exactly one point is called a tangent.`},{label:`Recall the angle fact`,detail:`A tangent always meets the radius to that point at a right angle.`}],answer:`It is a tangent, and it meets the radius at 90°.`},{id:`we2`,title:`Interior angle of a regular octagon`,problem:`A regular octagon has 8 sides. What is the size of each interior angle?`,visual:{kind:`regular-polygon`,shapeId:`regular-octagon`},steps:[{label:`Find the angle sum`,detail:`For n = 8 sides, the interior angles sum to (n − 2) × 180° = 6 × 180° = 1080°.`},{label:`Divide equally`,detail:`Because the octagon is regular, all 8 interior angles are equal, so each one is 1080° ÷ 8 = 135°.`}],answer:`Each interior angle of a regular octagon is 135°.`}],commonMistakes:[{id:`cm1`,student:`Omar`,scenario:`Omar labels the line segment that joins two points on a circle — but does NOT pass through the centre — as a "diameter".`,wrongWorking:`Omar sees a straight line with both ends touching the circle and assumes any such line must be a diameter.`,wrongAnswer:`Omar's answer: it's a diameter.`,correctWorking:`A diameter must pass through the centre of the circle. A line joining two points on a circle that does NOT pass through the centre is called a chord instead — a diameter is really just a special chord that happens to pass through the centre.`,correctAnswer:`Correct answer: it's a chord (not a diameter), because it doesn't pass through the centre.`,tip:`Always check whether the line passes through the centre before calling it a diameter — if not, it's a chord.`},{id:`cm2`,student:`Zara`,scenario:`Zara says a regular polygon "just needs equal sides" and doesn't worry about the angles when identifying one.`,wrongWorking:`Zara looks only at the side lengths of a shape and assumes that equal sides alone makes it regular.`,wrongAnswer:`Zara's answer: a rhombus is a regular polygon because all 4 sides are equal.`,correctWorking:`A regular polygon needs BOTH equal sides AND equal angles. A rhombus has 4 equal sides, but its angles usually are not all equal (two are larger, two are smaller) — so most rhombuses are not regular, even though a square (which is a special rhombus) is.`,correctAnswer:`Correct answer: a shape is only regular if its sides AND its angles are all equal.`,tip:`Always check both conditions — equal sides and equal angles — before calling a polygon regular.`}],practiceQuestions:[{id:`s2q1`,lessonId:`circles-and-polygons`,type:`mcq`,category:`skill`,prompt:`What is the name for a line segment from the centre of a circle to any point on the circle?`,choices:[{id:`a`,label:`Diameter`},{id:`b`,label:`Radius`},{id:`c`,label:`Chord`},{id:`d`,label:`Tangent`}],correctChoiceId:`b`,explanation:`The radius is the segment from the centre to any point on the circle.`,visual:{kind:`circle`,parts:[`centre`,`radius`]}},{id:`s2q2`,lessonId:`circles-and-polygons`,type:`mcq`,category:`skill`,prompt:`A line touches a circle at exactly one point and does not cross into the circle. What is it called?`,choices:[{id:`a`,label:`Chord`},{id:`b`,label:`Diameter`},{id:`c`,label:`Tangent`},{id:`d`,label:`Radius`}],correctChoiceId:`c`,explanation:`A tangent touches a circle at exactly one point without crossing into it.`,visual:{kind:`circle`,parts:[`tangent`]}},{id:`s2q3`,lessonId:`circles-and-polygons`,type:`true-false`,category:`skill`,prompt:`True or false: every diameter of a circle is also a chord.`,trueFalseAnswer:!0,explanation:`True — a diameter is simply a chord that happens to pass through the centre, so every diameter is a chord, but not every chord is a diameter.`},{id:`s2q4`,lessonId:`circles-and-polygons`,type:`true-false`,category:`error-analysis`,prompt:`True or false: a line joining two points on a circle that does NOT pass through the centre is still called a diameter.`,trueFalseAnswer:!1,explanation:`False — a line joining two points on a circle that does not pass through the centre is a chord, not a diameter. This is the exact mistake Omar made.`},{id:`s2q5`,lessonId:`circles-and-polygons`,type:`numeric`,category:`application`,prompt:`A tangent meets the radius of a circle at its point of contact. What angle (in degrees) do they make?`,correctAnswer:`90`,acceptedAnswers:[`90°`,`ninety`],explanation:`A tangent always meets the radius at a right angle — 90°.`,visual:{kind:`circle`,parts:[`radius`,`tangent`]}},{id:`s2q6`,lessonId:`circles-and-polygons`,type:`numeric`,category:`application`,prompt:`What is the sum of the interior angles of a regular pentagon (5 sides)?`,correctAnswer:`540`,acceptedAnswers:[`540°`],explanation:`For n = 5: (n − 2) × 180° = 3 × 180° = 540°.`,visual:{kind:`regular-polygon`,shapeId:`regular-pentagon`}},{id:`s2q7`,lessonId:`circles-and-polygons`,type:`fill-blank`,category:`application`,prompt:`Each interior angle of a regular hexagon is _____ degrees.`,correctAnswer:`120`,acceptedAnswers:[`120°`],explanation:`Sum of interior angles = (6 − 2) × 180° = 720°. Shared equally between 6 angles: 720° ÷ 6 = 120°.`,visual:{kind:`regular-polygon`,shapeId:`regular-hexagon`}},{id:`s2q8`,lessonId:`circles-and-polygons`,type:`matching`,category:`skill`,prompt:`Match each circle term to its definition.`,matchPairs:[{id:`p1`,left:`Radius`,right:`Centre to edge`},{id:`p2`,left:`Diameter`,right:`Edge to edge, through the centre`},{id:`p3`,left:`Chord`,right:`Edge to edge, not through the centre`},{id:`p4`,left:`Tangent`,right:`Touches at one point only`}],explanation:`Radius (centre to edge), diameter (edge to edge through the centre), chord (edge to edge, not through the centre), tangent (touches at exactly one point).`},{id:`s2q9`,lessonId:`circles-and-polygons`,type:`mcq`,category:`error-analysis`,prompt:`Zara says a rhombus (that is not a square) is a regular polygon because all 4 sides are equal. What is missing from her reasoning?`,choices:[{id:`a`,label:`Nothing — she is correct`},{id:`b`,label:`A regular polygon also needs all angles equal, which a non-square rhombus does not have`},{id:`c`,label:`A rhombus can never have equal sides`},{id:`d`,label:`Regular polygons must have curved sides`}],correctChoiceId:`b`,explanation:`A regular polygon needs equal sides AND equal angles. A non-square rhombus has 4 equal sides but unequal angles, so it is not regular.`},{id:`s2q10`,lessonId:`circles-and-polygons`,type:`numeric`,category:`challenge`,prompt:`A regular polygon has an exterior angle of 45°. How many sides does it have?`,correctAnswer:`8`,explanation:`The exterior angles of any polygon add up to 360°, and for a regular polygon each one is equal, so the number of sides = 360° ÷ 45° = 8. This is a regular octagon.`,hint:`The exterior angles of any polygon always add up to 360°.`}]},wm={id:`congruent-shapes`,code:`8.3`,slug:`congruent-shapes`,title:`Recognising congruent shapes`,shortTitle:`Congruent Shapes`,color:`coral`,summary:`Learn what it really means for two shapes to be congruent, why rotating or reflecting a shape never changes that, and how to check every corresponding side and angle.`,learningGoals:[`Understand that congruent shapes have exactly the same size and shape`,`Recognise that congruent shapes may be rotated or reflected compared to each other`,`Check corresponding sides and angles to decide whether two shapes are congruent`],sections:[{id:`what-is-congruent`,heading:`What does "congruent" mean?`,body:[`Two shapes are **congruent** if they are exactly the same size and the exact same shape — every corresponding side has the same length, and every corresponding angle has the same size.`,`If you could cut one shape out and place it exactly on top of the other (possibly after turning it or flipping it over), they are congruent.`],facts:[{title:`Definition`,body:`Congruent shapes: same size AND same shape — every corresponding side and angle matches exactly.`}],visual:{kind:`congruent-pair`,pairId:`right-triangles-match`}},{id:`orientation-does-not-matter`,heading:`Congruent shapes can be rotated or reflected`,body:[`Two shapes do not have to be sitting in the same position or facing the same way to be congruent — congruence is only about size and shape, not orientation.`,`Below, rectangle WXYZ has been turned 90° compared with rectangle ABCD. It looks different at first glance, but every corresponding side is still exactly the same length, so the two rectangles ARE congruent.`],visual:{kind:`congruent-pair`,pairId:`rectangles-match`}},{id:`checking-every-measurement`,heading:`Always check every corresponding measurement`,body:[`It is not enough for just one or two measurements to match — every corresponding side and every corresponding angle must be equal for two shapes to be congruent.`,`The two triangles below share two matching sides (8 cm and 6 cm) — but the third side is 10 cm on one triangle and only 9.5 cm on the other. Because that one measurement does not match, the triangles are NOT congruent, even though they look very similar.`],visual:{kind:`congruent-pair`,pairId:`right-triangles-mismatch`}}],workedExamples:[{id:`we1`,title:`Using congruence to find a missing side and angle`,problem:`Triangle ABC is congruent to triangle DEF, with correspondence A↔D, B↔E, C↔F. In triangle ABC: AB = 5.8 cm, BC = 5.5 cm, CA = 6.1 cm, ∠A = 55°, ∠B = 65°, ∠C = 60°. In triangle DEF, only DE = 5.8 cm and ∠D = 55° are marked. Find EF and ∠E.`,visual:{kind:`congruent-pair`,pairId:`labeled-triangles`},steps:[{label:`Match up the corresponding letters`,detail:`Because ABC ↔ DEF, side AB corresponds to side DE, side BC corresponds to side EF, and side CA corresponds to side FD. Angle A corresponds to angle D, angle B to angle E, and angle C to angle F.`},{label:`Find EF`,detail:`EF corresponds to BC, and BC = 5.5 cm, so EF must also be 5.5 cm.`},{label:`Find ∠E`,detail:`∠E corresponds to ∠B, and ∠B = 65°, so ∠E must also be 65°.`}],answer:`EF = 5.5 cm and ∠E = 65° — every corresponding pair in congruent triangles must be equal.`},{id:`we2`,title:`Explaining why two arrow shapes are not congruent`,problem:`These two arrow shapes look very similar, and the second one has simply been rotated 180°. Are they congruent?`,visual:{kind:`congruent-pair`,pairId:`arrows-mismatch`},steps:[{label:`Check the overall outline`,detail:`At a glance, both arrows point the same general way once you account for the rotation, so it is tempting to say yes.`},{label:`Check every corresponding side`,detail:`Comparing each side of the first arrow to the matching side of the second (after undoing the rotation), the lower "spur" of the second arrow is shorter than the first arrow's.`}],answer:`No — they are not congruent. Even though the overall shape looks similar and the rotation is a red herring, one pair of corresponding sides does not match.`}],commonMistakes:[{id:`cm1`,student:`Marcus`,scenario:`Marcus is shown two triangles that are identical in size and shape, but one has been rotated in the picture. He says "those can't be congruent, they're facing different ways."`,wrongWorking:`Marcus judges congruence by how the shapes are arranged on the page, rather than by their actual measurements.`,wrongAnswer:`Marcus's answer: not congruent, because they look different in the picture.`,correctWorking:`Congruence only depends on side lengths and angles, not on rotation or reflection. Turning or flipping a shape never changes its side lengths or angles, so it stays congruent to the original.`,correctAnswer:`Correct answer: the triangles ARE congruent — rotating a shape never affects whether it is congruent to another.`,tip:`Ignore how a shape is turned or flipped in a picture — compare the actual measurements instead.`},{id:`cm2`,student:`Sofia`,scenario:`Sofia compares two triangles, sees that one pair of corresponding sides matches (both 8 cm), and immediately says "that's enough — they're congruent."`,wrongWorking:`Sofia stops checking after finding just one matching measurement.`,wrongAnswer:`Sofia's answer: congruent, because one side matches.`,correctWorking:`One matching side is not enough — you have to check every corresponding side and angle. Two triangles can share one identical side while still having different overall shapes.`,correctAnswer:`Correct answer: you must check ALL corresponding sides and angles before concluding two shapes are congruent.`,tip:`Never stop at the first matching measurement — congruence requires every corresponding side and angle to match.`}],practiceQuestions:[{id:`s3q1`,lessonId:`congruent-shapes`,type:`true-false`,category:`skill`,prompt:`Look at these two triangles. Are they congruent?`,visual:{kind:`congruent-pair`,pairId:`right-triangles-match`,revealVerdict:!1},trueFalseAnswer:!0,explanation:`Yes — every corresponding side matches (8 cm, 10 cm, 6 cm), even though the second triangle has been rotated.`},{id:`s3q2`,lessonId:`congruent-shapes`,type:`true-false`,category:`skill`,prompt:`Look at these two triangles. Are they congruent?`,visual:{kind:`congruent-pair`,pairId:`right-triangles-mismatch`,revealVerdict:!1},trueFalseAnswer:!1,hint:`Compare every side, not just the first two you notice.`,explanation:`No — two sides match (8 cm and 6 cm) but the third side is 10 cm on one triangle and 9.5 cm on the other.`},{id:`s3q3`,lessonId:`congruent-shapes`,type:`mcq`,category:`application`,prompt:`Rectangle WXYZ has been rotated 90° compared with rectangle ABCD, but both have side lengths 9 cm and 4 cm. Why are they congruent?`,choices:[{id:`a`,label:`They are not congruent, because they face different directions`},{id:`b`,label:`Because every corresponding side length matches — rotation does not affect congruence`},{id:`c`,label:`Because both shapes are rectangles`},{id:`d`,label:`Because they have the same area only`}],correctChoiceId:`b`,explanation:`Rotating a shape never changes its side lengths or angles, so as long as every corresponding measurement matches, the shapes are congruent.`,visual:{kind:`congruent-pair`,pairId:`rectangles-match`,revealVerdict:!1}},{id:`s3q4`,lessonId:`congruent-shapes`,type:`numeric`,category:`application`,prompt:`Triangle ABC is congruent to triangle DEF (A↔D, B↔E, C↔F). AB = 5.8 cm, BC = 5.5 cm, CA = 6.1 cm. What is the length of EF?`,correctAnswer:`5.5`,acceptedAnswers:[`5.5cm`,`5.5 cm`],explanation:`EF corresponds to BC (since B↔E and C↔F), and BC = 5.5 cm, so EF = 5.5 cm.`,visual:{kind:`congruent-pair`,pairId:`labeled-triangles`}},{id:`s3q5`,lessonId:`congruent-shapes`,type:`numeric`,category:`application`,prompt:`Using the same triangles ABC ≅ DEF (A↔D, B↔E, C↔F) with CA = 6.1 cm, what is the length of FD?`,correctAnswer:`6.1`,acceptedAnswers:[`6.1cm`,`6.1 cm`],explanation:`FD corresponds to CA (since C↔F and A↔D), and CA = 6.1 cm, so FD = 6.1 cm.`,visual:{kind:`congruent-pair`,pairId:`labeled-triangles`}},{id:`s3q6`,lessonId:`congruent-shapes`,type:`fill-blank`,category:`application`,prompt:`Using the same triangles ABC ≅ DEF, with ∠B = 65°, ∠E = _____°.`,correctAnswer:`65`,acceptedAnswers:[`65°`],explanation:`∠E corresponds to ∠B (since B↔E), so ∠E = 65°.`},{id:`s3q7`,lessonId:`congruent-shapes`,type:`fill-blank`,category:`application`,prompt:`Using the same triangles ABC ≅ DEF, with ∠C = 60°, ∠F = _____°.`,correctAnswer:`60`,acceptedAnswers:[`60°`],explanation:`∠F corresponds to ∠C (since C↔F), so ∠F = 60°.`},{id:`s3q8`,lessonId:`congruent-shapes`,type:`true-false`,category:`error-analysis`,prompt:`Marcus says two identical triangles can't be congruent if one of them has been rotated in the picture. Is he correct?`,trueFalseAnswer:!1,explanation:`No — rotating (or reflecting) a shape never changes its side lengths or angles, so it remains congruent to the original.`},{id:`s3q9`,lessonId:`congruent-shapes`,type:`matching`,category:`application`,prompt:`Match each description to the correct conclusion about congruence.`,matchPairs:[{id:`p1`,left:`All 3 corresponding sides equal`,right:`Definitely congruent (SSS)`},{id:`p2`,left:`Only 2 of 3 corresponding sides equal`,right:`Not enough evidence to be sure`},{id:`p3`,left:`Same shape, just rotated 90°`,right:`Still congruent — rotation doesn't matter`},{id:`p4`,left:`Same shape, but one side is longer`,right:`Not congruent — a measurement doesn't match`}],explanation:`Congruence requires every corresponding side and angle to match — rotation or reflection alone never breaks congruence, but any mismatched measurement does.`},{id:`s3q10`,lessonId:`congruent-shapes`,type:`mcq`,category:`challenge`,prompt:`Sofia checks one pair of corresponding sides, finds they match, and concludes the two shapes are congruent. What is wrong with her reasoning?`,choices:[{id:`a`,label:`Nothing — one matching side is always enough`},{id:`b`,label:`She should check every corresponding side and angle before concluding congruence`},{id:`c`,label:`She should only check the angles, never the sides`},{id:`d`,label:`Congruence cannot be checked using measurements at all`}],correctChoiceId:`b`,explanation:`One matching measurement is not enough — every corresponding side and angle must match for two shapes to be truly congruent.`}]},Tm={id:`3d-shapes`,code:`8.4`,slug:`3d-shapes`,title:`3D shapes`,shortTitle:`3D Shapes`,color:`teal`,summary:`Identify and describe 3D shapes by their faces, edges and vertices, and learn to draw and recognise the front, side and top views of a solid.`,learningGoals:[`Identify and name common 3D shapes, including prisms and pyramids`,`Describe a 3D shape using the number of faces, edges and vertices it has`,`Draw and recognise the front, side and top views of a 3D shape`],sections:[{id:`naming-3d-shapes`,heading:`Naming 3D shapes`,body:[`Beyond the cube and cuboid, there are many named 3D shapes you should recognise: the **tetrahedron** (a triangular-based pyramid with 4 triangular faces), the **square-based pyramid**, the **sphere**, **cone** and **cylinder**, the **octahedron** (8 triangular faces), and a whole family of **prisms** — solids with two congruent, parallel end faces joined by rectangles.`,`A prism is always named after the shape of its two end faces: a triangular prism has triangular ends, a pentagonal prism has pentagonal ends, and so on.`],visual:{kind:`solid`,solidId:`hexagonal-prism`}},{id:`faces-edges-vertices`,heading:`Faces, edges and vertices`,body:[`A **face** is a flat (or curved) surface of a 3D shape. An **edge** is a line where two faces meet. A **vertex** (plural: vertices) is a corner, where edges meet.`,`For any solid made only of flat polygon faces, Euler's rule always holds: faces + vertices − edges = 2. A cube, for example, has 6 faces, 8 vertices and 12 edges: 6 + 8 − 12 = 2. ✓`,`Shapes with curved surfaces (spheres, cones, cylinders) are usually described in terms of their curved and flat surfaces instead, since edges and vertices are counted differently for them.`],facts:[{title:`Euler's rule`,body:`For any solid with only flat polygon faces: faces + vertices − edges = 2.`}],visual:{kind:`solid`,solidId:`square-pyramid`}},{id:`views-of-3d-shapes`,heading:`Front, side and top views`,body:[`The **top view** (sometimes called the plan) is what you see looking straight down from above. The **front view** is what you see looking at the shape from the front. The **side view** is what you see looking at the shape from the side.`,`Take a hexagonal prism lying on its side: looking at the front, you see a hexagon (the end face). Looking from the top, you see one long rectangle with two smaller rectangles beside it. Looking from the side, you see two rectangles.`],visual:{kind:`three-view`,viewId:`hexagonal-prism`}}],workedExamples:[{id:`we1`,title:`Identifying a solid from its properties`,problem:`A solid has eight faces: two of them are congruent regular hexagons, and six of them are congruent rectangles. It has twelve vertices and eighteen edges. What shape is it, and what do its top, front and side views look like?`,visual:{kind:`solid`,solidId:`hexagonal-prism`},steps:[{label:`Identify the shape`,detail:`Two hexagonal faces joined by six rectangles is a hexagonal prism — the hexagons form the front and back, and the rectangles join them all the way around.`},{label:`Check the vertex count`,detail:`A hexagon has 6 vertices, so with one at the front and one at the back, that's 6 + 6 = 12 vertices in total — matches.`},{label:`Check the edge count`,detail:`There are 6 edges around the front hexagon, 6 around the back hexagon, and 6 more horizontal edges joining front to back: 6 + 6 + 6 = 18 edges — matches.`},{label:`Draw the three views`,detail:`Front view: a hexagon. Top view: one long rectangle with two smaller rectangles alongside it. Side view: two rectangles.`}],answer:`It's a hexagonal prism — see the three views above.`},{id:`we2`,title:`Faces, edges and vertices of a square-based pyramid`,problem:`A square-based pyramid has a square base and four triangular faces meeting at an apex. How many faces, edges and vertices does it have?`,visual:{kind:`solid`,solidId:`square-pyramid`},steps:[{label:`Count the faces`,detail:`1 square base + 4 triangular faces = 5 faces.`},{label:`Count the vertices`,detail:`4 corners of the square base + 1 apex at the top = 5 vertices.`},{label:`Check with Euler's rule`,detail:`Faces + vertices − edges = 2, so edges = faces + vertices − 2 = 5 + 5 − 2 = 8.`}],answer:`5 faces, 5 vertices, 8 edges.`}],commonMistakes:[{id:`cm1`,student:`Priya`,scenario:`Priya is asked how many edges a cube has. She counts the 8 corners and says "8 edges."`,wrongWorking:`Priya counts the vertices (corners) of the cube instead of the edges (the lines between faces).`,wrongAnswer:`Priya's answer: 8 edges.`,correctWorking:`A cube has 8 vertices, but 12 edges — 4 edges around the top face, 4 around the bottom face, and 4 vertical edges joining them.`,correctAnswer:`Correct answer: a cube has 12 edges (and 8 vertices, and 6 faces).`,tip:`Edges are the lines where two faces meet — count them separately from the corners (vertices).`},{id:`cm2`,student:`Jayden`,scenario:`Jayden says the front view of a cylinder (lying flat, viewed from the side of the room) is a circle.`,wrongWorking:`Jayden mixes up the top view (looking down onto one of the circular ends) with the front view (looking at the curved side).`,wrongAnswer:`Jayden's answer: the front view is a circle.`,correctWorking:`Looking at a cylinder from the front (or the side), you see a rectangle — it is only the TOP view, looking straight down onto one of its circular ends, that shows a circle.`,correctAnswer:`Correct answer: the front view (and the side view) of a cylinder is a rectangle; only the top view is a circle.`,tip:`Always double-check which direction you are viewing from — "top", "front" and "side" each show a different silhouette.`}],practiceQuestions:[{id:`s4q1`,lessonId:`3d-shapes`,type:`mcq`,category:`skill`,prompt:`How many faces does a cube have?`,choices:[{id:`a`,label:`4`},{id:`b`,label:`6`},{id:`c`,label:`8`},{id:`d`,label:`12`}],correctChoiceId:`b`,explanation:`A cube has 6 square faces.`,visual:{kind:`solid`,solidId:`cube`}},{id:`s4q2`,lessonId:`3d-shapes`,type:`numeric`,category:`skill`,prompt:`How many edges does a cube have?`,correctAnswer:`12`,explanation:`A cube has 12 edges: 4 around the top face, 4 around the bottom face, and 4 vertical edges joining them.`,visual:{kind:`solid`,solidId:`cube`}},{id:`s4q3`,lessonId:`3d-shapes`,type:`numeric`,category:`skill`,prompt:`How many vertices does a square-based pyramid have?`,correctAnswer:`5`,explanation:`A square-based pyramid has 4 vertices around the square base plus 1 apex at the top = 5 vertices.`,visual:{kind:`solid`,solidId:`square-pyramid`}},{id:`s4q4`,lessonId:`3d-shapes`,type:`true-false`,category:`skill`,prompt:`True or false: a sphere has one curved surface and no edges or vertices.`,trueFalseAnswer:!0,explanation:`True — a sphere is a single curved surface with no flat faces, edges or corners at all.`,visual:{kind:`solid`,solidId:`sphere`}},{id:`s4q5`,lessonId:`3d-shapes`,type:`true-false`,category:`error-analysis`,prompt:`True or false: a cylinder has two edges and two vertices.`,trueFalseAnswer:!1,hint:`Vertices are corners — does a cylinder have any sharp corners?`,explanation:`False — a cylinder has two (curved) edges where the circular faces meet the curved surface, but it has NO vertices at all, since it has no sharp corners.`,visual:{kind:`solid`,solidId:`cylinder`}},{id:`s4q6`,lessonId:`3d-shapes`,type:`mcq`,category:`application`,prompt:`Which 3D shape has 4 faces, all of which are congruent equilateral triangles?`,choices:[{id:`a`,label:`Square-based pyramid`},{id:`b`,label:`Tetrahedron`},{id:`c`,label:`Octahedron`},{id:`d`,label:`Cube`}],correctChoiceId:`b`,explanation:`A tetrahedron (triangular-based pyramid) has 4 faces, all congruent equilateral triangles, with 4 vertices and 6 edges.`,visual:{kind:`solid`,solidId:`tetrahedron`}},{id:`s4q7`,lessonId:`3d-shapes`,type:`fill-blank`,category:`application`,prompt:`A hexagonal prism has _____ faces in total.`,correctAnswer:`8`,explanation:`2 hexagonal end faces + 6 rectangular side faces = 8 faces.`,visual:{kind:`solid`,solidId:`hexagonal-prism`}},{id:`s4q8`,lessonId:`3d-shapes`,type:`matching`,category:`application`,prompt:`Match each 3D shape to its number of faces.`,matchPairs:[{id:`p1`,left:`Cube`,right:`6`},{id:`p2`,left:`Tetrahedron`,right:`4`},{id:`p3`,left:`Square-based pyramid`,right:`5`},{id:`p4`,left:`Hexagonal prism`,right:`8`}],explanation:`Cube: 6 faces. Tetrahedron: 4 faces. Square-based pyramid: 5 faces. Hexagonal prism: 8 faces.`},{id:`s4q9`,lessonId:`3d-shapes`,type:`mcq`,category:`challenge`,prompt:`For a cylinder lying on a table, which view looks like a circle?`,choices:[{id:`a`,label:`Top view`},{id:`b`,label:`Front view`},{id:`c`,label:`Side view`},{id:`d`,label:`None of these`}],correctChoiceId:`a`,explanation:`Looking straight down from above (the top view) shows one of the circular end faces. The front and side views both show a rectangle.`},{id:`s4q10`,lessonId:`3d-shapes`,type:`numeric`,category:`challenge`,prompt:`Using Euler's rule (faces + vertices − edges = 2), a solid has 5 faces and 5 vertices. How many edges must it have?`,correctAnswer:`8`,explanation:`5 + 5 − edges = 2, so edges = 5 + 5 − 2 = 8 (this describes a square-based pyramid).`,hint:`Rearrange: edges = faces + vertices − 2.`}]},Em=[{id:`fq1`,lessonId:`final`,type:`mcq`,category:`skill`,prompt:`How many lines of symmetry does a regular octagon have?`,choices:[{id:`a`,label:`4`},{id:`b`,label:`6`},{id:`c`,label:`8`},{id:`d`,label:`16`}],correctChoiceId:`c`,explanation:`Every regular polygon has as many lines of symmetry as it has sides — a regular octagon has 8 sides, so it has 8 lines of symmetry.`,visual:{kind:`shape-symmetry`,shapeId:`regular-octagon`,mode:`lines`}},{id:`fq2`,lessonId:`final`,type:`numeric`,category:`skill`,prompt:`What is the order of rotational symmetry of a rectangle that is not a square?`,correctAnswer:`2`,explanation:`A non-square rectangle matches itself after a 180° turn and again after a full 360° turn — order 2.`,visual:{kind:`shape-symmetry`,shapeId:`rectangle`,mode:`rotation`}},{id:`fq3`,lessonId:`final`,type:`true-false`,category:`error-analysis`,prompt:`True or false: a kite has rotational symmetry of order 2.`,trueFalseAnswer:!1,explanation:`False — a kite has just 1 line of symmetry but rotational symmetry of order 1 (none), since rotating it by anything less than 360° does not map it onto itself.`,visual:{kind:`shape-symmetry`,shapeId:`kite`,mode:`rotation`}},{id:`fq4`,lessonId:`final`,type:`order`,category:`application`,prompt:`Order these shapes from the SMALLEST order of rotational symmetry to the LARGEST.`,orderItems:[{id:`o1`,label:`Scalene triangle (order 1)`},{id:`o2`,label:`Rectangle (order 2)`},{id:`o3`,label:`Equilateral triangle (order 3)`},{id:`o4`,label:`Square (order 4)`}],correctOrder:[`o1`,`o2`,`o3`,`o4`],explanation:`From smallest to largest rotational order: scalene triangle (1), rectangle (2), equilateral triangle (3), square (4).`},{id:`fq5`,lessonId:`final`,type:`mcq`,category:`skill`,prompt:`What is the name of a straight line that touches a circle at exactly one point?`,choices:[{id:`a`,label:`Chord`},{id:`b`,label:`Diameter`},{id:`c`,label:`Tangent`},{id:`d`,label:`Radius`}],correctChoiceId:`c`,explanation:`A tangent touches a circle at exactly one point, always at a right angle to the radius drawn there.`,visual:{kind:`circle`,parts:[`tangent`,`radius`]}},{id:`fq6`,lessonId:`final`,type:`numeric`,category:`application`,prompt:`The diameter of a circle is always 2 × the radius. If the radius is 7 cm, what is the diameter?`,correctAnswer:`14`,acceptedAnswers:[`14cm`,`14 cm`],explanation:`Diameter = 2 × radius = 2 × 7 cm = 14 cm.`},{id:`fq7`,lessonId:`final`,type:`true-false`,category:`error-analysis`,prompt:`True or false: a chord always passes through the centre of a circle.`,trueFalseAnswer:!1,explanation:`False — only a diameter must pass through the centre. A chord simply joins two points on the circle and does not have to pass through the centre.`,visual:{kind:`circle`,parts:[`chord`]}},{id:`fq8`,lessonId:`final`,type:`fill-blank`,category:`application`,prompt:`Each interior angle of a regular pentagon is _____ degrees.`,correctAnswer:`108`,acceptedAnswers:[`108°`],explanation:`Sum of interior angles = (5 − 2) × 180° = 540°. Shared equally between 5 angles: 540° ÷ 5 = 108°.`,visual:{kind:`regular-polygon`,shapeId:`regular-pentagon`}},{id:`fq9`,lessonId:`final`,type:`numeric`,category:`application`,prompt:`What is the sum of the interior angles of a regular heptagon (7 sides)?`,correctAnswer:`900`,acceptedAnswers:[`900°`],explanation:`For n = 7: (n − 2) × 180° = 5 × 180° = 900°.`,visual:{kind:`regular-polygon`,shapeId:`regular-heptagon`}},{id:`fq10`,lessonId:`final`,type:`mcq`,category:`challenge`,prompt:`Two shapes are proven to be congruent when...`,choices:[{id:`a`,label:`they look similar at a glance`},{id:`b`,label:`every corresponding side and angle matches exactly`},{id:`c`,label:`they are facing the same direction on the page`},{id:`d`,label:`just one pair of corresponding sides matches`}],correctChoiceId:`b`,explanation:`Congruence requires every single corresponding side and angle to match — orientation on the page and a single matching measurement are not enough.`},{id:`fq11`,lessonId:`final`,type:`true-false`,category:`skill`,prompt:`Look at these two rectangles. Are they congruent?`,visual:{kind:`congruent-pair`,pairId:`rectangles-match`,revealVerdict:!1},trueFalseAnswer:!0,explanation:`Yes — every corresponding side matches (9 cm and 4 cm), even though the second rectangle is rotated 90°.`},{id:`fq12`,lessonId:`final`,type:`true-false`,category:`error-analysis`,prompt:`Look at these two triangles. Are they congruent?`,visual:{kind:`congruent-pair`,pairId:`right-triangles-mismatch`,revealVerdict:!1},trueFalseAnswer:!1,explanation:`No — two sides match (8 cm and 6 cm) but the third side is 10 cm on one triangle and 9.5 cm on the other, so they are not congruent.`},{id:`fq13`,lessonId:`final`,type:`numeric`,category:`application`,prompt:`Triangle ABC is congruent to triangle DEF (A↔D, B↔E, C↔F). BC = 5.5 cm. What is the length of EF?`,correctAnswer:`5.5`,acceptedAnswers:[`5.5cm`,`5.5 cm`],explanation:`EF corresponds to BC (since B↔E and C↔F), so EF = 5.5 cm.`,visual:{kind:`congruent-pair`,pairId:`labeled-triangles`}},{id:`fq14`,lessonId:`final`,type:`matching`,category:`skill`,prompt:`Match each term to its meaning.`,matchPairs:[{id:`p1`,left:`Congruent`,right:`Exactly the same size and shape`},{id:`p2`,left:`Corresponding sides`,right:`Sides in matching positions on two shapes`},{id:`p3`,left:`Line of symmetry`,right:`A fold line where both halves match`},{id:`p4`,left:`Order of rotational symmetry`,right:`Number of times a shape matches itself in one full turn`}],explanation:`Congruent = same size and shape; corresponding sides = matching-position sides on two shapes; a line of symmetry is a fold line where the two halves match exactly; the order of rotational symmetry counts matches in one full turn.`},{id:`fq15`,lessonId:`final`,type:`mcq`,category:`skill`,prompt:`How many vertices does a cube have?`,choices:[{id:`a`,label:`6`},{id:`b`,label:`8`},{id:`c`,label:`10`},{id:`d`,label:`12`}],correctChoiceId:`b`,explanation:`A cube has 8 vertices (corners), 6 faces and 12 edges.`,visual:{kind:`solid`,solidId:`cube`}},{id:`fq16`,lessonId:`final`,type:`numeric`,category:`challenge`,prompt:`A hexagonal prism has 18 edges and 12 vertices. Using Euler's rule (faces + vertices − edges = 2), how many faces does it have?`,correctAnswer:`8`,explanation:`Faces = 2 − vertices + edges = 2 − 12 + 18 = 8.`,hint:`Rearrange Euler's rule: faces = 2 − vertices + edges.`,visual:{kind:`solid`,solidId:`hexagonal-prism`}},{id:`fq17`,lessonId:`final`,type:`true-false`,category:`skill`,prompt:`True or false: a cone has one vertex (the apex).`,trueFalseAnswer:!0,explanation:`True — a cone has one flat circular face, one curved surface, one curved edge where they meet, and one vertex at the apex.`,visual:{kind:`solid`,solidId:`cone`}},{id:`fq18`,lessonId:`final`,type:`mcq`,category:`application`,prompt:`Which view of a square-based pyramid looks like a square?`,choices:[{id:`a`,label:`Top view`},{id:`b`,label:`Front view`},{id:`c`,label:`Side view`},{id:`d`,label:`None of these`}],correctChoiceId:`a`,explanation:`Looking straight down onto a square-based pyramid (the top view) shows the square base. The front and side views both show a triangle.`},{id:`fq19`,lessonId:`final`,type:`order`,category:`application`,prompt:`Order these regular polygons from the FEWEST sides to the MOST.`,orderItems:[{id:`o1`,label:`Equilateral triangle (3 sides)`},{id:`o2`,label:`Regular pentagon (5 sides)`},{id:`o3`,label:`Regular hexagon (6 sides)`},{id:`o4`,label:`Regular octagon (8 sides)`}],correctOrder:[`o1`,`o2`,`o3`,`o4`],explanation:`From fewest to most sides: equilateral triangle (3), regular pentagon (5), regular hexagon (6), regular octagon (8).`},{id:`fq20`,lessonId:`final`,type:`mcq`,category:`challenge`,prompt:`A shape has rotational symmetry of order 4 AND exactly 4 lines of symmetry. Which shape is it?`,choices:[{id:`a`,label:`Square`},{id:`b`,label:`Rectangle`},{id:`c`,label:`Kite`},{id:`d`,label:`Parallelogram`}],correctChoiceId:`a`,explanation:`A square has 4 lines of symmetry and rotational symmetry of order 4. A rectangle and parallelogram have order 2, and a kite has order 1.`}],Dm=[Sm,Cm,wm,Tm];function Om(e){return Dm.find(t=>t.slug===e)}var km=[{to:`/`,label:`Home`,end:!0},...Dm.map(e=>({to:`/lesson/${e.slug}`,label:e.shortTitle,end:!1})),{to:`/final-quiz`,label:`Final Quiz`,end:!1},{to:`/progress`,label:`Progress`,end:!1},{to:`/teacher-preview`,label:`Teacher Preview`,end:!1}];function Am(){let[e,t]=(0,b.useState)(!1);return(0,k.jsxs)(`header`,{className:`sticky top-0 z-40 border-b border-ink-mist/60 bg-paper/90 backdrop-blur`,children:[(0,k.jsxs)(`div`,{className:`mx-auto flex max-w-6xl items-center justify-between px-4 py-3 sm:px-6`,children:[(0,k.jsxs)(Hn,{to:`/`,className:`flex items-center gap-2 font-heading text-lg font-bold text-ink`,onClick:()=>t(!1),children:[(0,k.jsx)(Z.span,{className:`flex h-9 w-9 items-center justify-center rounded-full bg-ink text-gold`,whileHover:{rotate:-8,scale:1.08},transition:{type:`spring`,stiffness:300,damping:12},children:(0,k.jsx)(_m,{size:19})}),(0,k.jsx)(`span`,{className:`hidden sm:inline`,children:`Shapes & Symmetry Mastery`}),(0,k.jsx)(`span`,{className:`sm:hidden`,children:`Shapes & Symmetry`})]}),(0,k.jsx)(`nav`,{className:`hidden items-center gap-1 lg:flex`,children:km.map(e=>(0,k.jsx)(Hn,{to:e.to,end:e.end,className:({isActive:e})=>`rounded-full px-3 py-2 text-sm font-semibold transition-colors ${e?`bg-gold-light text-gold-dark`:`text-ink-soft hover:bg-gold-light
