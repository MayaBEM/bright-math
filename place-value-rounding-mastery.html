the link between the exponent and the number of zeros`],vocabulary:[{term:`Power of 10`,definition:`A number formed by multiplying 10 by itself a number of times, such as 10³.`},{term:`Index (exponent)`,definition:`The small raised number that shows how many times the base is multiplied by itself.`},{term:`Base`,definition:`The number being multiplied repeatedly. In 10⁴, the base is 10.`},{term:`Standard form of a whole number`,definition:`A number written using digits in the usual way, for example 100,000.`}],rules:[{title:`Zero-counting rule`,content:`For any power of 10 written as 10ⁿ (where n is a positive whole number), the value has a 1 followed by exactly n zeros.`},{title:`Reading the index`,content:`The index tells you how many 10s are multiplied together, not how many digits appear in the answer overall (the answer always has one more digit than the number of zeros, because of the leading 1).`}],introduction:`Powers of 10 — 10, 100, 1,000, 10,000 and beyond — are the building blocks of our number system. Writing them with an index, like 10⁵, is a fast way to show very large numbers without counting every zero by hand.`,workedExamples:[{id:`u1-we1`,question:`Write 10⁵ in numbers and in words.`,steps:[{title:`Step 1 — Read the index`,content:`The index is 5, so 10 is multiplied by itself 5 times: 10 × 10 × 10 × 10 × 10.`},{title:`Step 2 — Count the zeros`,content:`A power of 10 with index 5 has exactly 5 zeros after the digit 1.`},{title:`Step 3 — Write the number`,content:`Placing 5 zeros after the 1 gives 100,000.`}],answer:`100,000 (one hundred thousand)`,reason:`The index of a power of 10 always matches the number of zeros that follow the leading digit 1.`},{id:`u1-we2`,question:`Write 1,000,000 as a power of 10.`,steps:[{title:`Step 1 — Count the zeros`,content:`1,000,000 has six zeros after the digit 1.`},{title:`Step 2 — Match to the index`,content:`Since the number of zeros equals the index, the index must be 6.`},{title:`Step 3 — Write in index form`,content:`So 1,000,000 = 10⁶.`}],answer:`10⁶`,reason:`Counting the zeros tells you the exponent directly — no multiplication is needed once you can count accurately.`},{id:`u1-we3`,question:`Complete the pattern: 10², 10³, ___, 10⁵.`,steps:[{title:`Step 1 — Look at the pattern of indices`,content:`The indices increase by 1 each time: 2, 3, 4, 5.`},{title:`Step 2 — Identify the missing index`,content:`The missing term must have index 4, so it is 10⁴.`},{title:`Step 3 — Write the value`,content:`10⁴ = 10,000.`}],answer:`10⁴ = 10,000`,reason:`Each step in the pattern multiplies the previous power of 10 by 10, which adds exactly one more zero.`}],practiceQuiz:[{id:`u1-p1`,unitId:`unit-1`,difficulty:`easy`,type:`mcq`,category:`skill`,prompt:`What is 10³ written as a number?`,choices:[{id:`a`,text:`30`},{id:`b`,text:`100`},{id:`c`,text:`1,000`},{id:`d`,text:`10,000`}],correctChoiceId:`c`,explanation:`10³ means 10 × 10 × 10, which is 1,000 — a 1 followed by three zeros.`,correctionTip:`Count the index as the number of zeros, not as a number to multiply by 10 once.`},{id:`u1-p2`,unitId:`unit-1`,difficulty:`easy`,type:`fill-blank`,category:`skill`,prompt:`10 to the power of ___ equals 100,000.`,correctAnswer:`5`,acceptedAnswers:[`5`,`five`],explanation:`100,000 has five zeros after the 1, so the index is 5: 10⁵ = 100,000.`,correctionTip:`Count each zero one at a time before writing the index.`},{id:`u1-p3`,unitId:`unit-1`,difficulty:`easy`,type:`true-false`,category:`skill`,prompt:`True or false: 10⁴ = 40,000.`,trueFalseAnswer:!1,explanation:`10⁴ = 10,000, not 40,000. The index tells you the number of zeros, not a multiplier of 4.`,correctionTip:`Do not multiply the index by 10 — instead use it as the number of zeros after the 1.`},{id:`u1-p4`,unitId:`unit-1`,difficulty:`easy`,type:`matching`,category:`skill`,prompt:`Match each power of 10 to its value.`,matchPairs:[{id:`m1`,left:`10¹`,right:`10`},{id:`m2`,left:`10²`,right:`100`},{id:`m3`,left:`10³`,right:`1,000`},{id:`m4`,left:`10⁴`,right:`10,000`}],explanation:`Each time the index increases by 1, one more zero is added to the value.`,correctionTip:`Line up the index with the number of zeros before matching.`},{id:`u1-p5`,unitId:`unit-1`,difficulty:`easy`,type:`numeric`,category:`skill`,prompt:`How many zeros does 10⁷ have when written as a number?`,correctAnswer:`7`,acceptedAnswers:[`7`,`seven`],explanation:`10⁷ = 10,000,000, which has seven zeros after the leading 1.`,correctionTip:`The index and the zero count are always the same number for a power of 10.`}],mainQuiz:[{id:`u1-m1`,unitId:`unit-1`,difficulty:`standard`,type:`mcq`,category:`skill`,prompt:`What is 10⁶ in words?`,choices:[{id:`a`,text:`One hundred thousand`},{id:`b`,text:`One million`},{id:`c`,text:`Ten million`},{id:`d`,text:`Ten thousand`}],correctChoiceId:`b`,explanation:`10⁶ = 1,000,000, which is written in words as one million.`,correctionTip:`Write the number out with the correct zero count first, then read it aloud in words.`},{id:`u1-m2`,unitId:`unit-1`,difficulty:`standard`,type:`fill-blank`,category:`skill`,prompt:`Write 10,000,000 as a power of 10 (for example, 10⁴).`,correctAnswer:`10^7`,acceptedAnswers:[`10^7`,`10 to the power of 7`,`10 to the power 7`,`ten to the power of 7`],explanation:`10,000,000 has seven zeros after the 1, so 10,000,000 = 10⁷.`,correctionTip:`Count the zeros carefully in numbers with commas — each comma group is three digits.`},{id:`u1-m3`,unitId:`unit-1`,difficulty:`standard`,type:`mcq`,category:`skill`,prompt:`Which of these is NOT equal to 100,000?`,choices:[{id:`a`,text:`10⁵`},{id:`b`,text:`10 × 10 × 10 × 10 × 10`},{id:`c`,text:`10⁴`},{id:`d`,text:`1,000 × 100`}],correctChoiceId:`c`,explanation:`10⁴ = 10,000, which is ten times smaller than 100,000. All the other expressions equal 100,000.`,correctionTip:`Evaluate each expression fully before comparing — do not assume similar-looking expressions are equal.`},{id:`u1-m4`,unitId:`unit-1`,difficulty:`standard`,type:`true-false`,category:`error-analysis`,prompt:`Marcus says 10¹ = 1. True or false?`,trueFalseAnswer:!1,explanation:`10¹ = 10, because a power of 10 with index 1 is just 10 itself, not 1.`,correctionTip:`Remember the index shows repeated multiplication — with index 1, there is one 10 and no extra zero pattern beyond that.`},{id:`u1-m5`,unitId:`unit-1`,difficulty:`standard`,type:`fill-blank`,category:`skill`,prompt:`Write 10⁹ as a number, using commas to separate the digits.`,correctAnswer:`1,000,000,000`,acceptedAnswers:[`1,000,000,000`,`1000000000`],explanation:`10⁹ has nine zeros after the 1, giving 1,000,000,000 (one billion).`,correctionTip:`Group the zeros in sets of three to check your commas are in the right place.`},{id:`u1-m6`,unitId:`unit-1`,difficulty:`standard`,type:`matching`,category:`skill`,prompt:`Match each power of 10 to the number of zeros in its value.`,matchPairs:[{id:`m1`,left:`10⁶`,right:`6 zeros`},{id:`m2`,left:`10⁸`,right:`8 zeros`},{id:`m3`,left:`10⁹`,right:`9 zeros`},{id:`m4`,left:`10¹⁰`,right:`10 zeros`}],explanation:`The index of a power of 10 is always identical to its number of trailing zeros.`,correctionTip:`Write each number out fully first if you are unsure — then count the zeros directly.`},{id:`u1-m7`,unitId:`unit-1`,difficulty:`standard`,type:`numeric`,category:`application`,prompt:`A charity website recorded 10⁴ visits in one day. Write this number of visits in standard form.`,correctAnswer:`10000`,acceptedAnswers:[`10000`,`10,000`],explanation:`10⁴ = 10,000, so the website recorded 10,000 visits.`,correctionTip:`Convert the power of 10 to a standard number before answering a word problem.`},{id:`u1-m8`,unitId:`unit-1`,difficulty:`standard`,type:`mcq`,category:`skill`,prompt:`Which expression is equal to 1,000,000?`,choices:[{id:`a`,text:`10⁵`},{id:`b`,text:`10⁶`},{id:`c`,text:`6 × 10`},{id:`d`,text:`10 × 6`}],correctChoiceId:`b`,explanation:`1,000,000 has six zeros after the 1, so it equals 10⁶.`,correctionTip:`Do not confuse the index with a simple multiplier — 10⁶ is not the same as 6 × 10.`},{id:`u1-m9`,unitId:`unit-1`,difficulty:`standard`,type:`fill-blank`,category:`skill`,prompt:`The index in a power of 10 tells you the number of ___ after the digit 1.`,correctAnswer:`zeros`,acceptedAnswers:[`zeros`,`zeroes`],explanation:`The index of a power of 10 equals the number of zeros that follow the leading 1.`,correctionTip:`Say the rule aloud each time: "the index equals the number of zeros."`},{id:`u1-m10`,unitId:`unit-1`,difficulty:`standard`,type:`true-false`,category:`error-analysis`,prompt:`Sofia says that 10⁵ has 5 digits altogether. True or false?`,trueFalseAnswer:!1,explanation:`10⁵ = 100,000, which has 6 digits in total (the leading 1 plus 5 zeros) — not 5 digits.`,correctionTip:`The total number of digits is always one more than the index, because of the leading 1.`}],challengeQuestion:{id:`u1-c1`,unitId:`unit-1`,difficulty:`challenge`,type:`mcq`,category:`challenge`,prompt:`Which is greater: 10⁹ or 9¹⁰?`,choices:[{id:`a`,text:`10⁹ is greater`},{id:`b`,text:`9¹⁰ is greater`},{id:`c`,text:`They are equal`}],correctChoiceId:`b`,explanation:`10⁹ = 1,000,000,000. But 9¹⁰ means 9 multiplied by itself 10 times, which works out to 3,486,784,401 — over three times larger than 10⁹. A bigger index does not always mean a bigger value when the bases are different.`,correctionTip:`When comparing powers with different bases, you cannot just compare the indices — you need to think about (or calculate) the actual values.`},commonMistakes:[{title:`Confusing the index with a multiplier`,wrong:`Thinking 10⁴ means "10 × 4", giving 40.`,right:`10⁴ means 10 multiplied by itself 4 times: 10 × 10 × 10 × 10 = 10,000.`,tip:`Read the index as "how many 10s are multiplied together," never as a number to multiply 10 by once.`},{title:`Miscounting the total number of digits`,wrong:`Believing 10⁵ has 5 digits in total.`,right:`10⁵ = 100,000, which has 6 digits: one leading 1, followed by 5 zeros.`,tip:`Remember: total digits = index + 1, because of the leading 1.`},{title:`Losing track of zeros in large numbers`,wrong:`Writing 10,000,000 as having 6 zeros instead of 7.`,right:`10,000,000 has 7 zeros after the 1, so it equals 10⁷.`,tip:`Count zeros in groups of three using the commas as a guide.`}],summary:[`10ⁿ has a 1 followed by exactly n zeros.`,`The index tells you how many zeros follow the leading 1, not how many digits the number has overall.`,`You can convert in both directions: from an index to a number, or from a number to an index, by counting zeros.`,`Powers of 10 with different bases (like 9¹⁰) do not follow the same "count the zeros" shortcut.`]},or={id:`unit-2`,number:2,title:`Multiplying Whole Numbers by Powers of 10`,shortDescription:`See why digits shift left in the place-value chart when you multiply.`,estimatedMinutes:20,difficulty:`Foundation`,color:`sage`,learningGoals:[`Multiply whole numbers by 10, 100, 1,000 and other powers of 10`,`Explain multiplication using digit movement in a place-value chart`,`Understand why "just add zeros" is not a complete mathematical explanation`,`Multiply whole numbers by powers of 10 written in index form`],vocabulary:[{term:`Place value`,definition:`The value of a digit based on its position in a number, such as tens, hundreds or thousands.`},{term:`Place-value chart`,definition:`A table with columns for each place value, used to track how digits move during calculations.`},{term:`Digit`,definition:`A single symbol from 0–9 used to build numbers.`}],rules:[{title:`Multiplying by a power of 10`,content:`When you multiply a whole number by a power of 10, every digit moves that many places to the left in the place-value chart. Multiplying by 10² moves digits 2 places left; multiplying by 10⁴ moves digits 4 places left.`},{title:`Why "add zeros" can mislead`,content:`Adding zeros to the end of a whole number works as a shortcut, but it does not explain what is really happening: each digit is becoming worth 10, 100, or 1,000 times more. The shortcut breaks down completely once decimals are involved (see Unit 3).`}],introduction:`Multiplying a whole number by a power of 10 is one of the fastest calculations in mathematics — but understanding why it works matters just as much as getting the right answer, especially once decimals appear.`,workedExamples:[{id:`u2-we1`,question:`Work out 34 × 10.`,steps:[{title:`Step 1 — Identify the power of 10`,content:`10 = 10¹, so every digit moves 1 place to the left.`},{title:`Step 2 — Move the digits`,content:`The 3 (tens) moves to the hundreds column, and the 4 (ones) moves to the tens column.`},{title:`Step 3 — Fill the empty place`,content:`The ones column is now empty, so a placeholder zero is written there.`}],answer:`340`,reason:`Multiplying by 10 makes every digit worth 10 times as much, which is the same as shifting it one column to the left.`},{id:`u2-we2`,question:`Work out 291 × 1,000.`,steps:[{title:`Step 1 — Identify the power of 10`,content:`1,000 = 10³, so every digit moves 3 places to the left.`},{title:`Step 2 — Move the digits`,content:`2, 9 and 1 each shift three columns to the left in the place-value chart.`},{title:`Step 3 — Fill the empty places`,content:`The three columns now on the right (hundreds, tens, ones) are empty, so three placeholder zeros are written.`}],answer:`291,000`,reason:`Each of the three empty columns needs a placeholder zero to keep every digit in its correct place-value position.`},{id:`u2-we3`,question:`Work out 768 × 10⁴.`,steps:[{title:`Step 1 — Read the index`,content:`10⁴ means the digits move 4 places to the left.`},{title:`Step 2 — Move the digits`,content:`7, 6 and 8 each shift four columns to the left.`},{title:`Step 3 — Fill the empty places`,content:`Four columns are now empty on the right, so four placeholder zeros are added.`}],answer:`7,680,000`,reason:`The index of the power of 10 always tells you exactly how many places to shift every digit.`}],practiceQuiz:[{id:`u2-p1`,unitId:`unit-2`,difficulty:`easy`,type:`numeric`,category:`skill`,prompt:`Work out 2 × 10.`,correctAnswer:`20`,explanation:`Multiplying by 10 shifts the digit 2 one place to the left, giving 20.`,correctionTip:`Multiplying a whole number by 10 always adds exactly one placeholder zero.`},{id:`u2-p2`,unitId:`unit-2`,difficulty:`easy`,type:`numeric`,category:`skill`,prompt:`Work out 13 × 10.`,correctAnswer:`130`,explanation:`Each digit in 13 shifts one place to the left, giving 130.`,correctionTip:`Keep the digits 1 and 3 in the same order — only their place value changes.`},{id:`u2-p3`,unitId:`unit-2`,difficulty:`easy`,type:`mcq`,category:`skill`,prompt:`35 × 100 = ?`,choices:[{id:`a`,text:`350`},{id:`b`,text:`3,500`},{id:`c`,text:`35,000`},{id:`d`,text:`3.5`}],correctChoiceId:`b`,explanation:`100 = 10², so every digit in 35 moves 2 places to the left, giving 3,500.`,correctionTip:`Match the number of zeros in 100 to the number of places digits should move.`},{id:`u2-p4`,unitId:`unit-2`,difficulty:`easy`,type:`true-false`,category:`skill`,prompt:`True or false: 47 × 10 = 470.`,trueFalseAnswer:!0,explanation:`Multiplying 47 by 10 moves each digit one place left, giving 470.`,correctionTip:`Check your answer by counting one placeholder zero for each factor of 10.`},{id:`u2-p5`,unitId:`unit-2`,difficulty:`easy`,type:`fill-blank`,category:`skill`,prompt:`9 × 10⁵ = ___`,correctAnswer:`900000`,acceptedAnswers:[`900000`,`900,000`],explanation:`10⁵ moves every digit 5 places to the left, so 9 becomes 900,000.`,correctionTip:`Count the index of the power of 10 to know exactly how many zeros to add.`}],mainQuiz:[{id:`u2-m1`,unitId:`unit-2`,difficulty:`standard`,type:`numeric`,category:`skill`,prompt:`Work out 23 × 10².`,correctAnswer:`2300`,acceptedAnswers:[`2300`,`2,300`],explanation:`10² moves every digit 2 places to the left, so 23 becomes 2,300.`,correctionTip:`Convert 10² to 100 first if you find index form tricky.`},{id:`u2-m2`,unitId:`unit-2`,difficulty:`standard`,type:`numeric`,category:`skill`,prompt:`Work out 768 × 10⁴.`,correctAnswer:`7680000`,acceptedAnswers:[`7680000`,`7,680,000`],explanation:`10⁴ moves every digit 4 places to the left: 768 becomes 7,680,000.`,correctionTip:`Keep the digit order 7-6-8 unchanged; only add the correct number of placeholder zeros.`},{id:`u2-m3`,unitId:`unit-2`,difficulty:`standard`,type:`numeric`,category:`skill`,prompt:`Work out 291 × 1,000.`,correctAnswer:`291000`,acceptedAnswers:[`291000`,`291,000`],explanation:`1,000 = 10³, so every digit in 291 shifts 3 places left, giving 291,000.`,correctionTip:`Count the zeros in 1,000 (three) to know how many places to shift.`},{id:`u2-m4`,unitId:`unit-2`,difficulty:`standard`,type:`true-false`,category:`error-analysis`,prompt:`Marcus says: "When I multiply a whole number by 10⁴, I just add four zeros to the end. This works for any positive whole number power of 10." Is Marcus correct for whole numbers?`,trueFalseAnswer:!0,explanation:`For whole numbers, adding the same number of zeros as the index does give the correct answer. However, this shortcut does not explain the place-value reasoning, and it breaks down completely for decimal numbers (see Unit 3).`,correctionTip:`A shortcut can give correct answers for whole numbers while still being an incomplete mathematical explanation.`},{id:`u2-m5`,unitId:`unit-2`,difficulty:`standard`,type:`mcq`,category:`skill`,prompt:`Which power of 10 would move the digits of a whole number exactly 5 places to the left?`,choices:[{id:`a`,text:`10³`},{id:`b`,text:`10⁴`},{id:`c`,text:`10⁵`},{id:`d`,text:`10⁶`}],correctChoiceId:`c`,explanation:`The index of the power of 10 tells you exactly how many places the digits move — index 5 means 5 places.`,correctionTip:`Match the index of the power of 10 to the number of columns you shift.`},{id:`u2-m6`,unitId:`unit-2`,difficulty:`standard`,type:`fill-blank`,category:`application`,prompt:`A factory packs items into boxes of 100. If there are 15 full boxes, complete: 15 × 100 = ___ items.`,correctAnswer:`1500`,acceptedAnswers:[`1500`,`1,500`],explanation:`15 × 100 moves the digits of 15 two places to the left, giving 1,500 items.`,correctionTip:`Translate the word problem into a multiplication by a power of 10 before solving.`},{id:`u2-m7`,unitId:`unit-2`,difficulty:`standard`,type:`mcq`,category:`application`,prompt:`A school raised money and multiplied last year's total of 91 by 10² for a fundraising target. What is the new target?`,choices:[{id:`a`,text:`910`},{id:`b`,text:`9,100`},{id:`c`,text:`9,010`},{id:`d`,text:`91,000`}],correctChoiceId:`b`,explanation:`10² moves the digits of 91 two places left: 91 × 100 = 9,100.`,correctionTip:`Check the number of zeros matches the index of the power of 10, not the number of digits in the original number.`},{id:`u2-m8`,unitId:`unit-2`,difficulty:`standard`,type:`true-false`,category:`error-analysis`,prompt:`Sofia says that 47 × 10 = 4,700. True or false?`,trueFalseAnswer:!1,explanation:`47 × 10 = 470, with just one placeholder zero, not two. Sofia has multiplied by 100 instead of 10.`,correctionTip:`Match the number of zeros you add to the number of zeros in the power of 10 you are multiplying by.`},{id:`u2-m9`,unitId:`unit-2`,difficulty:`standard`,type:`numeric`,category:`skill`,prompt:`Work out 9 × 10³.`,correctAnswer:`9000`,acceptedAnswers:[`9000`,`9,000`],explanation:`10³ moves the digit 9 three places to the left, giving 9,000.`,correctionTip:`Single-digit numbers still follow the same place-value shifting rule.`},{id:`u2-m10`,unitId:`unit-2`,difficulty:`standard`,type:`mcq`,category:`error-analysis`,prompt:`Which explanation of 34 × 10 = 340 best shows understanding of place value, rather than just a shortcut?`,choices:[{id:`a`,text:`"I added a zero to the end of 34."`},{id:`b`,text:`"Every digit in 34 becomes 10 times bigger, so it shifts one column to the left in the place-value chart."`},{id:`c`,text:`"10 has one zero, so the answer has one zero."`},{id:`d`,text:`"I know 34 × 10 by memory."`}],correctChoiceId:`b`,explanation:`Explaining the digit shift in the place-value chart shows real understanding of why multiplying by 10 works, not just a memorised shortcut.`,correctionTip:`A good mathematical explanation describes what happens to place value, not just what happens to the digits on paper.`}],challengeQuestion:{id:`u2-c1`,unitId:`unit-2`,difficulty:`challenge`,type:`numeric`,category:`challenge`,prompt:`A number is multiplied by 10³ and the result is 47,000. What was the original whole number?`,correctAnswer:`47`,explanation:`Multiplying by 10³ shifts digits 3 places left, which is the same as adding 3 zeros. Working backwards, 47,000 with 3 zeros removed leaves 47.`,correctionTip:`To reverse a multiplication by a power of 10, shift the digits back the same number of places in the opposite direction.`},commonMistakes:[{title:`Adding the wrong number of zeros`,wrong:`Writing 35 × 100 = 350 (only one zero added).`,right:`35 × 100 = 3,500, because 100 = 10² requires two placeholder zeros.`,tip:`Always match the number of zeros you add to the index of the power of 10.`},{title:`Treating "add zeros" as a full explanation`,wrong:`Saying "I just add zeros" without describing place value.`,right:`Multiplying by a power of 10 makes each digit worth 10, 100 or 1,000 times more, shifting it left in the place-value chart.`,tip:`Be ready to explain what is happening to place value, not just describe the shortcut.`},{title:`Changing the order of the digits`,wrong:`Rearranging the digits of the original number while adding zeros.`,right:`The digits always stay in the same order — only their place value changes.`,tip:`Write the original digits first, then add placeholder zeros to the right without moving them around.`}],summary:[`Multiplying by a power of 10 shifts every digit to the left in the place-value chart.`,`The index of the power of 10 tells you exactly how many places to shift.`,`"Adding zeros" gives the correct answer for whole numbers, but it is not a complete mathematical explanation.`,`Digits always keep the same order — only their place value changes.`]},sr={id:`unit-3`,number:3,title:`Multiplying Decimal Numbers by Powers of 10`,shortDescription:`Move digits through the decimal point with confidence and precision.`,estimatedMinutes:25,difficulty:`Intermediate`,color:`coral`,learningGoals:[`Multiply decimal numbers by 10, 100, 1,000 and other powers of 10`,`Move digits correctly through a place-value chart that includes a decimal point`,`Insert placeholder zeros where needed`,`Explain why "add zeros to the end" fails for many decimal calculations`],vocabulary:[{term:`Decimal point`,definition:`The point that separates the whole-number part of a number from its fractional part.`},{term:`Placeholder zero`,definition:`A zero used to fill an empty place-value column so digits stay in the correct position.`},{term:`Decimal place`,definition:`A digit position to the right of the decimal point, such as tenths, hundredths or thousandths.`}],rules:[{title:`Multiplying decimals by a power of 10`,content:`The decimal point stays fixed in a place-value chart; it is the digits that move left across it. Multiplying by 10ⁿ moves every digit n places to the left, exactly as with whole numbers.`},{title:`When to insert placeholder zeros`,content:`If there are not enough digits to fill every place-value column after shifting, insert placeholder zeros so each digit lands in the correct column.`}],introduction:`The same place-value shifting rule from Unit 2 applies to decimals — but because the decimal point is involved, "just add zeros to the end" can quietly produce a wrong answer. This unit shows the reliable way to think about it.`,workedExamples:[{id:`u3-we1`,question:`Work out 2.5 × 100.`,steps:[{title:`Step 1 — Identify the power of 10`,content:`100 = 10², so every digit moves 2 places to the left.`},{title:`Step 2 — Move the digits`,content:`The 2 (units) and 5 (tenths) each shift two columns to the left, crossing over the decimal point.`},{title:`Step 3 — Fill the empty place`,content:`One placeholder zero is needed after the 5 to keep it in the correct column.`}],answer:`250`,reason:`Digits move across the fixed decimal point; once every digit has shifted, the decimal point can be dropped because the number is now a whole number.`},{id:`u3-we2`,question:`Work out 0.57 × 1,000.`,steps:[{title:`Step 1 — Identify the power of 10`,content:`1,000 = 10³, so every digit moves 3 places to the left.`},{title:`Step 2 — Move the digits`,content:`5 and 7 each move three columns to the left.`},{title:`Step 3 — Fill the empty place`,content:`One placeholder zero is needed after the 7 to complete the shift.`}],answer:`570`,reason:`Even though 0.57 has only two digits after the decimal point, each one still moves the full three places required by 10³.`},{id:`u3-we3`,question:`Work out 4.56 × 10⁵.`,steps:[{title:`Step 1 — Read the index`,content:`10⁵ means every digit moves 5 places to the left.`},{title:`Step 2 — Move the digits`,content:`4, 5 and 6 each shift five columns to the left across the place-value chart.`},{title:`Step 3 — Fill the empty places`,content:`After 4-5-6 have moved, three empty columns remain and need placeholder zeros.`}],answer:`456,000`,reason:`The digits keep the same order, but their place values become 100,000 times greater, so three placeholder zeros are needed to finish the shift.`}],practiceQuiz:[{id:`u3-p1`,unitId:`unit-3`,difficulty:`easy`,type:`numeric`,category:`skill`,prompt:`Work out 4.2 × 100.`,correctAnswer:`420`,explanation:`100 = 10², so both digits of 4.2 move 2 places left, giving 420.`,correctionTip:`Move the digits across the decimal point rather than moving the point itself.`},{id:`u3-p2`,unitId:`unit-3`,difficulty:`easy`,type:`numeric`,category:`skill`,prompt:`Work out 12.7 × 1,000.`,correctAnswer:`12700`,acceptedAnswers:[`12700`,`12,700`],explanation:`1,000 = 10³, so the digits of 12.7 shift 3 places left, giving 12,700.`,correctionTip:`Add a placeholder zero whenever a digit does not reach a full column after shifting.`},{id:`u3-p3`,unitId:`unit-3`,difficulty:`easy`,type:`true-false`,category:`skill`,prompt:`True or false: 0.57 × 1,000 = 570.`,trueFalseAnswer:!0,explanation:`Shifting the digits of 0.57 three places to the left gives 570.`,correctionTip:`Check the answer by counting exactly three place-value shifts.`},{id:`u3-p4`,unitId:`unit-3`,difficulty:`easy`,type:`mcq`,category:`skill`,prompt:`6.5 × 10,000 = ?`,choices:[{id:`a`,text:`650`},{id:`b`,text:`6,500`},{id:`c`,text:`65,000`},{id:`d`,text:`650,000`}],correctChoiceId:`c`,explanation:`10,000 = 10⁴, so the digits of 6.5 shift 4 places left, giving 65,000.`,correctionTip:`Count the zeros in 10,000 to find how many places the digits should move.`},{id:`u3-p5`,unitId:`unit-3`,difficulty:`easy`,type:`fill-blank`,category:`skill`,prompt:`2.87 × 1,000,000 = ___`,correctAnswer:`2870000`,acceptedAnswers:[`2870000`,`2,870,000`],explanation:`1,000,000 = 10⁶, so the digits of 2.87 shift 6 places left, giving 2,870,000.`,correctionTip:`Even numbers with two decimal digits still require the full shift for every place-value column.`}],mainQuiz:[{id:`u3-m1`,unitId:`unit-3`,difficulty:`standard`,type:`numeric`,category:`skill`,prompt:`Work out 4.56 × 10⁵.`,correctAnswer:`456000`,acceptedAnswers:[`456000`,`456,000`],explanation:`10⁵ shifts each digit 5 places left: 4.56 becomes 456,000.`,correctionTip:`Keep digits in the order 4-5-6, then add placeholder zeros for any unfilled columns.`},{id:`u3-m2`,unitId:`unit-3`,difficulty:`standard`,type:`true-false`,category:`error-analysis`,prompt:`Maya says: "4.56 has two decimal digits and 10⁵ has five zeros, so I add three zeros to the end and cross out the decimal point, giving 456,000." Is her final answer correct?`,trueFalseAnswer:!0,explanation:`Maya's final answer of 456,000 is correct, but her method (counting zeros minus decimal digits) only works by coincidence here — it does not clearly show the place-value reasoning and can lead to errors on other numbers.`,correctionTip:`A correct final answer does not always mean the method used will generalise safely — check the place-value reasoning too.`},{id:`u3-m3`,unitId:`unit-3`,difficulty:`standard`,type:`numeric`,category:`skill`,prompt:`Work out 12.7 × 1,000.`,correctAnswer:`12700`,acceptedAnswers:[`12700`,`12,700`],explanation:`Shifting the digits of 12.7 three places left gives 12,700.`,correctionTip:`Write out the place-value chart if the shift feels unclear.`},{id:`u3-m4`,unitId:`unit-3`,difficulty:`standard`,type:`mcq`,category:`error-analysis`,prompt:`Marcus tries to use his whole-number shortcut on a decimal: "0.57 × 1,000 means I add three zeros to the end, so the answer is 0.57000." What is wrong with his reasoning?`,choices:[{id:`a`,text:`Nothing — his final answer is correct.`},{id:`b`,text:`Adding zeros after the decimal digits does not change the value at all, so his method fails for decimals.`},{id:`c`,text:`He should have added four zeros instead of three.`},{id:`d`,text:`He should have used 10,000 instead of 1,000.`}],correctChoiceId:`b`,explanation:`Writing 0.57000 has the same value as 0.57 — the zeros were added in the wrong place. The digits needed to shift across the decimal point instead, giving 570.`,correctionTip:`For decimals, think about digits moving through the place-value chart, not zeros being appended to the end of the written number.`},{id:`u3-m5`,unitId:`unit-3`,difficulty:`standard`,type:`numeric`,category:`skill`,prompt:`Work out 2.87 × 1,000,000.`,correctAnswer:`2870000`,acceptedAnswers:[`2870000`,`2,870,000`],explanation:`10⁶ shifts every digit 6 places left, so 2.87 becomes 2,870,000.`,correctionTip:`Six shifts are needed even though 2.87 only has two decimal digits — insert placeholder zeros for the rest.`},{id:`u3-m6`,unitId:`unit-3`,difficulty:`standard`,type:`fill-blank`,category:`application`,prompt:`A digital thermometer reads 6.5°C. A faulty sensor multiplies every reading by 10,000 by mistake. What reading would it display?`,correctAnswer:`65000`,acceptedAnswers:[`65000`,`65,000`],explanation:`6.5 × 10,000 shifts the digits 4 places left, giving 65,000.`,correctionTip:`Translate the real-world scenario into a multiplication by a power of 10 before solving.`},{id:`u3-m7`,unitId:`unit-3`,difficulty:`standard`,type:`mcq`,category:`skill`,prompt:`Which power of 10, when multiplying 4.2, gives 420,000?`,choices:[{id:`a`,text:`10²`},{id:`b`,text:`10³`},{id:`c`,text:`10⁴`},{id:`d`,text:`10⁵`}],correctChoiceId:`d`,explanation:`4.2 × 10⁵ shifts the digits 5 places left, giving 420,000.`,correctionTip:`Count how many places the digits must move to get from 4.2 to 420,000, then match that to the index.`},{id:`u3-m8`,unitId:`unit-3`,difficulty:`standard`,type:`true-false`,category:`skill`,prompt:`True or false: multiplying a decimal by a power of 10 can turn it into a whole number.`,trueFalseAnswer:!0,explanation:`If the shift moves every decimal digit past the decimal point, the result becomes a whole number, as in 2.5 × 100 = 250.`,correctionTip:`A whole-number result is common in this unit, but always check by shifting the digits carefully rather than assuming.`},{id:`u3-m9`,unitId:`unit-3`,difficulty:`standard`,type:`numeric`,category:`skill`,prompt:`Work out 0.57 × 1,000.`,correctAnswer:`570`,explanation:`Shifting the digits of 0.57 three places left gives 570.`,correctionTip:`One placeholder zero is needed since 0.57 only has two decimal digits but the shift is three places.`},{id:`u3-m10`,unitId:`unit-3`,difficulty:`standard`,type:`mcq`,category:`error-analysis`,prompt:`Which statement best explains why "add zeros to the end" is unreliable for multiplying decimals by powers of 10?`,choices:[{id:`a`,text:`Because powers of 10 only work with whole numbers.`},{id:`b`,text:`Because adding zeros after decimal digits does not change the value, whereas digits must actually shift place value to change the value.`},{id:`c`,text:`Because decimals cannot be multiplied at all.`},{id:`d`,text:`Because the decimal point always disappears when multiplying.`}],correctChoiceId:`b`,explanation:`Appending zeros after the last decimal digit leaves the value unchanged (0.57 = 0.570), so it cannot represent genuine place-value shifting.`,correctionTip:`Always check whether a shortcut actually changes the value of the number — if it does not, it is not doing real multiplication.`}],challengeQuestion:{id:`u3-c1`,unitId:`unit-3`,difficulty:`challenge`,type:`numeric`,category:`challenge`,prompt:`A decimal number is multiplied by 10⁴ and the result is 3,180,000. What was the original decimal number?`,correctAnswer:`318`,acceptedAnswers:[`318`,`318.0`],explanation:`Multiplying by 10⁴ shifts digits 4 places left. Working backwards, shifting 3,180,000 four places to the right gives 318. Since 318 has no digits after the decimal point in the answer, the original number was the whole number 318.`,correctionTip:`To undo a multiplication by a power of 10, shift the digits the same number of places in the opposite direction.`},commonMistakes:[{title:`Appending zeros instead of shifting digits`,wrong:`Writing 0.57 × 1,000 = 0.57000 (adding zeros with no shift).`,right:`0.57 × 1,000 = 570, because the digits shift three places across the decimal point.`,tip:`For decimals, always think "digits move through the chart," never "zeros get added to the end."`},{title:`Forgetting placeholder zeros`,wrong:`Writing 6.5 × 10,000 = 65 (forgetting to fill empty place-value columns).`,right:`6.5 × 10,000 = 65,000, with three placeholder zeros added after the shift.`,tip:`Count exactly how many columns are filled by digits, then add zeros for any that remain empty.`},{title:`Losing the decimal point during the shift`,wrong:`Shifting only some digits and leaving the decimal point in its original position.`,right:`Every digit moves the same number of places; the decimal point effectively "stays put" while digits move past it.`,tip:`Move every digit the same number of places — do not move the decimal point on its own.`}],summary:[`Multiplying decimals by powers of 10 follows the same place-value shifting rule as whole numbers.`,`The decimal point does not move — the digits shift across it.`,`Placeholder zeros are needed whenever a shift creates an empty place-value column.`,`"Adding zeros to the end" does not work reliably for decimals, because it can leave the value unchanged.`]},cr={id:`unit-4`,number:4,title:`Dividing Whole Numbers by Powers of 10`,shortDescription:`Send digits right through the place-value chart — and sometimes into decimals.`,estimatedMinutes:20,difficulty:`Intermediate`,color:`sky`,learningGoals:[`Divide whole numbers by 10, 100, 1,000 and other powers of 10`,`Move digits correctly to the right in a place-value chart`,`Use placeholder zeros where needed when dividing`,`Understand why "crossing out zeros" is not a fully reliable method`],vocabulary:[{term:`Dividend`,definition:`The number being divided — in 830 ÷ 1,000, the dividend is 830.`},{term:`Divisor`,definition:`The number you divide by — in 830 ÷ 1,000, the divisor is 1,000.`},{term:`Quotient`,definition:`The result of a division calculation.`}],rules:[{title:`Dividing by a power of 10`,content:`When you divide a whole number by a power of 10, every digit moves that many places to the right in the place-value chart. Dividing by 10³ moves digits 3 places right, which can create a decimal answer.`},{title:`Why "crossing out zeros" can mislead`,content:`Crossing out zeros happens to work when the dividend ends in enough zeros to cancel with the divisor, but it gives no correct method when it does not — for example, 830 ÷ 1,000 cannot be solved by crossing out zeros, since 830 has no zeros to cross out from the ones column in a matching way.`}],introduction:`Dividing by a power of 10 is the mirror image of multiplying: digits shift right instead of left. This often produces a decimal answer, so it is important to shift digits carefully rather than rely on crossing out zeros.`,workedExamples:[{id:`u4-we1`,question:`Work out 830 ÷ 1,000.`,steps:[{title:`Step 1 — Identify the power of 10`,content:`1,000 = 10³, so every digit moves 3 places to the right.`},{title:`Step 2 — Move the digits`,content:`8, 3 and 0 each shift three columns to the right, crossing the decimal point.`},{title:`Step 3 — Insert a placeholder`,content:`A placeholder zero is needed in the units place, since no whole-number part remains.`}],answer:`0.83`,reason:`Dividing by 10³ moves every digit three columns to the right; since 830 only has three digits, they all end up after the decimal point.`},{id:`u4-we2`,question:`Work out 80,000 ÷ 10⁴.`,steps:[{title:`Step 1 — Read the index`,content:`10⁴ means every digit moves 4 places to the right.`},{title:`Step 2 — Move the digits`,content:`The 8 shifts four columns to the right through the place-value chart.`},{title:`Step 3 — Simplify`,content:`After shifting, the 8 lands in the units column with nothing after the decimal point.`}],answer:`8`,reason:`Four of the five digit-columns in 80,000 were placeholder zeros, so dividing by 10⁴ removes exactly those four zeros, leaving the whole number 8.`},{id:`u4-we3`,question:`Work out 2,350,000 ÷ 10⁵.`,steps:[{title:`Step 1 — Read the index`,content:`10⁵ means every digit moves 5 places to the right.`},{title:`Step 2 — Move the digits`,content:`2, 3 and 5 each shift five columns to the right (the trailing zeros disappear as placeholders that are no longer needed).`},{title:`Step 3 — Place the decimal point`,content:`After the shift, the decimal point sits between the 3 and the 5.`}],answer:`23.5`,reason:`Dividing by 10⁵ moves the non-zero digits 5 places to the right; only the non-zero digits 2, 3 and 5 remain, arranged as 23.5.`}],practiceQuiz:[{id:`u4-p1`,unitId:`unit-4`,difficulty:`easy`,type:`numeric`,category:`skill`,prompt:`Work out 8 ÷ 10.`,correctAnswer:`0.8`,explanation:`Dividing by 10 moves the digit 8 one place to the right, giving 0.8.`,correctionTip:`Dividing a whole number by 10 always creates a decimal unless the number already ends in a zero.`},{id:`u4-p2`,unitId:`unit-4`,difficulty:`easy`,type:`numeric`,category:`skill`,prompt:`Work out 12 ÷ 100.`,correctAnswer:`0.12`,explanation:`Dividing by 100 moves each digit two places to the right, giving 0.12.`,correctionTip:`Insert a placeholder zero before the first digit if there are not enough digits to fill every column.`},{id:`u4-p3`,unitId:`unit-4`,difficulty:`easy`,type:`mcq`,category:`skill`,prompt:`830 ÷ 1,000 = ?`,choices:[{id:`a`,text:`8.3`},{id:`b`,text:`0.83`},{id:`c`,text:`0.083`},{id:`d`,text:`83`}],correctChoiceId:`b`,explanation:`Dividing by 1,000 moves the digits of 830 three places to the right, giving 0.83.`,correctionTip:`Count how many places you are shifting and check the decimal point lands in the correct spot.`},{id:`u4-p4`,unitId:`unit-4`,difficulty:`easy`,type:`true-false`,category:`skill`,prompt:`True or false: 80,000 ÷ 10⁴ = 8.`,trueFalseAnswer:!0,explanation:`Dividing 80,000 by 10⁴ shifts the digits four places to the right, leaving just the whole number 8.`,correctionTip:`Cross-check by counting the zeros: 80,000 has four zeros, and 10⁴ removes exactly four of them.`},{id:`u4-p5`,unitId:`unit-4`,difficulty:`easy`,type:`fill-blank`,category:`skill`,prompt:`510,000 ÷ 10⁵ = ___`,correctAnswer:`5.1`,explanation:`Dividing by 10⁵ shifts the digits of 510,000 five places to the right, giving 5.1.`,correctionTip:`Keep the digits 5 and 1 in order; only their place value changes.`}],mainQuiz:[{id:`u4-m1`,unitId:`unit-4`,difficulty:`standard`,type:`numeric`,category:`skill`,prompt:`Work out 2,350,000 ÷ 10⁵.`,correctAnswer:`23.5`,explanation:`Dividing by 10⁵ shifts the digits five places to the right, giving 23.5.`,correctionTip:`Line up 2,350,000 in a place-value chart and shift every digit five columns to the right.`},{id:`u4-m2`,unitId:`unit-4`,difficulty:`standard`,type:`mcq`,category:`error-analysis`,prompt:`Sofia works out 2,350,000 ÷ 10⁵ by crossing out five zeros to get 23.5. Maya works out the same problem by moving each digit five places to the right in a place-value chart, also getting 23.5. Which statement is most accurate?`,choices:[{id:`a`,text:`Only Maya's method is mathematically valid; Sofia just got lucky.`},{id:`b`,text:`Both give the same correct answer here, but Maya's place-value method generalises reliably, while zero-crossing only works when there are enough zeros to cross out.`},{id:`c`,text:`Both methods are equally reliable in every case, including with numbers like 830.`},{id:`d`,text:`Neither method gives the correct answer.`}],correctChoiceId:`b`,explanation:`Zero-crossing works here because 2,350,000 happens to have five zeros to remove, but it fails for numbers such as 830 ÷ 1,000, which has no matching zeros to cross out. The place-value shifting method works in every case.`,correctionTip:`A shortcut that works on one example is not automatically a reliable method — test it against a case with fewer trailing zeros.`},{id:`u4-m3`,unitId:`unit-4`,difficulty:`standard`,type:`numeric`,category:`skill`,prompt:`Work out 510,000 ÷ 10⁵.`,correctAnswer:`5.1`,explanation:`Shifting the digits of 510,000 five places to the right gives 5.1.`,correctionTip:`Remove trailing zeros only as a check, not as your main method.`},{id:`u4-m4`,unitId:`unit-4`,difficulty:`standard`,type:`true-false`,category:`error-analysis`,prompt:`Marcus says: "830 ÷ 1,000 = 83, because I just cross out one zero from 830." Is Marcus correct?`,trueFalseAnswer:!1,explanation:`830 ÷ 1,000 = 0.83. Crossing out a zero from 830 does not account for the full three-place shift required, and it produces an answer that is far too large.`,correctionTip:`When there are not enough trailing zeros to cross out, digits must shift into decimal places instead.`},{id:`u4-m5`,unitId:`unit-4`,difficulty:`standard`,type:`mcq`,category:`skill`,prompt:`Which power of 10 makes 12 ÷ 10ⁿ = 0.0012?`,choices:[{id:`a`,text:`10²`},{id:`b`,text:`10³`},{id:`c`,text:`10⁴`},{id:`d`,text:`10⁵`}],correctChoiceId:`c`,explanation:`12 ÷ 10⁴ moves the digits four places to the right, giving 0.0012.`,correctionTip:`Count how many places the digits move from 12 to 0.0012 and match that number to the index.`},{id:`u4-m6`,unitId:`unit-4`,difficulty:`standard`,type:`fill-blank`,category:`application`,prompt:`A charity divides a fundraising total of 8,000 dollars equally among 1,000 identical grants. How many dollars is each grant?`,correctAnswer:`8`,explanation:`8,000 ÷ 1,000 shifts the digits three places to the right, leaving the whole number 8.`,correctionTip:`Convert the situation into a division by a power of 10 before shifting digits.`},{id:`u4-m7`,unitId:`unit-4`,difficulty:`standard`,type:`numeric`,category:`skill`,prompt:`Work out 80,500,000 ÷ 10⁵.`,correctAnswer:`805`,explanation:`Dividing by 10⁵ shifts the digits of 80,500,000 five places to the right, giving 805.`,correctionTip:`Shift the full number carefully — do not just remove five zeros blindly, since 80,500,000 does not end in five consecutive zeros beyond the ones already shifted.`},{id:`u4-m8`,unitId:`unit-4`,difficulty:`standard`,type:`true-false`,category:`skill`,prompt:`True or false: dividing a whole number by a power of 10 can never give a decimal answer.`,trueFalseAnswer:!1,explanation:`Dividing a whole number by a power of 10 very often gives a decimal answer, such as 8 ÷ 10 = 0.8.`,correctionTip:`A decimal result is expected whenever the divisor removes more place-value columns than the number has trailing zeros.`},{id:`u4-m9`,unitId:`unit-4`,difficulty:`standard`,type:`mcq`,category:`error-analysis`,prompt:`Which of these best explains why "crossing out zeros" is not a fully reliable method for division by powers of 10?`,choices:[{id:`a`,text:`Because division by powers of 10 is impossible.`},{id:`b`,text:`Because it only works when the dividend has at least as many trailing zeros as the divisor requires; otherwise digits must shift into decimal places.`},{id:`c`,text:`Because crossing out zeros always gives an answer that is too small.`},{id:`d`,text:`Because powers of 10 do not have zeros.`}],correctChoiceId:`b`,explanation:`Zero-crossing depends on having enough trailing zeros to remove. When there are not enough, the correct method is to shift every digit through the place-value chart.`,correctionTip:`Use the place-value shifting method as your main approach, and treat zero-crossing only as a quick mental check.`},{id:`u4-m10`,unitId:`unit-4`,difficulty:`standard`,type:`numeric`,category:`skill`,prompt:`Work out 8,000 ÷ 10³.`,correctAnswer:`8`,explanation:`Dividing 8,000 by 10³ shifts the digits three places to the right, leaving the whole number 8.`,correctionTip:`Check your answer using the reverse operation: 8 × 10³ = 8,000.`}],challengeQuestion:{id:`u4-c1`,unitId:`unit-4`,difficulty:`challenge`,type:`numeric`,category:`challenge`,prompt:`A whole number is divided by 10⁴ and the result is 6.05. What was the original whole number?`,correctAnswer:`60500`,acceptedAnswers:[`60500`,`60,500`],explanation:`To reverse a division by 10⁴, shift the digits four places to the left instead (or multiply by 10⁴): 6.05 × 10⁴ = 60,500.`,correctionTip:`Reversing a division by a power of 10 means multiplying by that same power of 10.`},commonMistakes:[{title:`Crossing out zeros without enough of them`,wrong:`Trying to solve 830 ÷ 1,000 by crossing out zeros, since 830 does not have three trailing zeros.`,right:`830 ÷ 1,000 = 0.83, found by shifting every digit three places to the right.`,tip:`If there are not enough trailing zeros to cancel, shift the digits through the place-value chart instead.`},{title:`Moving digits in the wrong direction`,wrong:`Shifting digits to the left when dividing, as if multiplying.`,right:`Dividing by a power of 10 always shifts digits to the right.`,tip:`Say the direction rule aloud: "multiply moves left, divide moves right."`},{title:`Forgetting the placeholder zero before a decimal point`,wrong:`Writing 8 ÷ 10 as .8 instead of 0.8.`,right:`8 ÷ 10 = 0.8, with a placeholder zero in the units place.`,tip:`Always include a leading zero before a decimal point when there is no whole-number part.`}],summary:[`Dividing by a power of 10 shifts every digit to the right in the place-value chart.`,`The index of the power of 10 tells you exactly how many places to shift.`,`Placeholder zeros may be needed both before and after the decimal point.`,`"Crossing out zeros" only works when there are enough trailing zeros — the place-value shift method always works.`]},lr={id:`unit-5`,number:5,title:`Dividing Decimal Numbers by Powers of 10`,shortDescription:`Combine decimal place value with division to get precise, smaller results.`,estimatedMinutes:20,difficulty:`Intermediate`,color:`terracotta`,learningGoals:[`Divide decimal numbers by 10, 100, 1,000 and other powers of 10`,`Move digits correctly to the right through a decimal place-value chart`,`Insert placeholder zeros where needed`,`Check whether an answer should become larger or smaller before calculating`],vocabulary:[{term:`Tenths`,definition:`The first place value column to the right of the decimal point.`},{term:`Hundredths`,definition:`The second place value column to the right of the decimal point.`},{term:`Thousandths`,definition:`The third place value column to the right of the decimal point.`}],rules:[{title:`Dividing decimals by a power of 10`,content:`Dividing a decimal number by 10ⁿ shifts every digit n places to the right, exactly as with whole numbers — the digits simply move further into (or further along) the decimal places.`},{title:`Sense-checking the size of the answer`,content:`Dividing always makes a positive number smaller (or the same size). If an answer to a division by a power of 10 comes out larger than the original number, a mistake has been made.`}],introduction:`Dividing decimals by powers of 10 uses exactly the same digit-shifting idea as dividing whole numbers — the extra step is being comfortable moving digits within and beyond existing decimal places.`,workedExamples:[{id:`u5-we1`,question:`Work out 34.6 ÷ 10.`,steps:[{title:`Step 1 — Identify the power of 10`,content:`10 = 10¹, so every digit moves 1 place to the right.`},{title:`Step 2 — Move the digits`,content:`3, 4 and 6 each shift one column to the right in the place-value chart.`},{title:`Step 3 — Check the size`,content:`The result, 3.46, is smaller than 34.6, which makes sense for a division.`}],answer:`3.46`,reason:`Dividing by 10 always makes a positive number ten times smaller, matching the one-column shift to the right.`},{id:`u5-we2`,question:`Work out 17.1 ÷ 100.`,steps:[{title:`Step 1 — Identify the power of 10`,content:`100 = 10², so every digit moves 2 places to the right.`},{title:`Step 2 — Move the digits`,content:`1, 7 and 1 each shift two columns to the right.`},{title:`Step 3 — Insert a placeholder`,content:`A placeholder zero is needed in the units place, since the value is now less than 1.`}],answer:`0.171`,reason:`Shifting every digit two places to the right divides the value by exactly 100.`},{id:`u5-we3`,question:`Work out 8.95 ÷ 1,000.`,steps:[{title:`Step 1 — Read the index`,content:`1,000 = 10³, so every digit moves 3 places to the right.`},{title:`Step 2 — Move the digits`,content:`8, 9 and 5 each shift three columns to the right.`},{title:`Step 3 — Insert placeholder zeros`,content:`Two placeholder zeros are needed between the decimal point and the 8, since the shift moves the digits well past the tenths and hundredths columns.`}],answer:`0.00895`,reason:`A three-place shift on a number that starts in the units column pushes the digits into the thousandths column and beyond, requiring placeholder zeros.`}],practiceQuiz:[{id:`u5-p1`,unitId:`unit-5`,difficulty:`easy`,type:`numeric`,category:`skill`,prompt:`Work out 34.6 ÷ 10.`,correctAnswer:`3.46`,explanation:`Dividing by 10 shifts each digit of 34.6 one place to the right, giving 3.46.`,correctionTip:`Dividing by 10 always makes a number exactly ten times smaller.`},{id:`u5-p2`,unitId:`unit-5`,difficulty:`easy`,type:`numeric`,category:`skill`,prompt:`Work out 17.1 ÷ 100.`,correctAnswer:`0.171`,explanation:`Dividing by 100 shifts each digit two places to the right, giving 0.171.`,correctionTip:`Insert a placeholder zero in the units place when the result is less than 1.`},{id:`u5-p3`,unitId:`unit-5`,difficulty:`easy`,type:`mcq`,category:`skill`,prompt:`4,250 ÷ 1,000 = ?`,choices:[{id:`a`,text:`0.425`},{id:`b`,text:`4.25`},{id:`c`,text:`42.5`},{id:`d`,text:`425`}],correctChoiceId:`b`,explanation:`Dividing by 1,000 shifts the digits of 4,250 three places to the right, giving 4.25.`,correctionTip:`Count three place-value shifts carefully to place the decimal point correctly.`},{id:`u5-p4`,unitId:`unit-5`,difficulty:`easy`,type:`true-false`,category:`skill`,prompt:`True or false: 8.95 ÷ 1,000 = 0.00895.`,trueFalseAnswer:!0,explanation:`Shifting the digits of 8.95 three places to the right gives 0.00895.`,correctionTip:`Count the placeholder zeros carefully between the decimal point and the first non-zero digit.`},{id:`u5-p5`,unitId:`unit-5`,difficulty:`easy`,type:`fill-blank`,category:`skill`,prompt:`96.4 ÷ 10 = ___`,correctAnswer:`9.64`,explanation:`Dividing by 10 shifts the digits of 96.4 one place to the right, giving 9.64.`,correctionTip:`Check that your answer is exactly ten times smaller than the original number.`}],mainQuiz:[{id:`u5-m1`,unitId:`unit-5`,difficulty:`standard`,type:`numeric`,category:`skill`,prompt:`Work out 4,250 ÷ 1,000.`,correctAnswer:`4.25`,explanation:`Dividing by 1,000 shifts the digits three places to the right, giving 4.25.`,correctionTip:`Keep digits in the order 4-2-5-0 (final trailing zero can be dropped) throughout the shift.`},{id:`u5-m2`,unitId:`unit-5`,difficulty:`standard`,type:`numeric`,category:`skill`,prompt:`Work out 8.95 ÷ 1,000.`,correctAnswer:`0.00895`,explanation:`Shifting the digits of 8.95 three places to the right gives 0.00895.`,correctionTip:`Insert placeholder zeros for every column the digits pass without landing on a non-zero digit.`},{id:`u5-m3`,unitId:`unit-5`,difficulty:`standard`,type:`true-false`,category:`error-analysis`,prompt:`Fina says: "8.95 ÷ 1,000 = 8.00095, because I just moved the decimal point three places without shifting the digits." Is Fina correct?`,trueFalseAnswer:!1,explanation:`The correct answer is 0.00895. Fina moved the decimal point without correctly shifting every digit through the place-value columns, so her digits ended up in the wrong places.`,correctionTip:`Think of digits moving through fixed columns, not the decimal point jumping around the digits.`},{id:`u5-m4`,unitId:`unit-5`,difficulty:`standard`,type:`mcq`,category:`skill`,prompt:`Which power of 10 turns 96.4 into 0.0964?`,choices:[{id:`a`,text:`10¹`},{id:`b`,text:`10²`},{id:`c`,text:`10³`},{id:`d`,text:`10⁴`}],correctChoiceId:`c`,explanation:`96.4 ÷ 10³ shifts the digits three places to the right, giving 0.0964.`,correctionTip:`Count the digit shift from 96.4 to 0.0964 to find the matching index.`},{id:`u5-m5`,unitId:`unit-5`,difficulty:`standard`,type:`true-false`,category:`skill`,prompt:`True or false: dividing a positive decimal number by a power of 10 always makes it smaller or leaves it unchanged in size, never larger.`,trueFalseAnswer:!0,explanation:`Division by a whole number greater than 1 (like any power of 10 with a positive index) always makes a positive number smaller.`,correctionTip:`Use this size check to catch mistakes: if your division answer is larger than the original number, look again.`},{id:`u5-m6`,unitId:`unit-5`,difficulty:`standard`,type:`fill-blank`,category:`application`,prompt:`A container holds 62.5 litres of paint, to be split equally into 100 identical small tins. How many litres go in each tin?`,correctAnswer:`0.625`,explanation:`62.5 ÷ 100 shifts the digits two places to the right, giving 0.625 litres per tin.`,correctionTip:`Translate the word problem into a division by a power of 10 before shifting digits.`},{id:`u5-m7`,unitId:`unit-5`,difficulty:`standard`,type:`numeric`,category:`skill`,prompt:`Work out 3.2 ÷ 100.`,correctAnswer:`0.032`,explanation:`Dividing by 100 shifts the digits of 3.2 two places to the right, giving 0.032.`,correctionTip:`Add placeholder zeros before the 3 to keep it in the correct thousandths column.`},{id:`u5-m8`,unitId:`unit-5`,difficulty:`standard`,type:`mcq`,category:`error-analysis`,prompt:`Zara claims that 17.1 ÷ 100 = 1.71. What mistake has she made?`,choices:[{id:`a`,text:`She divided by 10 instead of 100 (only one place-value shift instead of two).`},{id:`b`,text:`She divided by 1,000 instead of 100.`},{id:`c`,text:`She multiplied instead of dividing.`},{id:`d`,text:`She made no mistake — 1.71 is correct.`}],correctChoiceId:`a`,explanation:`The correct answer is 0.171. Zara only shifted the digits one place to the right, which matches dividing by 10, not by 100.`,correctionTip:`Match the number of place-value shifts to the index of the power of 10, not to how many digits look "used up."`},{id:`u5-m9`,unitId:`unit-5`,difficulty:`standard`,type:`numeric`,category:`skill`,prompt:`Work out 725 ÷ 10,000.`,correctAnswer:`0.0725`,explanation:`Dividing by 10,000 shifts the digits of 725 four places to the right, giving 0.0725.`,correctionTip:`Count four shifts even though 725 is a whole number with no decimal digits shown.`},{id:`u5-m10`,unitId:`unit-5`,difficulty:`standard`,type:`true-false`,category:`skill`,prompt:`True or false: 34.6 ÷ 10 = 3.46 is ten times smaller than the original number.`,trueFalseAnswer:!0,explanation:`Dividing by 10 always produces a result exactly one-tenth of the size of the original number, and 3.46 × 10 = 34.6 confirms this.`,correctionTip:`Multiply your answer back by the power of 10 as a quick check.`}],challengeQuestion:{id:`u5-c1`,unitId:`unit-5`,difficulty:`challenge`,type:`numeric`,category:`challenge`,prompt:`A decimal number is divided by 10² and the result is 0.0479. What was the original decimal number?`,correctAnswer:`4.79`,explanation:`To reverse a division by 10², multiply the result by 10² (shift two places to the left): 0.0479 × 100 = 4.79.`,correctionTip:`Reversing a division by a power of 10 means multiplying by that same power of 10.`},commonMistakes:[{title:`Shifting the wrong number of places`,wrong:`Treating 17.1 ÷ 100 as a one-place shift, giving 1.71.`,right:`17.1 ÷ 100 = 0.171, using a two-place shift to match the index of 10².`,tip:`Always match the number of shifts to the index of the power of 10, not to the number of digits present.`},{title:`Missing placeholder zeros`,wrong:`Writing 8.95 ÷ 1,000 = 0.895 (missing two placeholder zeros).`,right:`8.95 ÷ 1,000 = 0.00895, with placeholder zeros filling the tenths and hundredths columns.`,tip:`Count every column the digits pass through, including any that end up empty.`},{title:`Producing an answer that is too large`,wrong:`Getting an answer bigger than the starting number when dividing.`,right:`Dividing a positive number by a power of 10 (index ≥ 1) should always make it smaller or the same size.`,tip:`Sense-check your answer: if it is larger than the number you started with, re-check the direction of your shift.`}],summary:[`Dividing decimals by powers of 10 shifts every digit to the right, exactly as with whole numbers.`,`Placeholder zeros may be needed on either side of the decimal point.`,`A correct division answer should always be the same size as or smaller than the original positive number.`,`Check your answer by multiplying it back by the same power of 10.`]},ur={id:`unit-6`,number:6,title:`Metric Unit Conversions`,shortDescription:`Use powers of 10 to move confidently between millimetres, centimetres, metres and kilometres.`,estimatedMinutes:25,difficulty:`Intermediate`,color:`plum`,learningGoals:[`Recall the key metric length conversion facts (mm, cm, m, km)`,`Decide whether to multiply or divide when converting between units`,`Convert between millimetres and kilometres using multi-step conversions`,`Write and use simple conversion formulas`],vocabulary:[{term:`Metric system`,definition:`A system of measurement based on powers of 10, used for length, mass and capacity.`},{term:`Millimetre (mm)`,definition:`A small metric unit of length; there are 10 mm in 1 cm.`},{term:`Conversion factor`,definition:`The power of 10 you multiply or divide by to change from one metric unit to another.`}],rules:[{title:`Key length conversion facts`,content:`1 cm = 10 mm.  1 m = 100 cm.  1 km = 1,000 m.  Combining these: 1 m = 1,000 mm, and 1 km = 1,000,000 mm.`},{title:`Choosing multiply or divide`,content:`Converting from a smaller unit to a larger unit (for example mm to km) means dividing. Converting from a larger unit to a smaller unit (for example km to mm) means multiplying.`}],introduction:`Every metric length conversion is really a multiplication or division by a power of 10. Once you know the key facts — 10 mm in a cm, 100 cm in a metre, 1,000 m in a kilometre — you can convert confidently in either direction.`,workedExamples:[{id:`u6-we1`,question:`Convert 150 mm to cm.`,steps:[{title:`Step 1 — Recall the fact`,content:`1 cm = 10 mm, so converting mm to cm means dividing by 10.`},{title:`Step 2 — Divide by 10`,content:`150 ÷ 10 shifts the digits one place to the right.`},{title:`Step 3 — Write the answer`,content:`150 ÷ 10 = 15.`}],answer:`15 cm`,reason:`Millimetres are a smaller unit than centimetres, so converting to the larger unit requires dividing.`},{id:`u6-we2`,question:`Convert 9 km to mm.`,steps:[{title:`Step 1 — Recall the fact`,content:`1 km = 1,000,000 mm (combining 1 km = 1,000 m and 1 m = 1,000 mm).`},{title:`Step 2 — Multiply`,content:`Converting km to mm means multiplying by 1,000,000 (10⁶).`},{title:`Step 3 — Calculate`,content:`9 × 1,000,000 shifts the digit 9 six places to the left.`}],answer:`9,000,000 mm`,reason:`Kilometres are a much larger unit than millimetres, so converting to the smaller unit requires multiplying by a large power of 10.`},{id:`u6-we3`,question:`Convert 15,600,000 mm to km.`,steps:[{title:`Step 1 — Recall the fact`,content:`1 km = 1,000,000 mm, so converting mm to km means dividing by 1,000,000 (10⁶).`},{title:`Step 2 — Divide`,content:`15,600,000 ÷ 1,000,000 shifts the digits six places to the right.`},{title:`Step 3 — Write the answer`,content:`15,600,000 ÷ 1,000,000 = 15.6.`}],answer:`15.6 km`,reason:`Converting from the smaller unit (mm) to the larger unit (km) always means dividing by the conversion factor.`}],practiceQuiz:[{id:`u6-p1`,unitId:`unit-6`,difficulty:`easy`,type:`numeric`,category:`skill`,prompt:`Convert 80 mm to cm.`,correctAnswer:`8`,acceptedAnswers:[`8`,`8 cm`,`8cm`],requiresUnits:`Answer in cm.`,explanation:`80 mm ÷ 10 = 8 cm, since there are 10 mm in every cm.`,correctionTip:`Dividing by 10 converts millimetres to centimetres.`,visual:`metric-ladder`,visualData:{fromUnit:`mm`,toUnit:`cm`,factor:10,operation:`divide`}},{id:`u6-p2`,unitId:`unit-6`,difficulty:`easy`,type:`numeric`,category:`skill`,prompt:`Convert 150 mm to cm.`,correctAnswer:`15`,acceptedAnswers:[`15`,`15 cm`,`15cm`],requiresUnits:`Answer in cm.`,explanation:`150 mm ÷ 10 = 15 cm.`,correctionTip:`Every 10 mm is equal to 1 cm.`},{id:`u6-p3`,unitId:`unit-6`,difficulty:`easy`,type:`mcq`,category:`skill`,prompt:`Which operation converts a length in metres into a length in centimetres?`,choices:[{id:`a`,text:`Divide by 100`},{id:`b`,text:`Multiply by 100`},{id:`c`,text:`Multiply by 1,000`},{id:`d`,text:`Divide by 1,000`}],correctChoiceId:`b`,explanation:`There are 100 cm in 1 m, and centimetres are smaller, so converting m to cm means multiplying by 100.`,correctionTip:`Converting to a smaller unit always means multiplying.`},{id:`u6-p4`,unitId:`unit-6`,difficulty:`easy`,type:`true-false`,category:`skill`,prompt:`True or false: 1 km = 1,000,000 mm.`,trueFalseAnswer:!0,explanation:`1 km = 1,000 m, and 1 m = 1,000 mm, so 1 km = 1,000 × 1,000 = 1,000,000 mm.`,correctionTip:`Chain the two facts together: km to m, then m to mm.`},{id:`u6-p5`,unitId:`unit-6`,difficulty:`easy`,type:`fill-blank`,category:`skill`,prompt:`Converting a length from mm to km requires dividing by ___.`,correctAnswer:`1000000`,acceptedAnswers:[`1000000`,`1,000,000`,`10^6`],explanation:`Since 1 km = 1,000,000 mm, converting mm to km means dividing by 1,000,000.`,correctionTip:`Multiply the mm-to-m and m-to-km factors together: 1,000 × 1,000 = 1,000,000.`}],mainQuiz:[{id:`u6-m1`,unitId:`unit-6`,difficulty:`standard`,type:`numeric`,category:`skill`,prompt:`Convert 9 km to mm.`,correctAnswer:`9000000`,acceptedAnswers:[`9000000`,`9,000,000`,`9000000 mm`,`9,000,000 mm`],requiresUnits:`Answer in mm.`,explanation:`9 km × 1,000,000 = 9,000,000 mm.`,correctionTip:`Converting km to mm means multiplying by 1,000,000 (10⁶).`},{id:`u6-m2`,unitId:`unit-6`,difficulty:`standard`,type:`numeric`,category:`skill`,prompt:`Convert 0.6 km to mm.`,correctAnswer:`600000`,acceptedAnswers:[`600000`,`600,000`,`600000 mm`,`600,000 mm`],requiresUnits:`Answer in mm.`,explanation:`0.6 km × 1,000,000 = 600,000 mm.`,correctionTip:`Multiplying a decimal by 10⁶ still follows the digit-shifting rule from Unit 3.`},{id:`u6-m3`,unitId:`unit-6`,difficulty:`standard`,type:`numeric`,category:`skill`,prompt:`Convert 90,000,000 mm to km.`,correctAnswer:`90`,acceptedAnswers:[`90`,`90 km`,`90km`],requiresUnits:`Answer in km.`,explanation:`90,000,000 mm ÷ 1,000,000 = 90 km.`,correctionTip:`Converting mm to km means dividing by 1,000,000.`},{id:`u6-m4`,unitId:`unit-6`,difficulty:`standard`,type:`numeric`,category:`skill`,prompt:`Convert 770,000 mm to km.`,correctAnswer:`0.77`,acceptedAnswers:[`0.77`,`0.77 km`,`.77 km`],requiresUnits:`Answer in km.`,explanation:`770,000 mm ÷ 1,000,000 = 0.77 km.`,correctionTip:`Dividing by 1,000,000 shifts the digits six places to the right.`},{id:`u6-m5`,unitId:`unit-6`,difficulty:`standard`,type:`mcq`,category:`error-analysis`,prompt:`Arun converts 90,000,000 mm to km and gets 9,000 km. What mistake has he most likely made?`,choices:[{id:`a`,text:`He divided by 10,000 instead of 1,000,000.`},{id:`b`,text:`He multiplied instead of dividing.`},{id:`c`,text:`He divided by 100 instead of 1,000,000.`},{id:`d`,text:`He made no mistake.`}],correctChoiceId:`a`,explanation:`The correct answer is 90 km. Dividing 90,000,000 by 10,000 gives 9,000, which shows Arun used the wrong conversion factor.`,correctionTip:`Always double-check the conversion factor (1,000,000 for mm to km) before dividing.`},{id:`u6-m6`,unitId:`unit-6`,difficulty:`standard`,type:`true-false`,category:`skill`,prompt:`True or false: converting from millimetres to kilometres always requires multiplying.`,trueFalseAnswer:!1,explanation:`Millimetres are a smaller unit than kilometres, so converting mm to km requires dividing, not multiplying.`,correctionTip:`Converting from a smaller unit to a larger unit always means dividing.`},{id:`u6-m7`,unitId:`unit-6`,difficulty:`standard`,type:`fill-blank`,category:`application`,prompt:`A running track is 15,600,000 mm long. Write this length in km.`,correctAnswer:`15.6`,acceptedAnswers:[`15.6`,`15.6 km`],explanation:`15,600,000 mm ÷ 1,000,000 = 15.6 km.`,correctionTip:`Convert to a more sensible unit for the context — kilometres suit long distances better than millimetres.`},{id:`u6-m8`,unitId:`unit-6`,difficulty:`standard`,type:`mcq`,category:`application`,prompt:`A wire is 0.6 km long and needs to be cut into 1 mm pieces. How many pieces can be cut?`,choices:[{id:`a`,text:`600`},{id:`b`,text:`6,000`},{id:`c`,text:`60,000`},{id:`d`,text:`600,000`}],correctChoiceId:`d`,explanation:`0.6 km = 600,000 mm, so 600,000 one-millimetre pieces can be cut.`,correctionTip:`Convert the whole length to millimetres first, then count the pieces.`},{id:`u6-m9`,unitId:`unit-6`,difficulty:`standard`,type:`matching`,category:`skill`,prompt:`Match each conversion to the correct operation and factor.`,matchPairs:[{id:`m1`,left:`mm to cm`,right:`divide by 10`},{id:`m2`,left:`cm to m`,right:`divide by 100`},{id:`m3`,left:`m to km`,right:`divide by 1,000`},{id:`m4`,left:`km to mm`,right:`multiply by 1,000,000`}],explanation:`Converting to a larger unit means dividing; converting to a smaller unit means multiplying — and the factor depends on how many steps apart the units are.`,correctionTip:`Break multi-step conversions (like km to mm) into the individual conversion facts first.`},{id:`u6-m10`,unitId:`unit-6`,difficulty:`standard`,type:`numeric`,category:`skill`,prompt:`Convert 2.4 m to mm.`,correctAnswer:`2400`,acceptedAnswers:[`2400`,`2,400`,`2400 mm`,`2,400 mm`],requiresUnits:`Answer in mm.`,explanation:`1 m = 1,000 mm, so 2.4 m × 1,000 = 2,400 mm.`,correctionTip:`Use 1 m = 1,000 mm directly rather than converting through centimetres.`}],challengeQuestion:{id:`u6-c1`,unitId:`unit-6`,difficulty:`challenge`,type:`numeric`,category:`challenge`,prompt:`A cyclist rides 2,350,000 mm. Convert this distance to km, then state how many complete 5 km laps of a track this distance covers.`,correctAnswer:`0`,acceptedAnswers:[`0`,`0 laps`],explanation:`2,350,000 mm ÷ 1,000,000 = 2.35 km. Since 2.35 km is less than one 5 km lap, the cyclist completes 0 whole laps (only part-way through a first lap).`,correctionTip:`Convert to a common unit first, then compare carefully — a distance can convert to a sensible number while still being less than a target amount.`},commonMistakes:[{title:`Multiplying when division is required`,wrong:`Converting 90,000,000 mm to km by multiplying, giving an enormous number.`,right:`Millimetres are smaller than kilometres, so converting to km means dividing: 90,000,000 ÷ 1,000,000 = 90 km.`,tip:`Ask "am I converting to a bigger or smaller unit?" before choosing to multiply or divide.`},{title:`Using the wrong conversion factor`,wrong:`Dividing by 1,000 instead of 1,000,000 when converting mm to km.`,right:`The correct factor for mm to km is 1,000,000, combining the mm-to-m and m-to-km steps.`,tip:`Write out each intermediate step (mm → m → km) if a direct factor feels uncertain.`},{title:`Forgetting units in the final answer`,wrong:`Writing "90" without stating km, cm or mm.`,right:`Every converted measurement should include its unit, for example "90 km".`,tip:`Always check the question to see which unit the final answer should be given in.`}],summary:[`1 cm = 10 mm, 1 m = 100 cm, 1 km = 1,000 m, and 1 km = 1,000,000 mm.`,`Converting to a larger unit means dividing; converting to a smaller unit means multiplying.`,`Multi-step conversions (such as mm to km) can be solved directly using a combined conversion factor.`,`Always include the correct unit in your final answer.`]},dr={id:`unit-7`,number:7,title:`Introduction to Rounding`,shortDescription:`Learn why we round numbers and master the golden rounding rule.`,estimatedMinutes:20,difficulty:`Foundation`,color:`yellow`,learningGoals:[`Explain why numbers are rounded in real life`,`Identify the rounding digit for a given degree of accuracy`,`Apply the rounding rule using the digit immediately to the right`,`Round whole numbers to the nearest 10, 100, 1,000 or 1,000,000`],vocabulary:[{term:`Exact value`,definition:`The true, precise value of a number, with no rounding applied.`},{term:`Approximate value`,definition:`A value that has been rounded and is close to, but not exactly equal to, the exact value.`},{term:`Degree of accuracy`,definition:`How precise a rounded answer should be, for example "to the nearest thousand" or "to 2 decimal places".`},{term:`Rounding digit`,definition:`The digit in the place value column you are rounding to.`}],rules:[{title:`The rounding rule`,content:`Find the rounding digit for the required degree of accuracy, then look at the digit immediately to its right. If that digit is 5 or more, increase the rounding digit by 1. If it is less than 5, leave the rounding digit unchanged. Every digit to the right of the rounding digit becomes a placeholder zero (for whole numbers) or is removed (for decimals).`},{title:`Why we round`,content:`Exact values are not always necessary or practical. Rounded values are easier to read, compare and communicate — for example in news reports, population data, or survey results — while still being close enough to the exact value to be useful.`}],introduction:`You meet rounded numbers every day — in news headlines, population statistics, and survey results. Rounding makes numbers easier to read and compare, as long as you apply the rounding rule consistently and understand the degree of accuracy you have been asked for.`,workedExamples:[{id:`u7-we1`,question:`A newspaper reports that 74,836 fans attended a football match. Round this attendance to the nearest thousand.`,steps:[{title:`Step 1 — Find the rounding digit`,content:`Rounding to the nearest thousand means the rounding digit is the thousands digit: 4.`},{title:`Step 2 — Check the digit to the right`,content:`The digit immediately to the right (hundreds) is 8.`},{title:`Step 3 — Apply the rule`,content:`8 is 5 or more, so the thousands digit increases from 4 to 5. All digits to the right become zeros.`}],answer:`75,000`,reason:`Rounding to the nearest thousand gives a number that is easier to read and compare, while remaining very close to the true attendance.`},{id:`u7-we2`,question:`A survey received 8,432 responses. Round this number to the nearest hundred.`,steps:[{title:`Step 1 — Find the rounding digit`,content:`Rounding to the nearest hundred means the rounding digit is the hundreds digit: 4.`},{title:`Step 2 — Check the digit to the right`,content:`The digit immediately to the right (tens) is 3.`},{title:`Step 3 — Apply the rule`,content:`3 is less than 5, so the hundreds digit stays as 4. The digits to the right become zeros.`}],answer:`8,400`,reason:`Since the tens digit was less than 5, the rounding digit did not change.`},{id:`u7-we3`,question:`A country recorded a population of 158,570,535. Round this population to the nearest million.`,steps:[{title:`Step 1 — Find the rounding digit`,content:`Rounding to the nearest million means the rounding digit is the millions digit: 8.`},{title:`Step 2 — Check the digit to the right`,content:`The digit immediately to the right (hundred-thousands) is 5.`},{title:`Step 3 — Apply the rule`,content:`5 is 5 or more, so the millions digit increases from 8 to 9. All digits to the right become zeros.`}],answer:`159,000,000`,reason:`Rounding very large statistics to the nearest million is common in population data, making the figures much easier to compare.`}],practiceQuiz:[{id:`u7-p1`,unitId:`unit-7`,difficulty:`easy`,type:`mcq`,category:`skill`,prompt:`When rounding 6,472 to the nearest hundred, which digit do you check to decide whether to round up?`,choices:[{id:`a`,text:`The hundreds digit (4)`},{id:`b`,text:`The tens digit (7)`},{id:`c`,text:`The units digit (2)`},{id:`d`,text:`The thousands digit (6)`}],correctChoiceId:`b`,explanation:`The rounding digit is the hundreds digit (4). You always check the digit immediately to its right, which is the tens digit (7).`,correctionTip:`The digit you check is always one place value smaller than the rounding digit.`},{id:`u7-p2`,unitId:`unit-7`,difficulty:`easy`,type:`numeric`,category:`skill`,prompt:`Round 3,842 to the nearest hundred.`,correctAnswer:`3800`,acceptedAnswers:[`3800`,`3,800`],explanation:`The tens digit (4) is less than 5, so the hundreds digit stays as 8, giving 3,800.`,correctionTip:`Only change the rounding digit if the digit to its right is 5 or more.`},{id:`u7-p3`,unitId:`unit-7`,difficulty:`easy`,type:`true-false`,category:`skill`,prompt:`True or false: the degree of accuracy tells you how precise a rounded answer needs to be.`,trueFalseAnswer:!0,explanation:`The degree of accuracy — such as "to the nearest thousand" or "to 2 decimal places" — always tells you exactly how precise your final answer must be.`,correctionTip:`Always identify the degree of accuracy before you start rounding.`},{id:`u7-p4`,unitId:`unit-7`,difficulty:`easy`,type:`fill-blank`,category:`skill`,prompt:`Round 27,500 to the nearest thousand.`,correctAnswer:`28000`,acceptedAnswers:[`28000`,`28,000`],explanation:`The hundreds digit (5) is 5 or more, so the thousands digit increases from 7 to 8, giving 28,000.`,correctionTip:`A digit of exactly 5 always rounds up, following the standard rounding rule.`},{id:`u7-p5`,unitId:`unit-7`,difficulty:`easy`,type:`mcq`,category:`skill`,prompt:`Which of these numbers rounds to 450 when rounded to the nearest ten?`,choices:[{id:`a`,text:`441`},{id:`b`,text:`449`},{id:`c`,text:`455`},{id:`d`,text:`444`}],correctChoiceId:`b`,explanation:`449 rounds to 450, because the units digit (9) is 5 or more, so the tens digit rounds up from 4 to 5.`,correctionTip:`Check each option's units digit against the rounding rule before choosing.`}],mainQuiz:[{id:`u7-m1`,unitId:`unit-7`,difficulty:`standard`,type:`numeric`,category:`application`,prompt:`A charity concert attendance was 15,472 people. Round this figure to the nearest thousand.`,correctAnswer:`15000`,acceptedAnswers:[`15000`,`15,000`],explanation:`The hundreds digit (4) is less than 5, so the thousands digit stays as 5, giving 15,000.`,correctionTip:`Always identify the rounding digit before checking the digit to its right.`},{id:`u7-m2`,unitId:`unit-7`,difficulty:`standard`,type:`numeric`,category:`skill`,prompt:`Round 2,995 to the nearest ten.`,correctAnswer:`3000`,acceptedAnswers:[`3000`,`3,000`],explanation:`The units digit (5) is 5 or more, so the tens digit (9) rounds up. This causes the 9 to become 10, which carries over: 2,995 rounds to 3,000.`,correctionTip:`When rounding up a 9, remember it may carry into the next place value column, just like in addition.`},{id:`u7-m3`,unitId:`unit-7`,difficulty:`standard`,type:`true-false`,category:`error-analysis`,prompt:`Liam rounds 6,349 to the nearest hundred and checks the hundreds digit itself instead of the tens digit. Is this the correct digit to check?`,trueFalseAnswer:!1,explanation:`To round to the nearest hundred, you check the tens digit (the digit immediately to the right of the hundreds digit), not the hundreds digit itself.`,correctionTip:`Always check the digit one place value smaller than the rounding digit — never the rounding digit itself.`},{id:`u7-m4`,unitId:`unit-7`,difficulty:`standard`,type:`mcq`,category:`application`,prompt:`A country's population is 7,122,508. Round this population to the nearest million.`,choices:[{id:`a`,text:`7,000,000`},{id:`b`,text:`7,100,000`},{id:`c`,text:`8,000,000`},{id:`d`,text:`7,200,000`}],correctChoiceId:`a`,explanation:`The rounding digit is the millions digit (7). The digit to its right (hundred-thousands) is 1, which is less than 5, so the millions digit stays as 7: 7,000,000.`,correctionTip:`Do not confuse "nearest million" with "nearest hundred-thousand" — check which place value the question asks for.`},{id:`u7-m5`,unitId:`unit-7`,difficulty:`standard`,type:`fill-blank`,category:`skill`,prompt:`Round 495,000 to the nearest hundred thousand.`,correctAnswer:`500000`,acceptedAnswers:[`500000`,`500,000`],explanation:`The rounding digit is the hundred-thousands digit (4). The digit to its right (ten-thousands) is 9, which is 5 or more, so 4 rounds up to 5: 500,000.`,correctionTip:`Carrying can affect more than one digit — check the whole number after rounding up.`},{id:`u7-m6`,unitId:`unit-7`,difficulty:`standard`,type:`true-false`,category:`skill`,prompt:`True or false: rounding a number always makes it easier to compare with other rounded numbers.`,trueFalseAnswer:!0,explanation:`Rounded numbers are typically easier to read and compare than long exact values, which is one of the main reasons rounding is used in reports and statistics.`,correctionTip:`Remember that ease of comparison is one of the key real-world reasons for rounding.`},{id:`u7-m7`,unitId:`unit-7`,difficulty:`standard`,type:`mcq`,category:`error-analysis`,prompt:`Sofia rounds 12,499 to the nearest thousand and gets 13,000. What mistake has she made?`,choices:[{id:`a`,text:`She checked the hundreds digit (4) but treated it as if it were 5 or more.`},{id:`b`,text:`She rounded to the nearest hundred instead of the nearest thousand.`},{id:`c`,text:`She made no mistake — 13,000 is correct.`},{id:`d`,text:`She should have rounded down to 11,000.`}],correctChoiceId:`a`,explanation:`The correct answer is 12,000. The hundreds digit is 4, which is less than 5, so the thousands digit should stay as 2, not round up to 3.`,correctionTip:`Double-check the value of the digit to the right before deciding to round up.`},{id:`u7-m8`,unitId:`unit-7`,difficulty:`standard`,type:`numeric`,category:`application`,prompt:`A phone company records 74,192,350 active phone connections. Round this number to the nearest ten million.`,correctAnswer:`70000000`,acceptedAnswers:[`70000000`,`70,000,000`],explanation:`The rounding digit is the ten-millions digit (7). The digit to its right (millions) is 4, which is less than 5, so 7 stays as 7: 70,000,000.`,correctionTip:`Large numbers can be rounded to any place value — always confirm exactly which one the question requires.`},{id:`u7-m9`,unitId:`unit-7`,difficulty:`standard`,type:`mcq`,category:`skill`,prompt:`Which degree of accuracy has been used if 253,674 is rounded to 254,000?`,choices:[{id:`a`,text:`Nearest ten`},{id:`b`,text:`Nearest hundred`},{id:`c`,text:`Nearest thousand`},{id:`d`,text:`Nearest ten thousand`}],correctChoiceId:`c`,explanation:`Since the last three digits became zeros and the thousands digit changed from 3 to 4, the number was rounded to the nearest thousand.`,correctionTip:`Compare the original and rounded numbers digit by digit to work out which place value was used.`},{id:`u7-m10`,unitId:`unit-7`,difficulty:`standard`,type:`true-false`,category:`error-analysis`,prompt:`Zara says a rounded number is always bigger than the original exact number. True or false?`,trueFalseAnswer:!1,explanation:`A rounded number can be bigger, smaller, or (in rare
