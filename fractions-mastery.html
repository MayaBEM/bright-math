7`,key:`1cofks`}],[`path`,{d:`M11 13c1.93 1.93 2.83 4.17 2 5-.83.83-3.07-.07-5-2-1.93-1.93-2.83-4.17-2-5 .83-.83 3.07.07 5 2Z`,key:`4kbmks`}]]),pm=Yp(`printer`,[[`path`,{d:`M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2`,key:`143wyd`}],[`path`,{d:`M6 9V3a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v6`,key:`1itne7`}],[`rect`,{x:`6`,y:`14`,width:`12`,height:`8`,rx:`1`,key:`1ue0tg`}]]),mm=Yp(`rotate-ccw`,[[`path`,{d:`M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8`,key:`1357e3`}],[`path`,{d:`M3 3v5h5`,key:`1xhq8a`}]]),hm=Yp(`shield-check`,[[`path`,{d:`M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z`,key:`oel41y`}],[`path`,{d:`m9 12 2 2 4-4`,key:`dzmm74`}]]),gm=Yp(`sparkles`,[[`path`,{d:`M11.017 2.814a1 1 0 0 1 1.966 0l1.051 5.558a2 2 0 0 0 1.594 1.594l5.558 1.051a1 1 0 0 1 0 1.966l-5.558 1.051a2 2 0 0 0-1.594 1.594l-1.051 5.558a1 1 0 0 1-1.966 0l-1.051-5.558a2 2 0 0 0-1.594-1.594l-5.558-1.051a1 1 0 0 1 0-1.966l5.558-1.051a2 2 0 0 0 1.594-1.594z`,key:`1s2grr`}],[`path`,{d:`M20 2v4`,key:`1rf3ol`}],[`path`,{d:`M22 4h-4`,key:`gwowj6`}],[`circle`,{cx:`4`,cy:`20`,r:`2`,key:`6kqj1y`}]]),_m=Yp(`triangle-alert`,[[`path`,{d:`m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3`,key:`wmoenq`}],[`path`,{d:`M12 9v4`,key:`juzpu7`}],[`path`,{d:`M12 17h.01`,key:`p32p05`}]]),vm=Yp(`x`,[[`path`,{d:`M18 6 6 18`,key:`1bl5f8`}],[`path`,{d:`m6 6 12 12`,key:`d8bk6v`}]]),ym={id:`ordering-fractions`,code:`7.1`,slug:`ordering-fractions`,title:`Ordering Fractions`,shortTitle:`Ordering Fractions`,color:`gold`,summary:`Compare and order fractions confidently using two reliable methods — common denominators and decimals — including fractions that turn into recurring decimals.`,learningGoals:[`Compare two fractions using a common denominator.`,`Compare two fractions by converting them to decimals.`,`Recognise and write recurring decimals using dot notation.`,`Put a mixed list of fractions in order of size.`],sections:[{id:`compare-denominator`,heading:`Comparing with a common denominator`,body:[`To put fractions in order of size, you first need a fair way to compare them. One reliable method is to rewrite every fraction so that they all share the same denominator — a common denominator.`,`Once the denominators match, you can compare the fractions just by looking at the numerators. For example, to compare [[1/2]] and [[2/3]], rewrite them both with a denominator of 6: [[1/2]] = [[3/6]] and [[2/3]] = [[4/6]]. Since 4 is bigger than 3, [[2/3]] is the larger fraction.`,`If a fraction is improper — meaning the numerator is bigger than the denominator — it helps to change it to a mixed number first, then compare whole-number parts before comparing the fractional parts.`],visual:`number-line`,visualData:{n1:1,d1:2,n2:2,d2:3,min:0,max:1}},{id:`compare-decimals`,heading:`Comparing with decimals — and recurring decimals`,body:[`A second method is to change each fraction into a decimal by dividing the numerator by the denominator, then compare the decimals directly.`,`Sometimes this division never ends. For example, [[1/7]] = 0.1428... — the digits keep going forever. When a fraction produces a decimal like this, it is called a recurring (or repeating) decimal.`,`Mathematicians use a dot above a digit to show it recurs forever, so you do not have to write out endless digits. [[2/3]] = 0.666... is written as 0.6 with a dot over the 6. [[21/37]] = 0.567567567... is written as 0.567 with dots over the first 5 and the last 7, to show that the whole block "567" repeats.`],facts:[{title:`Recurring decimal notation`,body:`A single dot above one digit means just that digit repeats forever, e.g. [[2/3]] = 0.6666... A dot above the first and last digit of a block means the whole block repeats, e.g. [[21/37]] = 0.567567567...`}]},{id:`fractions-history`,heading:`Fractions through history`,body:[`The word "fraction" comes from the Latin word fractio, meaning "breaking into pieces". As far back as 1800 BCE, the ancient Egyptians were already writing fractions — using picture symbols called hieroglyphs.`,`The ancient Egyptians only ever wrote fractions with a numerator of 1. To show a symbol was a fraction rather than a whole number, they drew a small "mouth" picture (meaning "part") above the hieroglyph number. So the number 5 with a mouth above it meant [[1/5]], and the number 100 with a mouth above it meant [[1/100]].`,`You still meet fractions everywhere in daily life — from a road sign reading "Lijuan 2 3/4 km" away, to a shop sale sign offering "1/4 off", to a recipe that calls for [[1/2]] tsp of salt and [[2 1/2]] tsp of baking powder.`],facts:[{title:`Did you know?`,body:`Every ancient Egyptian fraction (except [[2/3]]) had to be written as a sum of different unit fractions — fractions with numerator 1, like [[1/2]] + [[1/8]] — because they had no symbol for anything else.`}]}],workedExamples:[{id:`we1`,title:`Ordering three fractions`,problem:`Write these fractions in order of size, starting with the smallest: [[3/2]], [[2/3]] and [[8/5]].`,visual:`number-line`,visualData:{n1:2,d1:3,min:0,max:2,n2:1,whole2:1,d2:2,n3:3,whole3:1,d3:5},steps:[{label:`Write improper fractions as mixed numbers`,detail:`[[3/2]] = [[1 1/2]] and [[8/5]] = [[1 3/5]]. The fraction [[2/3]] is already less than 1, so it is smaller than both of these mixed numbers.`},{label:`Compare the two mixed numbers`,detail:`Write [[1 1/2]] and [[1 3/5]] with a common denominator of 10: [[1 5/10]] and [[1 6/10]]. Since [[5/10]] is less than [[6/10]], [[1 1/2]] is less than [[1 3/5]].`},{label:`Write the final order`,detail:`Using the original fractions from the question, the order from smallest to largest is [[2/3]], [[3/2]], [[8/5]].`}],answer:`[[2/3]], [[3/2]], [[8/5]]`},{id:`we2`,title:`Comparing with decimals`,problem:`Use decimals to decide which fraction is larger: [[2 6/11]] or [[23/9]]?`,steps:[{label:`Write the improper fraction as a mixed number`,detail:`[[23/9]] = [[2 5/9]]. Both numbers now have the same whole-number part, 2, so you only need to compare the fractional parts, [[6/11]] and [[5/9]].`},{label:`Convert both fractional parts to decimals`,detail:`[[6/11]] = 6 ÷ 11 = 0.5454..., which is written as 0.54 (with dots over the 5 and 4). [[5/9]] = 5 ÷ 9 = 0.5555..., which is written as 0.5 (with a dot over the 5).`},{label:`Compare the decimals`,detail:`0.555... is greater than 0.545..., so [[5/9]] is greater than [[6/11]]. That means [[23/9]] (which equals [[2 5/9]]) is greater than [[2 6/11]].`}],answer:`[[23/9]] is larger`},{id:`we3`,title:`Ordering fractions with the division method`,problem:`Write these fractions in order of size, starting with the smallest: [[11/6]], [[19/11]] and [[17/9]].`,steps:[{label:`Divide to find each decimal`,detail:`[[11/6]] = 11 ÷ 6 = 1.8333... ; [[19/11]] = 19 ÷ 11 = 1.7272... ; [[17/9]] = 17 ÷ 9 = 1.8888...`},{label:`Compare the decimals`,detail:`1.7272... is the smallest, then 1.8333..., then 1.8888... is the largest.`}],answer:`[[19/11]], [[11/6]], [[17/9]]`}],commonMistakes:[{id:`cm1`,student:`Priya`,scenario:`Priya was asked which is bigger, [[3/4]] or [[5/9]]. She looked only at the numerators and said [[5/9]] must be bigger, because 5 is a bigger number than 3.`,wrongWorking:`5 is bigger than 3, so [[5/9]] must be bigger than [[3/4]].`,wrongAnswer:`Priya's answer: [[5/9]] is bigger. This is incorrect.`,correctWorking:`Rewrite both fractions with a common denominator of 36: [[3/4]] = [[27/36]] and [[5/9]] = [[20/36]]. Since 27 is bigger than 20, [[3/4]] is actually the bigger fraction.`,correctAnswer:`Correct answer: [[3/4]] is bigger.`,tip:`You can only compare numerators directly once the denominators are the same. With different denominators, always convert to a common denominator (or to decimals) before comparing.`}],practiceQuestions:[{id:`l1q1`,lessonId:`ordering-fractions`,type:`mcq`,category:`skill`,prompt:`Which symbol correctly compares [[5/8]] and [[3/8]]?`,choices:[{id:`a`,label:`[[5/8]] > [[3/8]]`},{id:`b`,label:`[[5/8]] < [[3/8]]`},{id:`c`,label:`[[5/8]] = [[3/8]]`}],correctChoiceId:`a`,explanation:`Since both fractions already share the denominator 8, you can compare the numerators directly: 5 is greater than 3, so [[5/8]] is greater than [[3/8]].`,hint:`When two fractions already have the same denominator, just compare the numerators.`},{id:`l1q2`,lessonId:`ordering-fractions`,type:`true-false`,category:`skill`,prompt:`True or false: [[2/3]] = [[10/15]].`,trueFalseAnswer:!0,explanation:`Multiplying the numerator and denominator of [[2/3]] by 5 gives [[10/15]], so the two fractions are equivalent.`,hint:`Try multiplying the numerator and denominator of [[2/3]] by the same number.`},{id:`l1q3`,lessonId:`ordering-fractions`,type:`true-false`,category:`skill`,prompt:`True or false: [[3/5]] = [[13/20]].`,trueFalseAnswer:!1,explanation:`[[3/5]] = [[12/20]] (multiplying numerator and denominator by 4), and [[12/20]] is not equal to [[13/20]], so the fractions are not equal.`,correctionTip:`Always multiply numerator and denominator by the same number when finding an equivalent fraction.`,hint:`Rewrite [[3/5]] with a denominator of 20 and compare numerators.`},{id:`l1q4`,lessonId:`ordering-fractions`,type:`mcq`,category:`skill`,prompt:`What is the correct symbol between [[25/12]] and [[2 1/4]]?`,choices:[{id:`a`,label:`[[25/12]] < [[2 1/4]]`},{id:`b`,label:`[[25/12]] > [[2 1/4]]`},{id:`c`,label:`[[25/12]] = [[2 1/4]]`}],correctChoiceId:`a`,explanation:`[[25/12]] = [[2 1/12]]. Using a common denominator of 12, [[2 1/4]] = [[2 3/12]]. Since [[1/12]] is less than [[3/12]], [[25/12]] is less than [[2 1/4]].`,hint:`Change [[25/12]] to a mixed number first.`},{id:`l1q5`,lessonId:`ordering-fractions`,type:`numeric-fraction`,category:`skill`,prompt:`Write [[15/4]] as a mixed number in its simplest form.`,correctFrac:{whole:3,n:3,d:4},explanation:`15 ÷ 4 = 3 remainder 3, so [[15/4]] = [[3 3/4]].`,hint:`How many whole 4s fit into 15? What is left over?`},{id:`l1q6`,lessonId:`ordering-fractions`,type:`mcq`,category:`application`,prompt:`Which fraction is larger, [[47/6]] or [[31/4]]?`,choices:[{id:`a`,frac:{n:47,d:6}},{id:`b`,frac:{n:31,d:4}}],correctChoiceId:`a`,explanation:`[[47/6]] = 7.8333... and [[31/4]] = 7.75. Since 7.8333... is greater than 7.75, [[47/6]] is the larger fraction.`,hint:`Try converting both fractions to decimals.`},{id:`l1q7`,lessonId:`ordering-fractions`,type:`mcq`,category:`application`,prompt:`Which fraction is larger, [[33/4]] or [[42/5]]?`,choices:[{id:`a`,frac:{n:33,d:4}},{id:`b`,frac:{n:42,d:5}}],correctChoiceId:`b`,explanation:`[[33/4]] = 8.25 and [[42/5]] = 8.4. Since 8.4 is greater than 8.25, [[42/5]] is the larger fraction.`,hint:`Try converting both fractions to decimals.`},{id:`l1q8`,lessonId:`ordering-fractions`,type:`order`,category:`application`,prompt:`Put these fraction cards in order of size, starting with the smallest.`,orderItems:[{id:`a`,label:`[[13/10]]`},{id:`b`,label:`[[7/12]]`},{id:`c`,label:`[[7/5]]`},{id:`d`,label:`[[1/4]]`}],correctOrder:[`d`,`b`,`a`,`c`],explanation:`As decimals: [[1/4]] = 0.25, [[7/12]] = 0.583..., [[13/10]] = 1.3, [[7/5]] = 1.4. So the order from smallest to largest is [[1/4]], [[7/12]], [[13/10]], [[7/5]].`,hint:`Try converting every card to a decimal.`},{id:`l1q9`,lessonId:`ordering-fractions`,type:`matching`,category:`application`,prompt:`Match each fraction to its correct decimal.`,matchPairs:[{id:`a`,left:`[[7/3]]`,right:`2.33...`},{id:`b`,left:`[[16/7]]`,right:`2.28...`},{id:`c`,left:`[[58/25]]`,right:`2.32`},{id:`d`,left:`[[9/4]]`,right:`2.25`}],explanation:`[[7/3]] = 2.333..., [[16/7]] = 2.2857..., [[58/25]] = 2.32 exactly, and [[9/4]] = 2.25 exactly.`,hint:`Divide each numerator by its denominator.`},{id:`l1q10`,lessonId:`ordering-fractions`,type:`true-false`,category:`error-analysis`,prompt:`A student says [[5/12]] is bigger than [[4/7]], because 5 is a bigger number than 4. Is the student correct?`,trueFalseAnswer:!1,explanation:`As decimals, [[5/12]] = 0.4166... and [[4/7]] = 0.5714..., so [[4/7]] is actually the bigger fraction. Comparing numerators only works when the denominators match.`,correctionTip:`Always compare fractions using a common denominator or decimals — never by comparing numerators alone when the denominators are different.`,hint:`Convert both fractions to decimals to check.`},{id:`l1q11`,lessonId:`ordering-fractions`,type:`mcq`,category:`error-analysis`,prompt:`Priya compared [[3/4]] and [[5/9]] by only looking at the numerators, and concluded [[5/9]] was bigger. What was her mistake?`,choices:[{id:`a`,label:`She should have compared the numerators after writing both fractions with a common denominator.`},{id:`b`,label:`She should have added the two fractions together instead of comparing them.`},{id:`c`,label:`Fractions with bigger numerators are always bigger, so she made no mistake.`}],correctChoiceId:`a`,explanation:`Comparing numerators only tells you which fraction is bigger once the denominators are equal. Priya needed a common denominator (or decimals) first — with a denominator of 36, [[3/4]] = [[27/36]] is bigger than [[5/9]] = [[20/36]].`,hint:`Think about what has to be true before you can compare numerators directly.`},{id:`l1q12`,lessonId:`ordering-fractions`,type:`numeric-fraction`,category:`challenge`,prompt:`Here are five fractions: [[1/5]], [[1/2]], [[1/2]], [[1/2]] and [[4/5]]. What is the median of this set?`,context:`The median is the middle value once a set of numbers is arranged in order of size.`,correctFrac:{n:1,d:2},explanation:`In order of size, the fractions are [[1/5]], [[1/2]], [[1/2]], [[1/2]], [[4/5]]. The middle (third) value is [[1/2]], so the median is [[1/2]].`,hint:`Put the fractions in order of size first, then find the middle one.`}]},bm={id:`adding-mixed-numbers`,code:`7.2`,slug:`adding-mixed-numbers`,title:`Adding Mixed Numbers`,shortTitle:`Adding Mixed Numbers`,color:`teal`,summary:`Add mixed numbers confidently using a reliable three-step method — and learn to estimate the answer before you calculate it exactly.`,learningGoals:[`Add the whole-number parts and fractional parts of mixed numbers separately.`,`Write a common denominator to add fractional parts with different denominators.`,`Cancel a fractional answer to its simplest form.`,`Estimate an addition before working it out exactly.`],sections:[{id:`three-step-method`,heading:`A three-step method for adding mixed numbers`,body:[`You already know that you can only add fractions directly when the denominators are the same. When the denominators are different, you must first rewrite the fractions as equivalent fractions with a common denominator.`,`Here is a reliable method for adding mixed numbers, which also gives you a quick estimate along the way.`,`Step 1: Add the whole-number parts. This gives you an estimate straight away.`,`Step 2: Add the fractional parts and cancel the answer to its simplest form. If this is an improper fraction, write it as a mixed number.`,`Step 3: Add your answers from Step 1 and Step 2 together to get the final answer.`]},{id:`estimate-first`,heading:`Estimating before you calculate`,body:[`Because every fractional part of a mixed number is less than 1, you can predict a range for the total before doing any exact addition.`,`For example, for [[5 2/3]] + [[7 7/8]], the whole-number parts add up to 12. Since both fractional parts are less than 1, their sum must be less than 2. So the total must be somewhere between 12 and 14.`,`Estimating first is a great way to check that your final, exact answer is sensible.`],facts:[{title:`General rule`,body:`When adding two mixed numbers, the total always lies between the sum of the whole-number parts and that sum plus 2 — because two proper fractions always add to less than 2.`}]},{id:`real-world-adding`,heading:`Adding mixed numbers in real life`,body:[`Adding mixed numbers comes up whenever you combine measured lengths, distances, or amounts — like finding the total length of two pieces of wood joined to make a shelf, the total distance of a two-part car journey, or the perimeter of a shape whose sides are given as mixed numbers.`,`In every case, the method is exactly the same: add the whole-number parts, add the fractional parts using a common denominator, then combine the two results.`]}],workedExamples:[{id:`we1`,title:`Adding with a shared denominator`,problem:`Work out [[3 1/7]] + [[5 3/7]].`,steps:[{label:`Step 1 — add the whole-number parts`,detail:`3 + 5 = 8. You can say your estimate is just over 8.`},{label:`Step 2 — add the fractional parts`,detail:`[[1/7]] + [[3/7]] = [[4/7]]. This is already a proper fraction in its simplest form.`},{label:`Step 3 — add the two results`,detail:`8 + [[4/7]] = [[8 4/7]].`}],answer:`[[8 4/7]]`},{id:`we2`,title:`Adding with different denominators`,problem:`Work out [[2 1/4]] + [[3 5/6]].`,steps:[{label:`Step 1 — add the whole-number parts`,detail:`2 + 3 = 5. Since [[5/6]] is close to 1, your estimate is around 6.`},{label:`Step 2 — add the fractional parts`,detail:`[[1/4]] + [[5/6]] = [[3/12]] + [[10/12]] = [[13/12]], using a common denominator of 12. This is an improper fraction, so write it as a mixed number: [[13/12]] = [[1 1/12]].`},{label:`Step 3 — add the two results`,detail:`5 + [[1 1/12]] = [[6 1/12]].`}],answer:`[[6 1/12]]`}],commonMistakes:[{id:`cm1`,student:`Kia`,scenario:`Kia worked out [[5 3/8]] + [[7 5/6]]. She added the whole numbers correctly, and correctly found [[3/8]] + [[5/6]] = [[9/24]] + [[20/24]] = [[29/24]] — but then made a slip converting this improper fraction to a mixed number.`,wrongWorking:`① 5 + 7 = 12  ② [[3/8]] + [[5/6]] = [[9/24]] + [[20/24]] = [[29/24]], which Kia wrote as [[1 4/24]] = [[1 1/6]]  ③ 12 + [[1 1/6]] = [[13 1/6]]`,wrongAnswer:`Kia's answer: [[13 1/6]]. This is incorrect.`,correctWorking:`Kia subtracted incorrectly when converting [[29/24]] to a mixed number: 29 − 24 = 5, not 4. So [[29/24]] = [[1 5/24]], and [[5/24]] cannot be simplified any further. Adding the whole-number part: 12 + [[1 5/24]] = [[13 5/24]].`,correctAnswer:`Correct answer: [[13 5/24]].`,tip:`When you change an improper fraction to a mixed number, double-check your subtraction — it is an easy place to slip up, even after doing the harder common-denominator work correctly.`}],practiceQuestions:[{id:`l2q1`,lessonId:`adding-mixed-numbers`,type:`numeric-fraction`,category:`skill`,prompt:`Work out [[2 4/9]] + [[1 4/9]]. Give your answer as a mixed number in its simplest form.`,correctFrac:{whole:3,n:8,d:9},explanation:`Add the whole numbers: 2 + 1 = 3. Add the fractions: [[4/9]] + [[4/9]] = [[8/9]]. Total: [[3 8/9]].`,hint:`The fractional parts already share a denominator.`},{id:`l2q2`,lessonId:`adding-mixed-numbers`,type:`numeric-fraction`,category:`skill`,prompt:`Work out [[7 1/8]] + [[3 3/8]]. Give your answer as a mixed number in its simplest form.`,correctFrac:{whole:10,n:1,d:2},explanation:`Add the whole numbers: 7 + 3 = 10. Add the fractions: [[1/8]] + [[3/8]] = [[4/8]] = [[1/2]]. Total: [[10 1/2]].`,hint:`Don't forget to simplify [[4/8]].`},{id:`l2q3`,lessonId:`adding-mixed-numbers`,type:`numeric-fraction`,category:`skill`,prompt:`Work out [[1 5/7]] + [[6 4/7]]. Give your answer as a mixed number in its simplest form.`,correctFrac:{whole:8,n:2,d:7},explanation:`Add the whole numbers: 1 + 6 = 7. Add the fractions: [[5/7]] + [[4/7]] = [[9/7]] = [[1 2/7]], an improper fraction. Total: 7 + [[1 2/7]] = [[8 2/7]].`,hint:`The fractional parts add up to more than 1 — carry the extra whole number over.`},{id:`l2q4`,lessonId:`adding-mixed-numbers`,type:`mcq`,category:`skill`,prompt:`What is [[2 1/2]] + [[1 1/4]]?`,choices:[{id:`a`,frac:{whole:3,n:3,d:4}},{id:`b`,frac:{whole:3,n:1,d:4}},{id:`c`,frac:{whole:3,n:2,d:6}},{id:`d`,frac:{whole:4,n:1,d:4}}],correctChoiceId:`a`,explanation:`Add the whole numbers: 2 + 1 = 3. Using a common denominator of 4: [[1/2]] = [[2/4]], so [[2/4]] + [[1/4]] = [[3/4]]. Total: [[3 3/4]].`,hint:`Rewrite [[1/2]] with a denominator of 4 first.`},{id:`l2q5`,lessonId:`adding-mixed-numbers`,type:`numeric-fraction`,category:`skill`,prompt:`Work out [[5 1/3]] + [[2 1/6]]. Give your answer as a mixed number in its simplest form.`,correctFrac:{whole:7,n:1,d:2},explanation:`Add the whole numbers: 5 + 2 = 7. Using a common denominator of 6: [[1/3]] = [[2/6]], so [[2/6]] + [[1/6]] = [[3/6]] = [[1/2]]. Total: [[7 1/2]].`,hint:`Rewrite [[1/3]] with a denominator of 6.`},{id:`l2q6`,lessonId:`adding-mixed-numbers`,type:`numeric-fraction`,category:`application`,prompt:`Andrew uses two pieces of wood, [[2 5/8]] m and [[1 3/4]] m, to make a shelf. What is the total length of the shelf?`,correctFrac:{whole:4,n:3,d:8},explanation:`Add the whole numbers: 2 + 1 = 3. Using a common denominator of 8: [[3/4]] = [[6/8]], so [[5/8]] + [[6/8]] = [[11/8]] = [[1 3/8]]. Total: 3 + [[1 3/8]] = [[4 3/8]] m.`,hint:`Change [[3/4]] to eighths before adding.`},{id:`l2q7`,lessonId:`adding-mixed-numbers`,type:`true-false`,category:`application`,prompt:`Andrew's wall is [[4 1/2]] m long. His shelf, made from two pieces of wood, is [[4 3/8]] m long. True or false: the shelf will fit on the wall.`,trueFalseAnswer:!0,explanation:`[[4 3/8]] is less than [[4 1/2]] (since [[3/8]] is less than [[4/8]]), so the shelf is shorter than the wall and will fit, with [[1/8]] m to spare.`,hint:`Compare [[3/8]] and [[1/2]] using a common denominator.`},{id:`l2q8`,lessonId:`adding-mixed-numbers`,type:`numeric-fraction`,category:`application`,prompt:`Hoa drives [[12 3/4]] km from her home to the clinic, then [[5 2/3]] km from the clinic to her workplace. What is the total distance she drives?`,correctFrac:{whole:18,n:5,d:12},explanation:`Add the whole numbers: 12 + 5 = 17. Using a common denominator of 12: [[3/4]] = [[9/12]] and [[2/3]] = [[8/12]], so [[9/12]] + [[8/12]] = [[17/12]] = [[1 5/12]]. Total: 17 + [[1 5/12]] = [[18 5/12]] km.`,hint:`Use a common denominator of 12 for the fractional parts.`},{id:`l2q9`,lessonId:`adding-mixed-numbers`,type:`numeric-fraction`,category:`application`,prompt:`A triangle has sides [[3 2/9]] m, [[5 5/9]] m and [[7 8/9]] m. Work out its perimeter, in its simplest form.`,context:`The perimeter is the total distance around the edge of a shape.`,correctFrac:{whole:16,n:2,d:3},explanation:`Add the whole numbers: 3 + 5 + 7 = 15. Add the fractions: [[2/9]] + [[5/9]] + [[8/9]] = [[15/9]] = [[1 2/3]] (simplified from [[1 6/9]]). Total: 15 + [[1 2/3]] = [[16 2/3]] m.`,hint:`All three fractional parts already share a denominator of 9.`},{id:`l2q10`,lessonId:`adding-mixed-numbers`,type:`mcq`,category:`error-analysis`,prompt:`Kia worked out [[3/8]] + [[5/6]] = [[9/24]] + [[20/24]] = [[29/24]], but then wrote this as [[1 4/24]] = [[1 1/6]]. What went wrong?`,choices:[{id:`a`,label:`She used the wrong common denominator, 24.`},{id:`b`,label:`She subtracted 29 − 24 incorrectly and should have got 5, not 4.`},{id:`c`,label:`She should not have simplified the fraction at all.`}],correctChoiceId:`b`,explanation:`The common denominator (24) and the addition (9 + 20 = 29) were both correct. The mistake was converting [[29/24]] to a mixed number: 29 − 24 = 5, not 4, so it should be [[1 5/24]].`,hint:`Check the subtraction used to convert the improper fraction to a mixed number.`},{id:`l2q11`,lessonId:`adding-mixed-numbers`,type:`numeric-fraction`,category:`error-analysis`,prompt:`What is the correct answer to [[5 3/8]] + [[7 5/6]]?`,correctFrac:{whole:13,n:5,d:24},explanation:`Whole numbers: 5 + 7 = 12. Fractions: [[3/8]] + [[5/6]] = [[9/24]] + [[20/24]] = [[29/24]] = [[1 5/24]]. Total: 12 + [[1 5/24]] = [[13 5/24]].`,hint:`Use a common denominator of 24 for the fractional parts.`},{id:`l2q12`,lessonId:`adding-mixed-numbers`,type:`true-false`,category:`challenge`,prompt:`Zara says: "Without adding any of the fractions, I know that the answer to [[5 2/3]] + [[7 7/8]] will be between 12 and 14." Is Zara correct?`,trueFalseAnswer:!0,explanation:`The whole-number parts add to 5 + 7 = 12. Since both fractional parts, [[2/3]] and [[7/8]], are less than 1, their sum is less than 2. So the total must be between 12 and 14 — and indeed [[5 2/3]] + [[7 7/8]] = [[13 13/24]], which fits.`,hint:`Think about the biggest and smallest that two proper fractions can add up to.`}]},xm={id:`multiplying-fractions`,code:`7.3`,slug:`multiplying-fractions`,title:`Multiplying Fractions`,shortTitle:`Multiplying Fractions`,color:`coral`,summary:`Multiply two proper fractions together — including finding "a fraction of a fraction" in real situations, and squaring a fraction.`,learningGoals:[`Multiply two proper fractions by multiplying numerators and denominators separately.`,`Simplify a product to its lowest terms.`,`Find a fraction of a fraction in a real-world context.`,`Square a fraction.`],sections:[{id:`multiplying-method`,heading:`Multiplying fractions together`,body:[`To find a fraction of a fraction, you multiply the fractions together. Picture a rectangle where [[1/3]] is shaded blue. If you then take [[1/2]] of that blue section, you can see from the diagram that you end up with [[1/6]] of the whole rectangle.`,`This means [[1/2]] of [[1/3]] = [[1/2]] × [[1/3]] = [[1/6]]. Notice that 1 × 1 = 1 (the new numerator) and 2 × 3 = 6 (the new denominator).`,`So, when you multiply fractions, you multiply the numerators together, and you multiply the denominators together — then simplify the answer if you can.`],visual:`area-model`,visualData:{n1:1,d1:2,n2:1,d2:3}},{id:`fraction-of-fraction`,heading:`Finding a fraction of a fraction in real life`,body:[`Multiplying fractions is especially useful when a problem describes one fraction of a group, and then a fraction of that fraction. For example, if [[4/5]] of a swimming club are children, and [[1/3]] of those children are boys, then the fraction of the whole club who are boys is [[1/3]] × [[4/5]] = [[4/15]].`,`The order you multiply in does not matter — [[1/3]] × [[4/5]] gives exactly the same answer as [[4/5]] × [[1/3]].`],visual:`area-model`,visualData:{n1:1,d1:3,n2:4,d2:5}},{id:`squaring-fractions`,heading:`Squaring a fraction`,body:[`Squaring a fraction means multiplying it by itself. Since multiplying fractions means multiplying numerators together and denominators together, squaring [[3/4]] gives [[3/4]] × [[3/4]] = [[9/16]] — you simply square the numerator and square the denominator.`],facts:[{title:`Squaring a fraction`,body:`To square any fraction, multiply it by itself: the numerator gets squared, and the denominator gets squared. For example, squaring [[2/5]] gives [[4/25]].`}]}],workedExamples:[{id:`we1`,title:`Multiplying two proper fractions`,problem:`Work out [[2/5]] × [[7/8]]. Write your answer in its simplest form.`,steps:[{label:`Multiply the numerators and denominators`,detail:`[[2/5]] × [[7/8]] = (2 × 7) over (5 × 8) = [[14/40]].`},{label:`Simplify the answer`,detail:`Both 14 and 40 can be divided by 2, so [[14/40]] cancels to [[7/20]].`}],answer:`[[7/20]]`},{id:`we2`,title:`A fraction of a fraction`,problem:`In a swimming club, [[4/5]] of the members are children. [[1/3]] of the children are boys. What fraction of the swimming club members are boys?`,visual:`area-model`,visualData:{n1:1,d1:3,n2:4,d2:5},steps:[{label:`Identify the two fractions to multiply`,detail:`You need [[1/3]] of [[4/5]], which means working out [[1/3]] × [[4/5]].`},{label:`Multiply the fractions`,detail:`[[1/3]] × [[4/5]] = (1 × 4) over (3 × 5) = [[4/15]].`}],answer:`[[4/15]] of the members are boys`},{id:`we3`,title:`Two steps of "a fraction of"`,problem:`At a hotel, [[5/9]] of the staff are employed part-time. Of the part-time staff, [[3/7]] are men. What fraction of all the staff are men employed part-time?`,visual:`area-model`,visualData:{n1:3,d1:7,n2:5,d2:9},steps:[{label:`Identify the two fractions to multiply`,detail:`You need [[3/7]] of the part-time staff, and the part-time staff are [[5/9]] of everyone — so multiply [[3/7]] × [[5/9]].`},{label:`Multiply the fractions`,detail:`[[3/7]] × [[5/9]] = (3 × 5) over (7 × 9) = [[15/63]], which simplifies to [[5/21]].`}],answer:`[[5/21]] of all the staff are men employed part-time`}],commonMistakes:[{id:`cm1`,student:`Sam`,scenario:`Sam was asked to work out [[2/3]] × [[3/4]]. Instead of multiplying, Sam added the numerators together and added the denominators together.`,wrongWorking:`Sam added instead of multiplying: numerators 2 + 3 = 5, denominators 3 + 4 = 7, giving [[5/7]].`,wrongAnswer:`Sam's answer: [[5/7]]. This is incorrect.`,correctWorking:`To multiply fractions, multiply the numerators together and multiply the denominators together: [[2/3]] × [[3/4]] = (2 × 3) over (3 × 4) = [[6/12]], which simplifies to [[1/2]].`,correctAnswer:`Correct answer: [[1/2]].`,tip:`Multiplying fractions never involves adding numerators or denominators — always multiply straight across, then simplify.`}],practiceQuestions:[{id:`l3q1`,lessonId:`multiplying-fractions`,type:`mcq`,category:`skill`,prompt:`What is [[1/4]] × [[1/2]]?`,choices:[{id:`a`,frac:{n:1,d:8}},{id:`b`,frac:{n:1,d:6}},{id:`c`,frac:{n:2,d:6}},{id:`d`,frac:{n:2,d:8}}],correctChoiceId:`a`,explanation:`[[1/4]] × [[1/2]] = (1 × 1) over (4 × 2) = [[1/8]].`,hint:`Multiply the numerators together, then multiply the denominators together.`},{id:`l3q2`,lessonId:`multiplying-fractions`,type:`numeric-fraction`,category:`skill`,prompt:`Work out [[3/4]] × [[2/5]]. Write your answer in its simplest form.`,correctFrac:{n:3,d:10},explanation:`[[3/4]] × [[2/5]] = [[6/20]], which simplifies to [[3/10]].`,hint:`Multiply straight across, then look for a common factor to cancel.`},{id:`l3q3`,lessonId:`multiplying-fractions`,type:`numeric-fraction`,category:`skill`,prompt:`Work out [[4/5]] × [[3/8]]. Write your answer in its simplest form.`,correctFrac:{n:3,d:10},explanation:`[[4/5]] × [[3/8]] = [[12/40]], which simplifies to [[3/10]] (dividing by 4).`,hint:`Multiply straight across, then simplify by dividing by the highest common factor.`},{id:`l3q4`,lessonId:`multiplying-fractions`,type:`numeric-fraction`,category:`skill`,prompt:`Work out [[1/4]] × [[8/9]]. Write your answer in its simplest form.`,correctFrac:{n:2,d:9},explanation:`[[1/4]] × [[8/9]] = [[8/36]], which simplifies to [[2/9]] (dividing by 4).`,hint:`You can cancel the 4 and the 8 before multiplying, if you like.`},{id:`l3q5`,lessonId:`multiplying-fractions`,type:`numeric-fraction`,category:`application`,prompt:`A rectangle has length [[4/9]] m and width [[1/10]] m. Work out its area.`,context:`Area = length × width.`,correctFrac:{n:2,d:45},explanation:`Area = [[4/9]] × [[1/10]] = [[4/90]], which simplifies to [[2/45]] m².`,hint:`Multiply the two fractions, then simplify.`},{id:`l3q6`,lessonId:`multiplying-fractions`,type:`numeric-fraction`,category:`application`,prompt:`A square has sides of length [[3/4]] m. Work out its area.`,correctFrac:{n:9,d:16},explanation:`Area = [[3/4]] × [[3/4]] = [[9/16]] m².`,hint:`Squaring a fraction means multiplying it by itself.`},{id:`l3q7`,lessonId:`multiplying-fractions`,type:`numeric-fraction`,category:`application`,prompt:`At a hotel, [[5/9]] of the staff are employed part-time, and [[3/7]] of the part-time staff are men. What fraction of all the staff are men employed part-time?`,correctFrac:{n:5,d:21},explanation:`[[3/7]] × [[5/9]] = [[15/63]], which simplifies to [[5/21]].`,hint:`Multiply the fraction of part-time staff by the fraction of those who are men.`},{id:`l3q8`,lessonId:`multiplying-fractions`,type:`numeric-fraction`,category:`application`,prompt:`In a cinema, [[3/5]] of the people watching a film are children, and [[3/4]] of the children are girls. What fraction of all the people watching the film are girls?`,correctFrac:{n:9,d:20},explanation:`[[3/4]] × [[3/5]] = [[9/20]].`,hint:`Multiply the fraction of children by the fraction of children who are girls.`},{id:`l3q9`,lessonId:`multiplying-fractions`,type:`mcq`,category:`application`,prompt:`A sauce recipe for 4 people uses [[2/3]] cup of cashew nuts. Benji makes the sauce for 2 people, so he multiplies every amount by [[1/2]]. How many cups of cashew nuts does he need?`,choices:[{id:`a`,frac:{n:1,d:3}},{id:`b`,frac:{n:2,d:3}},{id:`c`,frac:{n:1,d:6}},{id:`d`,frac:{n:2,d:6}}],correctChoiceId:`a`,explanation:`[[1/2]] × [[2/3]] = [[2/6]], which simplifies to [[1/3]] cup.`,hint:`Multiply [[1/2]] by [[2/3]], then simplify.`},{id:`l3q10`,lessonId:`multiplying-fractions`,type:`mcq`,category:`error-analysis`,prompt:`Sam worked out [[2/3]] × [[3/4]] by adding: 2 + 3 = 5 and 3 + 4 = 7, getting [[5/7]]. What should Sam have done instead?`,choices:[{id:`a`,label:`Multiply the numerators together and multiply the denominators together.`},{id:`b`,label:`Find a common denominator first, just like when adding fractions.`},{id:`c`,label:`Subtract the smaller fraction from the larger one.`}],correctChoiceId:`a`,explanation:`Multiplying fractions means multiplying numerators together and denominators together: [[2/3]] × [[3/4]] = [[6/12]] = [[1/2]]. There is no need for a common denominator when multiplying.`,hint:`Multiplying fractions works differently from adding fractions.`},{id:`l3q11`,lessonId:`multiplying-fractions`,type:`numeric-fraction`,category:`error-analysis`,prompt:`What is the correct answer to [[2/3]] × [[3/4]]?`,correctFrac:{n:1,d:2},explanation:`[[2/3]] × [[3/4]] = [[6/12]], which simplifies to [[1/2]].`,hint:`Multiply straight across, then simplify.`},{id:`l3q12`,lessonId:`multiplying-fractions`,type:`true-false`,category:`challenge`,prompt:`Arun says: "When you multiply two proper fractions together, you will never get an answer bigger than 1." Is Arun correct?`,trueFalseAnswer:!0,explanation:`A proper fraction is always less than 1. Multiplying two numbers that are each less than 1 always gives a result that is smaller still — so the product of two proper fractions is always less than 1.`,hint:`Think about what happens when you multiply by a number smaller than 1.`},{id:`l3q13`,lessonId:`multiplying-fractions`,type:`numeric-fraction`,category:`challenge`,prompt:`A square of side [[3/4]] m is joined to a rectangle of length [[7/8]] m and height [[2/5]] m. What is the total area of the shape?`,context:`Work out the area of the square and the area of the rectangle separately, then add them.`,correctFrac:{n:73,d:80},explanation:`Square area: [[3/4]] × [[3/4]] = [[9/16]] m². Rectangle area: [[7/8]] × [[2/5]] = [[14/40]] = [[7/20]] m². Using a common denominator of 80: [[9/16]] = [[45/80]] and [[7/20]] = [[28/80]]. Total = [[73/80]] m².`,hint:`Find each area separately first, then add them using a common denominator.`}]},Sm={id:`dividing-fractions`,code:`7.4`,slug:`dividing-fractions`,title:`Dividing Fractions`,shortTitle:`Dividing Fractions`,color:`cobalt`,summary:`Divide two proper fractions by turning the second fraction upside down and multiplying — and understand what fraction division actually means.`,learningGoals:[`Understand that dividing by a fraction means asking "how many of these fit inside?"`,`Find the reciprocal of a fraction.`,`Divide two proper fractions using the reciprocal method.`,`Write a division answer in its simplest form, as a mixed number where needed.`],sections:[{id:`dividing-method`,heading:`What does dividing by a fraction mean?`,body:[`Picture a rectangle where [[2/3]] is shaded yellow. Now picture [[1/6]] of the same rectangle. Working out [[2/3]] ÷ [[1/6]] is the same as asking: "How many [[1/6]]s fit inside [[2/3]]?" Looking at the diagram, the answer is 4 — so [[2/3]] ÷ [[1/6]] = 4.`,`You could also calculate this: [[2/3]] ÷ [[1/6]] = [[2/3]] × [[6/1]] = (2 × 6) over (3 × 1) = [[12/3]] = 4.`],visual:`bar`,visualData:{n:4,d:6}},{id:`reciprocals`,heading:`Turn the second fraction upside down`,body:[`When you flip a fraction upside down, you get its reciprocal. For example, the reciprocal of [[2/3]] is [[3/2]].`,`Here is a reliable method for dividing a fraction by a fraction: 1) Turn the second fraction upside down to get its reciprocal. 2) Multiply the fractions together, as usual. 3) Write the answer in its simplest form, and as a mixed number if it is improper.`],facts:[{title:`Reciprocal`,body:`The reciprocal of a fraction is simply that fraction turned upside down — swap the numerator and the denominator. The reciprocal of [[5/8]] is [[8/5]].`}]},{id:`dividing-context`,heading:`Dividing fractions in context`,body:[`Fraction division comes up whenever you know a total (or an area) made from a fraction, and need to work backwards to find a missing fraction. For a rectangle, if you know the area and the width, you can find the length by working out Area ÷ Width — even when both are fractions.`]}],workedExamples:[{id:`we1`,title:`Dividing fractions`,problem:`Work out [[2/5]] ÷ [[3/10]].`,steps:[{label:`Turn the second fraction upside down`,detail:`[[2/5]] ÷ [[3/10]] = [[2/5]] × [[10/3]].`},{label:`Multiply the fractions`,detail:`(2 × 10) over (5 × 3) = [[20/15]].`},{label:`Simplify and convert to a mixed number`,detail:`Both 20 and 15 can be divided by 5, giving [[4/3]]. As this is an improper fraction, write it as [[1 1/3]].`}],answer:`[[1 1/3]]`},{id:`we2`,title:`Finding a missing length`,problem:`The area of a rectangle is [[2/15]] m². Its width is [[3/10]] m. Work out the length of the rectangle.`,steps:[{label:`Write the calculation needed`,detail:`Length = Area ÷ Width = [[2/15]] ÷ [[3/10]].`},{label:`Turn the second fraction upside down and multiply`,detail:`[[2/15]] × [[10/3]] = (2 × 10) over (15 × 3) = [[20/45]].`},{label:`Simplify the answer`,detail:`Both 20 and 45 can be divided by 5, giving [[4/9]] m.`}],answer:`[[4/9]] m`}],commonMistakes:[{id:`cm1`,student:`Isaac`,scenario:`Isaac worked out [[8/9]] ÷ [[4/5]]. He turned a fraction upside down and multiplied — but he flipped the wrong one.`,wrongWorking:`Isaac flipped the first fraction instead of the second: [[8/9]] ÷ [[4/5]] = [[9/8]] × [[4/5]] = [[36/40]] = [[9/10]].`,wrongAnswer:`Isaac's answer: [[9/10]]. This is incorrect.`,correctWorking:`It is always the second fraction (the one you are dividing by) that gets turned upside down: [[8/9]] ÷ [[4/5]] = [[8/9]] × [[5/4]] = [[40/36]], which simplifies to [[10/9]], or [[1 1/9]] as a mixed number.`,correctAnswer:`Correct answer: [[1 1/9]].`,tip:`Always double-check which fraction you are flipping — it is the second fraction (the divisor), never the first.`}],practiceQuestions:[{id:`l4q1`,lessonId:`dividing-fractions`,type:`numeric-fraction`,category:`skill`,prompt:`Work out [[1/5]] ÷ [[3/4]]. Write your answer in its simplest form.`,correctFrac:{n:4,d:15},explanation:`[[1/5]] ÷ [[3/4]] = [[1/5]] × [[4/3]] = [[4/15]].`,hint:`Turn the second fraction upside down, then multiply.`},{id:`l4q2`,lessonId:`dividing-fractions`,type:`numeric-fraction`,category:`skill`,prompt:`Work out [[2/3]] ÷ [[6/7]]. Write your answer in its simplest form.`,correctFrac:{n:7,d:9},explanation:`[[2/3]] ÷ [[6/7]] = [[2/3]] × [[7/6]] = [[14/18]], which simplifies to [[7/9]].`,hint:`Turn the second fraction upside down, then multiply and simplify.`},{id:`l4q3`,lessonId:`dividing-fractions`,type:`numeric-fraction`,category:`skill`,prompt:`Work out [[1/4]] ÷ [[2/3]]. Write your answer in its simplest form.`,correctFrac:{n:3,d:8},explanation:`[[1/4]] ÷ [[2/3]] = [[1/4]] × [[3/2]] = [[3/8]].`,hint:`Turn [[2/3]] upside down to get [[3/2]].`},{id:`l4q4`,lessonId:`dividing-fractions`,type:`numeric-fraction`,category:`skill`,prompt:`Work out [[3/8]] ÷ [[4/7]]. Write your answer in its simplest form.`,correctFrac:{n:21,d:32},explanation:`[[3/8]] ÷ [[4/7]] = [[3/8]] × [[7/4]] = [[21/32]].`,hint:`Turn the second fraction upside down, then multiply.`},{id:`l4q5`,lessonId:`dividing-fractions`,type:`numeric-fraction`,category:`skill`,prompt:`Work out [[4/5]] ÷ [[1/9]]. Write your answer as a mixed number in its simplest form.`,correctFrac:{whole:7,n:1,d:5},explanation:`[[4/5]] ÷ [[1/9]] = [[4/5]] × [[9/1]] = [[36/5]], which is [[7 1/5]] as a mixed number.`,hint:`The reciprocal of [[1/9]] is [[9/1]], or simply 9.`},{id:`l4q6`,lessonId:`dividing-fractions`,type:`mcq`,category:`skill`,prompt:`What is [[3/4]] ÷ [[1/2]]?`,choices:[{id:`a`,frac:{whole:1,n:1,d:2}},{id:`b`,frac:{n:3,d:8}},{id:`c`,frac:{whole:1,n:1,d:4}},{id:`d`,frac:{n:6,d:4}}],correctChoiceId:`a`,explanation:`[[3/4]] ÷ [[1/2]] = [[3/4]] × [[2/1]] = [[6/4]], which simplifies to [[1 1/2]].`,hint:`Turn [[1/2]] upside down to get 2, then multiply.`},{id:`l4q7`,lessonId:`dividing-fractions`,type:`numeric-fraction`,category:`application`,prompt:`The area of a rectangle is [[2/15]] m² and its width is [[3/10]] m. Work out the length of the rectangle.`,context:`Length = Area ÷ Width.`,correctFrac:{n:4,d:9},explanation:`[[2/15]] ÷ [[3/10]] = [[2/15]] × [[10/3]] = [[20/45]], which simplifies to [[4/9]] m.`,hint:`Divide the area by the width, using the reciprocal method.`},{id:`l4q8`,lessonId:`dividing-fractions`,type:`mcq`,category:`application`,prompt:`Cheng is using fraction cards to make a correct calculation: [[7/12]] ÷ ? = [[7/10]]. Which of these cards is the missing fraction?`,choices:[{id:`a`,frac:{n:3,d:4}},{id:`b`,frac:{n:3,d:10}},{id:`c`,frac:{n:5,d:6}},{id:`d`,frac:{n:7,d:15}}],correctChoiceId:`c`,explanation:`[[7/12]] ÷ [[5/6]] = [[7/12]] × [[6/5]] = [[42/60]], which simplifies to [[7/10]]. So the missing card is [[5/6]].`,hint:`Try dividing [[7/12]] by each card until you get [[7/10]].`},{id:`l4q9`,lessonId:`dividing-fractions`,type:`mcq`,category:`error-analysis`,prompt:`Isaac worked out [[8/9]] ÷ [[4/5]] = [[9/8]] × [[4/5]] = [[9/10]]. What mistake did Isaac make?`,choices:[{id:`a`,label:`He flipped the first fraction instead of the second one.`},{id:`b`,label:`He multiplied the numerators and denominators incorrectly.`},{id:`c`,label:`He should have added the fractions instead of dividing.`}],correctChoiceId:`a`,explanation:`When dividing, only the second fraction (the divisor) should be turned upside down. Isaac flipped [[8/9]] instead of [[4/5]].`,hint:`Look carefully at which fraction got flipped.`},{id:`l4q10`,lessonId:`dividing-fractions`,type:`numeric-fraction`,category:`error-analysis`,prompt:`What is the correct answer to [[8/9]] ÷ [[4/5]]?`,correctFrac:{whole:1,n:1,d:9},explanation:`[[8/9]] ÷ [[4/5]] = [[8/9]] × [[5/4]] = [[40/36]], which simplifies to [[10/9]], or [[1 1/9]] as a mixed number.`,hint:`Turn the second fraction, [[4/5]], upside down before multiplying.`},{id:`l4q11`,lessonId:`dividing-fractions`,type:`true-false`,category:`challenge`,prompt:`Arun says: "When dividing two proper fractions, if the first fraction is bigger than the second fraction, the answer will be smaller than 1." Is Arun correct?`,trueFalseAnswer:!1,explanation:`This is backwards. For example, [[2/3]] ÷ [[1/6]] = 4, and [[2/3]] is bigger than [[1/6]] — but the answer is much bigger than 1, not smaller. In fact, when the first fraction is bigger than the second, the answer is always bigger than 1.`,correctionTip:`Think of division as "how many of the second fraction fit into the first?" — if the first is bigger, more than one whole copy fits in, so the answer is bigger than 1.`,hint:`Try an example, like [[2/3]] ÷ [[1/6]], to test the claim.`},{id:`l4q12`,lessonId:`dividing-fractions`,type:`numeric-fraction`,category:`challenge`,prompt:`Work out [[6/7]] ÷ [[3/7]]. Give your answer as a whole number.`,correctFrac:{n:2,d:1},explanation:`[[6/7]] ÷ [[3/7]] = [[6/7]] × [[7/3]] = [[42/21]] = 2. Dividing two fractions with the same denominator is the same as dividing their numerators: 6 ÷ 3 = 2.`,hint:`Notice that both fractions already have the same denominator.`},{id:`l4q13`,lessonId:`dividing-fractions`,type:`true-false`,category:`skill`,prompt:`True or false: the reciprocal of [[2/3]] is [[3/2]].`,trueFalseAnswer:!0,explanation:`The reciprocal of a fraction is that fraction turned upside down, so the reciprocal of [[2/3]] is indeed [[3/2]].`,hint:`Swap the numerator and denominator.`}]},Cm={id:`making-calculations-easier`,code:`7.5`,slug:`making-calculations-easier`,title:`Making Fraction Calculations Easier`,shortTitle:`Easier Calculations`,color:`berry`,summary:`Use clever strategies — breaking numbers into factors, equivalent fractions, and cancelling common factors — to make fraction calculations quicker and simpler.`,learningGoals:[`Break a fraction into factors to simplify a calculation, such as halving twice instead of dividing by 4.`,`Use equivalent fractions (like tenths or twentieths) to make dividing easier.`,`Cancel factors that appear in both the numerator and the denominator before multiplying.`,`Choose an efficient method and always apply the correct order of operations.`],sections:[{id:`breaking-into-factors`,heading:`Breaking a fraction into factors`,body:[`Some fractions can be broken into smaller, easier steps using factors. For example, finding [[1/4]] of a number is the same as halving it twice, because [[1/4]] = [[1/2]] × [[1/2]].`,`To work out [[1/4]] × 600: first halve 600 to get 300 (this is [[1/2]] of 600), then halve 300 to get 150 (this is [[1/2]] of 300). So [[1/4]] × 600 = 150.`,`This works for any denominator that breaks into smaller factors — for example, [[1/8]] = [[1/2]] × [[1/2]] × [[1/2]], so finding [[1/8]] of a number means halving it three times.`]},{id:`equivalent-fractions-shortcut`,heading:`Using equivalent fractions to divide more easily`,body:[`Dividing by 10 (or 100) is usually much easier than dividing by other numbers. You can use this by rewriting a fraction as an equivalent fraction with a denominator of 10, 20, or 100.`,`To work out [[3/5]] × 120: rewrite [[3/5]] as the equivalent fraction [[6/10]]. Then find [[1/10]] of 120 by dividing by 10, which gives 12. Finally, multiply by 6 (the new numerator) to get 72. So [[3/5]] × 120 = 72.`],facts:[{title:`A useful shortcut`,body:`You can also use the fact that [[19/20]] = 1 − [[1/20]]. So [[19/20]] × 1800 = 1800 − ([[1/20]] × 1800) = 1800 − 90 = 1710 — sometimes subtracting a small fraction is quicker than multiplying by a large one.`}]},{id:`cancelling-factors`,heading:`Cancelling common factors before you multiply`,body:[`When a factor appears in both the numerator and denominator of a multiplication, you can cancel it before multiplying, which keeps the numbers smaller and the working simpler.`,`To work out [[7/8]] × [[4/5]]: notice that 8 = 2 × 4, and there is already a 4 in the numerator. Since a 4 divides exactly into the denominator, it cancels with the 4 in the numerator, leaving [[7/10]] straight away — no need to simplify a large fraction like [[28/40]] at the end.`]}],workedExamples:[{id:`we1`,title:`Halving twice`,problem:`Work out [[1/4]] × 600.`,steps:[{label:`Break the fraction into factors`,detail:`[[1/4]] = [[1/2]] × [[1/2]], so finding [[1/4]] of a number means halving it twice.`},{label:`Halve 600`,detail:`600 ÷ 2 = 300. This is [[1/2]] of 600.`},{label:`Halve again`,detail:`300 ÷ 2 = 150. This is [[1/2]] of 300, which is [[1/4]] of the original 600.`}],answer:`150`},{id:`we2`,title:`Using an equivalent tenth`,problem:`Work out [[3/5]] × 120.`,steps:[{label:`Find an equivalent fraction with denominator 10`,detail:`[[3/5]] = [[6/10]], because dividing by 10 is easier than dividing by 5.`},{label:`Work out one tenth of 120`,detail:`120 ÷ 10 = 12. This is [[1/10]] of 120.`},{label:`Multiply by the new numerator`,detail:`12 × 6 = 72. So [[3/5]] × 120 = 72.`}],answer:`72`},{id:`we3`,title:`Cancelling a common factor first`,problem:`Work out [[7/8]] × [[4/5]].`,steps:[{label:`Spot a shared factor`,detail:`Multiply straight across as usual: [[7/8]] × [[4/5]] = (7 × 4) over (8 × 5). Notice that 8 = 4 × 2, and a 4 already appears in the numerator.`},{label:`Cancel the matching 4s`,detail:`Rearranging the denominator as 4 × 2 × 5 = 4 × 10, the two 4s cancel to leave [[7/10]] × [[4/4]].`},{label:`Simplify`,detail:`[[4/4]] = 1, so [[7/10]] × 1 = [[7/10]].`}],answer:`[[7/10]]`}],commonMistakes:[{id:`cm1`,student:`Iqra`,scenario:`Iqra worked out [[5/24]] × [[8/11]] by trying to cancel a common factor from the denominator. She wrote 24 as a product involving 8, but split it into the wrong factors.`,wrongWorking:`Iqra wrote 24 as 8 × 4 (which is actually 32, not 24) instead of 8 × 3, so her cancelling led to [[5/44]] instead of the correct simplified fraction.`,wrongAnswer:`Iqra's answer: [[5/44]]. This is incorrect.`,correctWorking:`24 = 8 × 3, not 8 × 4. Multiplying straight across, [[5/24]] × [[8/11]] = [[40/264]]. Both 40 and 264 can be divided by 8, giving [[5/33]].`,correctAnswer:`Correct answer: [[5/33]].`,tip:`Whenever you break a denominator into factors to cancel, double-check that the factors actually multiply back to the original number — 8 × 3 = 24, but 8 × 4 = 32.`}],practiceQuestions:[{id:`l5q1`,lessonId:`making-calculations-easier`,type:`numeric`,category:`skill`,prompt:`Use factors to work out [[1/4]] × 108.`,correctAnswer:`27`,explanation:`[[1/4]] = [[1/2]] × [[1/2]]. Halve 108 to get 54, then halve 54 to get 27.`,hint:`Halve the number twice.`},{id:`l5q2`,lessonId:`making-calculations-easier`,type:`numeric`,category:`skill`,prompt:`Use factors to work out [[1/6]] × 150.`,correctAnswer:`25`,explanation:`[[1/6]] = [[1/2]] × [[1/3]]. Halve 150 to get 75, then find a third of 75 to get 25.`,hint:`6 = 2 × 3.`},{id:`l5q3`,lessonId:`making-calculations-easier`,type:`numeric`,category:`skill`,prompt:`Use factors to work out [[1/8]] × 280.`,correctAnswer:`35`,explanation:`[[1/8]] = [[1/2]] × [[1/2]] × [[1/2]]. Halve 280 three times: 140, then 70, then 35.`,hint:`Halve the number three times, since 8 = 2 × 2 × 2.`},{id:`l5q4`,lessonId:`making-calculations-easier`,type:`numeric`,category:`skill`,prompt:`Use equivalent fractions to work out [[1/5]] × 340.`,correctAnswer:`68`,explanation:`[[1/5]] = [[2/10]]. First find [[1/10]] of 340 (which is 34), then double it to get 68.`,hint:`Rewrite [[1/5]] as tenths.`},{id:`l5q5`,lessonId:`making-calculations-easier`,type:`numeric`,category:`skill`,prompt:`Use equivalent fractions to work out [[2/5]] × 160.`,correctAnswer:`64`,explanation:`[[2/5]] = [[4/10]]. First find [[1/10]] of 160 (which is 16), then multiply by 4 to get 64.`,hint:`Rewrite [[2/5]] as tenths.`},{id:`l5q6`,lessonId:`making-calculations-easier`,type:`numeric`,category:`application`,prompt:`Use equivalent fractions to work out [[1/20]] × 1100.`,correctAnswer:`55`,explanation:`1100 ÷ 20 = 55, since [[1/20]] means one twentieth.`,hint:`Divide 1100 by 20 directly.`},{id:`l5q7`,lessonId:`making-calculations-easier`,type:`numeric`,category:`application`,prompt:`Use equivalent fractions to work out [[3/20]] × 1900.`,correctAnswer:`285`,explanation:`1900 ÷ 20 = 95 (this is [[1/20]] of 1900). Then 95 × 3 = 285.`,hint:`Find one twentieth first, then multiply by 3.`},{id:`l5q8`,lessonId:`making-calculations-easier`,type:`numeric-fraction`,category:`application`,prompt:`Cancel a common factor first to work out [[3/8]] × [[5/6]].`,correctFrac:{n:5,d:16},explanation:`3 and 6 share a common factor of 3. Multiplying straight across gives [[15/48]], which simplifies to [[5/16]].`,hint:`Look for a factor that 3 and 6 have in common.`},{id:`l5q9`,lessonId:`making-calculations-easier`,type:`numeric-fraction`,category:`application`,prompt:`Cancel a common factor first to work out [[7/9]] × [[18/25]].`,correctFrac:{n:14,d:25},explanation:`9 and 18 share a common factor of 9. Multiplying straight across gives [[126/225]], which simplifies to [[14/25]].`,hint:`Look for a factor that 9 and 18 have in common.`},{id:`l5q10`,lessonId:`making-calculations-easier`,type:`mcq`,category:`error-analysis`,prompt:`Iqra tried to cancel a common factor while working out [[5/24]] × [[8/11]], and got the answer [[5/44]]. What was her mistake?`,choices:[{id:`a`,label:`She split 24 into 8 × 4, but 8 × 4 = 32, not 24 — it should have been 8 × 3.`},{id:`b`,label:`She should have multiplied the denominators before the numerators.`},{id:`c`,label:`She was not allowed to cancel any factors in this question.`}],correctChoiceId:`a`,explanation:`Cancelling common factors only works if the factors are correct. 8 × 3 = 24 is the correct factorisation, not 8 × 4 (which equals 32).`,hint:`Check: does 8 × 4 actually equal 24?`},{id:`l5q11`,lessonId:`making-calculations-easier`,type:`numeric-fraction`,category:`error-analysis`,prompt:`What is the correct answer to [[5/24]] × [[8/11]]?`,correctFrac:{n:5,d:33},explanation:`Multiplying straight across: [[5/24]] × [[8/11]] = [[40/264]]. Both 40 and 264 can be divided by 8, giving [[5/33]].`,hint:`24 = 8 × 3, not 8 × 4.`},{id:`l5q12`,lessonId:`making-calculations-easier`,type:`numeric`,category:`challenge`,prompt:`Use the shortcut [[29/30]] = 1 − [[1/30]] to work out [[29/30]] × 6000.`,correctAnswer:`5800`,explanation:`6000 ÷ 30 = 200 (this is [[1/30]] of 6000). So [[29/30]] × 6000 = 6000 − 200 = 5800.`,hint:`Find [[1/30]] of 6000 first, then subtract it from 6000.`}]},wm=[{id:`fq1`,lessonId:`ordering-fractions`,type:`true-false`,category:`skill`,prompt:`True or false: [[6/4]] = [[1 1/3]].`,trueFalseAnswer:!1,explanation:`[[6/4]] = [[3/2]] = [[1 1/2]], which is not equal to [[1 1/3]].`,hint:`Simplify [[6/4]] first.`},{id:`fq2`,lessonId:`ordering-fractions`,type:`true-false`,category:`skill`,prompt:`True or false: [[3 1/7]] = [[44/14]].`,trueFalseAnswer:!0,explanation:`[[44/14]] = 3 remainder 2, and [[2/14]] simplifies to [[1/7]], so [[44/14]] = [[3 1/7]].`,hint:`Convert [[44/14]] to a mixed number and simplify the fraction part.`},{id:`fq3`,lessonId:`ordering-fractions`,type:`mcq`,category:`skill`,prompt:`What is the correct symbol between [[3/7]] and [[2/5]]?`,choices:[{id:`a`,label:`[[3/7]] > [[2/5]]`},{id:`b`,label:`[[3/7]] < [[2/5]]`},{id:`c`,label:`[[3/7]] = [[2/5]]`}],correctChoiceId:`a`,explanation:`As decimals, [[3/7]] ≈ 0.4286 and [[2/5]] = 0.4. Since 0.4286 is greater than 0.4, [[3/7]] is the bigger fraction.`,hint:`Try converting both fractions to decimals.`},{id:`fq4`,lessonId:`ordering-fractions`,type:`mcq`,ca
