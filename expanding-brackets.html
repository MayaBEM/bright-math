<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bright EngMath · Chapter 3: Expanding Brackets</title>
<style>
/* ============================================================
   Bright EngMath — Chapter 3: Expanding Brackets
   Premium teaching resource · warm teal & ochre design system
   ============================================================ */

:root{
  /* paper + surfaces */
  --paper:#f6f2ec;
  --surface:#ffffff;
  --surface-2:#fbf8f2;
  --surface-3:#f1ece2;
  /* ink */
  --ink:#23272f;
  --ink-soft:#5c6470;
  --ink-faint:#8a8f99;
  /* lines */
  --line:#e7ddce;
  --line-2:#ded3c0;
  /* brand */
  --primary:#0f6e64;
  --primary-d:#0b544c;
  --primary-soft:#e4efec;
  --primary-tint:#f0f6f4;
  /* highlight (use sparingly) */
  --gold:#c9852b;
  --gold-soft:#faf1de;
  /* secondary / clay */
  --clay:#b1543f;
  --clay-soft:#f8ece7;
  /* semantic */
  --ok:#2f8f5b; --ok-bg:#e9f3ec; --ok-line:#bfe0c9;
  --no:#bd4f3d; --no-bg:#f9ece8; --no-line:#eac7bd;
  --warn:#bf862a; --warn-bg:#fbf2df; --warn-line:#ecd6a5;
  --info:#2b6b76; --info-bg:#e7f0f1; --info-line:#c2dbdd;

  --radius:14px; --radius-sm:10px; --radius-lg:20px;

  --font-head:"SF Pro Rounded",ui-rounded,"Segoe UI",system-ui,-apple-system,"Helvetica Neue",Arial,sans-serif;
  --font-body:"Segoe UI",system-ui,-apple-system,"Helvetica Neue",Arial,sans-serif;
  --font-eq:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;

  /* type scale (normal) */
  --fs-title:34px; --fs-h2:25px; --fs-h3:19px;
  --fs-lead:19px; --fs-body:17px; --fs-opt:17px; --fs-small:15px;
  --fs-eq:26px;

  --shell:1160px;
  --canvas:940px;
}
[data-theme="dark"]{
  --paper:#1d1a15; --surface:#26221b; --surface-2:#2b2620; --surface-3:#322c23;
  --ink:#f0ebe1; --ink-soft:#b9b1a3; --ink-faint:#8d8578;
  --line:#3a342a; --line-2:#484031;
  --primary:#43b1a2; --primary-d:#2f978a; --primary-soft:#1d322e; --primary-tint:#20302c;
  --gold:#dda94f; --gold-soft:#312a1a;
  --clay:#d78570; --clay-soft:#31201c;
  --ok:#59c98a; --ok-bg:#19291f; --ok-line:#2c4a37;
  --no:#e08a76; --no-bg:#2f1e1b; --no-line:#4a3029;
  --warn:#dca94f; --warn-bg:#2c2616; --warn-line:#463b21;
  --info:#5ab0bc; --info-bg:#16292b; --info-line:#274043;
}

/* teaching mode scales type up for Zoom */
body.teaching{
  --fs-title:40px; --fs-h2:30px; --fs-h3:22px;
  --fs-lead:24px; --fs-body:21px; --fs-opt:21px; --fs-small:16px;
  --fs-eq:34px;
  --canvas:900px;
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--font-body);
  color:var(--ink);
  background:var(--paper);
  font-size:var(--fs-body);
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
h1,h2,h3,h4{font-family:var(--font-head);font-weight:600;line-height:1.2;margin:0}
p{margin:0 0 .7em}

/* ---------- app shell ---------- */
.shell{max-width:var(--shell);margin:0 auto;padding:0 22px 64px;min-height:100vh}

header.topbar{
  position:sticky;top:0;z-index:50;
  display:flex;align-items:center;gap:16px;
  padding:12px 22px;margin:0 -22px 0;
  background:color-mix(in srgb, var(--paper) 88%, transparent);
  backdrop-filter:saturate(1.1) blur(6px);
  border-bottom:1px solid var(--line);
}
.identity{display:flex;align-items:center;gap:12px;min-width:0}
.mark{
  width:38px;height:38px;flex:0 0 auto;border-radius:10px;
  background:var(--primary);color:#fff;display:grid;place-items:center;
  font-family:var(--font-eq);font-size:19px;font-weight:600;
}
.identity .titles{min-width:0}
.identity .ch{display:block;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.identity h1{font-size:17px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar .grow{flex:1}

.hdr-progress{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--ink-soft)}
.hdr-progress .track{width:96px;height:7px;border-radius:99px;background:var(--surface-3);overflow:hidden}
.hdr-progress .track>i{display:block;height:100%;background:var(--primary);width:0;transition:width .5s}

.tm-toggle{
  display:inline-flex;align-items:center;gap:8px;
  border:1px solid var(--line-2);background:var(--surface);color:var(--ink);
  padding:8px 13px;border-radius:99px;cursor:pointer;font:inherit;font-size:14px;font-weight:600;
  transition:background .15s,border-color .15s,color .15s;
}
.tm-toggle:hover{border-color:var(--primary);color:var(--primary-d)}
.tm-toggle .dot{width:9px;height:9px;border-radius:50%;background:var(--ink-faint);transition:background .2s}
body.teaching .tm-toggle{background:var(--primary);color:#fff;border-color:var(--primary)}
body.teaching .tm-toggle .dot{background:#fff}

.icon-btn{
  width:38px;height:38px;flex:0 0 auto;border-radius:10px;
  border:1px solid var(--line-2);background:var(--surface);color:var(--ink-soft);
  cursor:pointer;display:grid;place-items:center;font-size:16px;
  transition:color .15s,border-color .15s,background .15s;
}
.icon-btn:hover{color:var(--primary-d);border-color:var(--primary)}

/* ---------- main nav ---------- */
nav.mainnav{
  display:flex;gap:2px;margin:14px 0 22px;padding:5px;
  background:var(--surface);border:1px solid var(--line);border-radius:99px;
  width:max-content;max-width:100%;overflow-x:auto;scrollbar-width:none;
}
nav.mainnav::-webkit-scrollbar{display:none}
nav.mainnav button{
  border:0;background:none;cursor:pointer;font:inherit;font-size:15px;font-weight:600;
  color:var(--ink-soft);padding:8px 17px;border-radius:99px;white-space:nowrap;
  transition:background .15s,color .15s;
}
nav.mainnav button:hover{color:var(--ink)}
nav.mainnav button[aria-current="true"]{background:var(--primary-soft);color:var(--primary-d)}
body.teaching nav.mainnav{display:none}

/* teaching-mode slim bar */
.tmbar{display:none;align-items:center;gap:14px;margin:14px 0 20px}
body.teaching .tmbar{display:flex}
.tmbar .exit{border:1px solid var(--line-2);background:var(--surface);color:var(--ink);
  padding:8px 15px;border-radius:99px;cursor:pointer;font:inherit;font-weight:600;font-size:15px}
.tmbar .exit:hover{border-color:var(--primary);color:var(--primary-d)}
.tmbar .where{font-weight:600;color:var(--ink-soft)}

/* ---------- canvas + screens ---------- */
.canvas{max-width:var(--canvas);margin:0 auto}
.screen{animation:rise .4s ease both}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.hidden{display:none!important}

.eyebrow{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--primary-d);font-weight:700;margin-bottom:8px}
.page-title{font-size:var(--fs-title);letter-spacing:-.01em;margin-bottom:6px}
.page-sub{font-size:var(--fs-lead);color:var(--ink-soft);max-width:60ch;margin-bottom:6px}
.section-h{font-size:var(--fs-h2);margin:34px 0 4px}
.divider{height:1px;background:var(--line);margin:26px 0}
.lede{font-size:var(--fs-lead);color:var(--ink);max-width:64ch}

/* ---------- buttons ---------- */
.btn{
  appearance:none;border:1px solid transparent;cursor:pointer;font:inherit;font-weight:600;font-size:16px;
  padding:11px 20px;border-radius:12px;color:#fff;background:var(--primary);
  display:inline-flex;align-items:center;gap:8px;
  transition:background .15s,transform .06s,box-shadow .15s,border-color .15s;
}
.btn:hover{background:var(--primary-d)}
.btn:active{transform:translateY(1px)}
.btn.ghost{background:var(--surface);color:var(--ink);border-color:var(--line-2)}
.btn.ghost:hover{background:var(--surface-2);border-color:var(--primary);color:var(--primary-d)}
.btn.gold{background:var(--gold)}
.btn.gold:hover{filter:brightness(.94)}
.btn.subtle{background:var(--primary-soft);color:var(--primary-d)}
.btn.subtle:hover{background:color-mix(in srgb,var(--primary-soft) 80%, var(--primary) 20%)}
.btn.sm{padding:8px 14px;font-size:14px;border-radius:10px}
.btn.lg{padding:14px 26px;font-size:18px}
.btn.danger{background:var(--surface);color:var(--no);border-color:var(--no-line)}
.btn.danger:hover{background:var(--no-bg)}
.btn:disabled{opacity:.45;cursor:default}
.btn:focus-visible,.icon-btn:focus-visible,.tm-toggle:focus-visible,nav.mainnav button:focus-visible,
.choice:focus-visible,.tab:focus-visible,a:focus-visible,input:focus-visible,select:focus-visible,.roadmap button:focus-visible{
  outline:3px solid color-mix(in srgb,var(--primary) 55%, transparent);outline-offset:2px;
}
.btnrow{display:flex;gap:10px;flex-wrap:wrap}
.btnrow.center{justify-content:center}

/* ---------- equation type ---------- */
.eq{font-family:var(--font-eq)}
.eq .op{color:var(--ink-faint);padding:0 .05em}
.eq .mul{color:var(--gold)}
.eq b{color:var(--primary-d);font-weight:700}
.big-eq{font-family:var(--font-eq);font-size:var(--fs-eq);letter-spacing:.5px}

/* ---------- callouts (one system, differentiated by accent) ---------- */
.callout{
  border:1px solid var(--line);border-left:4px solid var(--ink-faint);
  background:var(--surface);border-radius:var(--radius);
  padding:16px 20px;margin:16px 0;
}
.callout .lbl{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.callout p:last-child{margin-bottom:0}
.callout.rule{border-left-color:var(--primary);background:var(--primary-tint)}
.callout.rule .lbl{color:var(--primary-d)}
.callout.remember{border-left-color:var(--info);background:var(--info-bg)}
.callout.remember .lbl{color:var(--info)}
.callout.example{border-left-color:var(--line-2);background:var(--surface-2)}
.callout.example .lbl{color:var(--ink-soft)}
.callout.mistake{border-left-color:var(--clay);background:var(--clay-soft)}
.callout.mistake .lbl{color:var(--clay)}
.callout.tip{border-left-color:var(--gold);background:var(--gold-soft)}
.callout.tip .lbl{color:var(--gold)}
.callout.tryit{border-left-color:var(--primary);background:var(--surface)}
.callout.tryit .lbl{color:var(--primary-d)}

/* teacher note — visually distinct, muted, dashed */
.tnote{
  border:1px dashed var(--gold);background:var(--gold-soft);border-radius:var(--radius-sm);
  padding:13px 16px;margin:16px 0;font-size:var(--fs-small);color:var(--ink);
}
.tnote .lbl{display:flex;align-items:center;gap:7px;font-weight:700;color:var(--gold);
  font-size:12px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
.tnote ul{margin:.3em 0;padding-left:18px}
.tnote li{margin:3px 0}
body:not(.tnotes-on) .tnote{display:none}

/* ---------- OVERVIEW ---------- */
.hero-split{display:grid;grid-template-columns:1.15fr .85fr;gap:40px;align-items:center;margin-top:12px}
.hero-split .art{display:grid;place-items:center}
.objectives{list-style:none;margin:14px 0 0;padding:0;display:grid;gap:8px}
.objectives li{display:flex;gap:10px;align-items:flex-start;color:var(--ink);font-size:var(--fs-body)}
.objectives .tick{color:var(--primary);flex:0 0 auto;margin-top:2px}

.path{display:grid;grid-template-columns:repeat(3,1fr);gap:0;margin-top:16px;
  border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--surface)}
.path .step{padding:20px 22px;border-right:1px solid var(--line)}
.path .step:last-child{border-right:0}
.path .n{font-family:var(--font-eq);color:var(--primary);font-size:20px;font-weight:700}
.path h4{font-size:var(--fs-h3);margin:6px 0 4px}
.path p{color:var(--ink-soft);font-size:var(--fs-small);margin:0}

.set-list{display:grid;gap:12px;margin-top:8px}
.set-row{
  display:grid;grid-template-columns:auto 1fr auto;gap:20px;align-items:center;
  border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);
  padding:18px 22px;transition:border-color .15s;
}
.set-row:hover{border-color:var(--line-2)}
.set-row .idx{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;
  font-family:var(--font-eq);font-size:20px;font-weight:700;background:var(--primary-soft);color:var(--primary-d)}
.set-row .meta{min-width:0}
.set-row h4{font-size:var(--fs-h3);margin-bottom:2px}
.set-row .sub{color:var(--ink-soft);font-size:var(--fs-small)}
.set-row .facts{display:flex;gap:14px;flex-wrap:wrap;margin-top:6px;font-size:13px;color:var(--ink-faint)}
.set-row .facts .best{color:var(--ok);font-weight:600}
.set-row .go{white-space:nowrap}
@media(max-width:640px){.set-row{grid-template-columns:auto 1fr;gap:14px}.set-row .go{grid-column:1/-1}}

/* ---------- lesson (slides) ---------- */
.roadmap{display:flex;flex-wrap:wrap;gap:7px;margin:6px 0 22px}
.roadmap button{
  border:1px solid var(--line);background:var(--surface);color:var(--ink-soft);cursor:pointer;
  font:inherit;font-size:13.5px;font-weight:600;padding:6px 13px;border-radius:99px;transition:all .15s;
}
.roadmap button:hover{border-color:var(--primary);color:var(--primary-d)}
.roadmap button[aria-current="true"]{background:var(--primary);border-color:var(--primary);color:#fff}
.roadmap .done::before{content:"✓ ";color:var(--ok)}
.roadmap button[aria-current="true"].done::before{color:#fff}
body.teaching .roadmap{display:none}

.slide{min-height:340px}
.slide .kicker{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:4px}
.slide .count{font-size:14px;color:var(--ink-faint);font-weight:600}
.slide h2{font-size:var(--fs-h2);margin-bottom:10px}
.slide .body{font-size:var(--fs-lead);color:var(--ink);max-width:64ch}

/* worked example with step reveal */
.work{border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);
  padding:26px;margin:18px 0;text-align:center}
.work .expr{font-family:var(--font-eq);font-size:var(--fs-eq);letter-spacing:.5px;overflow-wrap:break-word}
.work .expr .term{padding:2px 7px;border-radius:8px;transition:background .3s,opacity .3s;display:inline-block}
.work .expr.stepping .term{opacity:.32}
.work .expr .term.lit{opacity:1;background:var(--primary-soft)}
.work .expr .term.lit.b{background:var(--gold-soft)}
.work .steps{display:flex;flex-direction:column;gap:8px;margin-top:18px;align-items:center}
.work .step{font-family:var(--font-eq);font-size:calc(var(--fs-eq) * .78);color:var(--ink-soft);
  opacity:0;max-height:0;overflow:hidden;transition:opacity .35s,max-height .35s}
.work .step.show{opacity:1;max-height:60px}
.work .answer{margin-top:16px;font-family:var(--font-eq);font-size:var(--fs-eq);
  opacity:0;transform:translateY(6px);transition:all .4s}
.work .answer.show{opacity:1;transform:none}
.work .answer .res{color:var(--primary-d);font-weight:700}
.work .controls{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;margin-top:20px}

/* mistake reveal cards (kept, restyled) */
.mistake-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;margin-top:8px}
.mtile{border:1px solid var(--line);border-left:4px solid var(--clay);border-radius:var(--radius);
  background:var(--surface);padding:18px;cursor:pointer;transition:border-color .15s}
.mtile:hover{border-color:var(--clay)}
.mtile .lbl{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--clay)}
.mtile .bad{font-family:var(--font-eq);font-size:calc(var(--fs-eq)*.72);margin:8px 0}
.mtile .cue{font-size:13.5px;color:var(--primary-d);font-weight:600}
.mtile .reveal{max-height:0;overflow:hidden;opacity:0;transition:all .35s}
.mtile.open .reveal{max-height:220px;opacity:1;margin-top:10px}
.mtile .fix{color:var(--ok);font-weight:600;font-family:var(--font-eq);font-size:calc(var(--fs-eq)*.72)}

.slide-nav{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:26px;
  padding-top:18px;border-top:1px solid var(--line)}
.slide-nav .count2{font-size:14px;color:var(--ink-faint);font-weight:600}

/* ---------- practice + quiz shared ---------- */
.activity-top{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:14px}
.qnum{font-size:14px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--primary-d)}
.pbar{flex:1;min-width:150px;height:8px;border-radius:99px;background:var(--surface-3);overflow:hidden;border:1px solid var(--line)}
.pbar>i{display:block;height:100%;background:var(--primary);width:0;transition:width .5s}
.metrics{display:flex;gap:8px;flex-wrap:wrap;font-size:14px}
.metric{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line);
  padding:5px 12px;border-radius:99px;font-weight:600;color:var(--ink-soft)}
.metric b{color:var(--ink)}

.qstage{margin:6px 0}
.instruction{font-size:var(--fs-body);color:var(--ink-soft);margin-bottom:6px}
.question-expr{font-family:var(--font-eq);font-size:var(--fs-eq);letter-spacing:.5px;margin:6px 0 20px;color:var(--ink);overflow-wrap:break-word}

.choices{display:grid;gap:11px}
.choices.grid2{grid-template-columns:1fr 1fr}
@media(max-width:560px){.choices.grid2{grid-template-columns:1fr}}
.choice{
  display:flex;align-items:center;gap:14px;text-align:left;
  border:1.5px solid var(--line-2);background:var(--surface);border-radius:var(--radius);
  padding:15px 18px;cursor:pointer;font:inherit;font-size:var(--fs-opt);color:var(--ink);
  transition:border-color .12s,background .12s,transform .06s;
}
.choice .key{width:30px;height:30px;flex:0 0 auto;border-radius:8px;background:var(--surface-3);
  border:1px solid var(--line-2);display:grid;place-items:center;font-weight:700;font-size:15px;color:var(--ink-soft)}
.choice .eqc{font-family:var(--font-eq);font-size:calc(var(--fs-opt) * 1.12)}
.choice:hover:not(:disabled){border-color:var(--primary)}
.choice.selected{border-color:var(--primary);background:var(--primary-tint)}
.choice.selected .key{background:var(--primary);border-color:var(--primary);color:#fff}
.choice.correct{border-color:var(--ok);background:var(--ok-bg)}
.choice.correct .key{background:var(--ok);border-color:var(--ok);color:#fff}
.choice.wrong{border-color:var(--no);background:var(--no-bg)}
.choice.wrong .key{background:var(--no);border-color:var(--no);color:#fff}
.choice:disabled{cursor:default}

.typed{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.typed input{
  font-family:var(--font-eq);font-size:calc(var(--fs-opt) * 1.1);padding:13px 18px;border-radius:12px;
  border:1.5px solid var(--line-2);background:var(--surface);color:var(--ink);min-width:220px;flex:1;
}
.typed input:focus{border-color:var(--primary)}
.fmt-hint{font-size:var(--fs-small);color:var(--ink-faint);margin-top:8px}

/* matching as two columns */
.match-wrap{display:grid;gap:10px}
.match-row{display:grid;grid-template-columns:minmax(120px,1fr) auto minmax(160px,1.2fr);gap:12px;align-items:center}
.match-row .from{font-family:var(--font-eq);font-size:calc(var(--fs-opt)*1.05);padding:11px 14px;
  background:var(--surface-2);border:1px solid var(--line);border-radius:10px}
.match-row .arr{color:var(--ink-faint)}
.match-row select{font-family:var(--font-eq);font-size:var(--fs-opt);padding:11px 14px;border-radius:10px;
  border:1.5px solid var(--line-2);background:var(--surface);color:var(--ink)}
.match-row.ok select{border-color:var(--ok);background:var(--ok-bg)}
.match-row.no select{border-color:var(--no);background:var(--no-bg)}
@media(max-width:560px){.match-row{grid-template-columns:1fr;gap:5px}.match-row .arr{display:none}}

/* ordering lanes */
.order-list{display:grid;gap:9px}
.order-item{display:flex;align-items:center;gap:12px;background:var(--surface);
  border:1.5px solid var(--line-2);border-radius:12px;padding:12px 14px}
.order-item .rank{width:26px;height:26px;border-radius:7px;background:var(--surface-3);border:1px solid var(--line);
  display:grid;place-items:center;font-weight:700;color:var(--ink-soft);font-size:14px;flex:0 0 auto}
.order-item .txt{font-family:var(--font-eq);font-size:calc(var(--fs-opt)*1.05);flex:1}
.order-item .mv{display:flex;flex-direction:column;gap:3px}
.order-item .mv button{width:32px;height:22px;border:1px solid var(--line-2);background:var(--surface-2);
  border-radius:6px;cursor:pointer;color:var(--ink-soft);font-size:11px;line-height:1}
.order-item .mv button:hover:not(:disabled){color:var(--primary-d);border-color:var(--primary)}
.order-item.ok{border-color:var(--ok);background:var(--ok-bg)}
.order-item.no{border-color:var(--no);background:var(--no-bg)}

.qcontrols{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}

/* feedback — icon + label + text + border (not colour alone) */
.feedback{display:none;margin-top:16px;border:1px solid var(--line);border-left:4px solid var(--ink-faint);
  border-radius:var(--radius);padding:15px 18px;animation:rise .25s both}
.feedback.show{display:block}
.feedback .head{display:flex;align-items:center;gap:9px;font-weight:700;font-size:var(--fs-body)}
.feedback .ic{width:24px;height:24px;flex:0 0 auto;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:14px}
.feedback p{margin:6px 0 0;color:var(--ink);font-size:var(--fs-body)}
.feedback .worked{font-family:var(--font-eq);font-size:calc(var(--fs-body)*1.05);margin-top:8px;color:var(--ink)}
.feedback.good{border-left-color:var(--ok);background:var(--ok-bg)}
.feedback.good .ic{background:var(--ok)}
.feedback.good .head{color:var(--ok)}
.feedback.bad{border-left-color:var(--no);background:var(--no-bg)}
.feedback.bad .ic{background:var(--no)}
.feedback.bad .head{color:var(--no)}
.feedback.note{border-left-color:var(--warn);background:var(--warn-bg)}
.feedback.note .ic{background:var(--warn)}
.feedback.note .head{color:var(--warn)}

.hintbox{display:none;margin-top:12px;border:1px solid var(--warn-line);background:var(--warn-bg);
  border-radius:var(--radius-sm);padding:13px 16px;font-size:var(--fs-body)}
.hintbox.show{display:block}
.hintbox b{color:var(--warn)}

/* shake for wrong (subtle) */
.shake{animation:shk .35s}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* ---------- results ---------- */
.result-top{display:grid;grid-template-columns:auto 1fr;gap:28px;align-items:center;
  border:1px solid var(--line);border-radius:var(--radius-lg);background:var(--surface);padding:26px 30px}
.result-top .ringwrap{position:relative;width:132px;height:132px}
.result-top .ringwrap .pct{position:absolute;inset:0;display:grid;place-items:center;
  font-family:var(--font-head);font-size:30px;font-weight:700;color:var(--ink)}
.result-top .lvl{font-size:var(--fs-h2);margin-bottom:2px}
.result-top .msg{color:var(--ink-soft);max-width:48ch;margin:0}
.result-top .tag{display:inline-block;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--primary-d);margin-bottom:8px}
@media(max-width:560px){.result-top{grid-template-columns:1fr;text-align:center;justify-items:center}}

.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:0;margin:20px 0;
  border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--surface)}
.stat-row .cell{padding:16px;text-align:center;border-right:1px solid var(--line)}
.stat-row .cell:last-child{border-right:0}
.stat-row .v{font-family:var(--font-head);font-size:24px;font-weight:700}
.stat-row .l{font-size:13px;color:var(--ink-soft)}

.skill-list{display:grid;gap:11px;margin:12px 0}
.skill-row{display:grid;grid-template-columns:200px 1fr 52px;gap:14px;align-items:center}
.skill-row .nm{font-size:var(--fs-small);color:var(--ink-soft)}
.skill-row .track{height:9px;border-radius:99px;background:var(--surface-3);border:1px solid var(--line);overflow:hidden}
.skill-row .track>i{display:block;height:100%;background:var(--primary);width:0;transition:width .8s}
.skill-row .v{font-size:13px;text-align:right;color:var(--ink-soft)}
@media(max-width:560px){.skill-row{grid-template-columns:1fr}.skill-row .v{text-align:left}}

/* review */
.review-item{border:1px solid var(--line);border-left:4px solid var(--ink-faint);border-radius:var(--radius);
  background:var(--surface);padding:16px 20px;margin-bottom:12px}
.review-item.ok{border-left-color:var(--ok)}
.review-item.no{border-left-color:var(--no)}
.review-item .rtag{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase}
.review-item.ok .rtag{color:var(--ok)}
.review-item.no .rtag{color:var(--no)}
.review-item .qq{font-family:var(--font-eq);font-size:calc(var(--fs-eq)*.8);margin:6px 0}
.review-item .ln{font-size:var(--fs-small);margin:2px 0;color:var(--ink-soft)}
.review-item .ln b{color:var(--ink)}
.review-item .why{margin-top:8px;font-size:var(--fs-small);color:var(--ink);background:var(--surface-2);
  border:1px solid var(--line);border-radius:10px;padding:11px 14px}

/* dashboard */
.dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:820px){.dash-grid{grid-template-columns:1fr}}
.dash-card{border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);padding:18px 20px}
.dash-card h4{font-size:var(--fs-h3);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.dash-card .r{display:flex;justify-content:space-between;font-size:var(--fs-small);color:var(--ink-soft);margin:4px 0}
.dash-card .r b{color:var(--ink)}
.state-dot{width:9px;height:9px;border-radius:50%;background:var(--ink-faint)}
.state-dot.done{background:var(--ok)}

.overview-strip{display:flex;align-items:center;gap:26px;flex-wrap:wrap;
  border:1px solid var(--line);border-radius:var(--radius-lg);background:var(--surface);padding:22px 26px}
.overview-strip .ringwrap{position:relative;width:120px;height:120px;flex:0 0 auto}
.overview-strip .ringwrap .pct{position:absolute;inset:0;display:grid;place-items:center;
  font-family:var(--font-head);font-size:26px;font-weight:700}

.badge-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-top:8px}
.badge{display:flex;align-items:center;gap:11px;border:1px solid var(--line);border-radius:var(--radius-sm);
  background:var(--surface-2);padding:11px 13px;opacity:.5}
.badge.on{opacity:1;background:var(--surface);border-color:var(--line-2)}
.badge .bi{width:34px;height:34px;flex:0 0 auto;border-radius:9px;display:grid;place-items:center;
  background:var(--surface-3);font-size:17px}
.badge.on .bi{background:var(--primary-soft)}
.badge .bn{font-size:14px;font-weight:600;line-height:1.2}
.badge .bd{font-size:12px;color:var(--ink-faint)}

/* answer key (teacher) */
.key-table{width:100%;border-collapse:collapse;font-size:var(--fs-small);margin-top:10px}
.key-table th,.key-table td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:top}
.key-table th{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
.key-table .a{font-family:var(--font-eq);color:var(--primary-d);font-weight:700;white-space:nowrap}
.key-table td:first-child{color:var(--ink-faint);font-weight:700;width:38px}

.cert{border:2px solid var(--primary);border-radius:var(--radius-lg);background:var(--surface);

.cert .frame{position:absolute;inset:10px;border:1px solid var(--line-2);border-radius:12px;pointer-events:none}
.cert .corner{position:absolute;width:26px;height:26px;border:2px solid var(--gold)}
.cert .c1{top:16px;left:16px;border-right:0;border-bottom:0}
.cert .c2{top:16px;right:16px;border-left:0;border-bottom:0}
.cert .c3{bottom:16px;left:16px;border-right:0;border-top:0}
.cert .c4{bottom:16px;right:16px;border-left:0;border-top:0}
.cert .seal{width:66px;height:66px;border-radius:50%;margin:0 auto 12px;display:grid;place-items:center;
  background:var(--primary);color:#fff;font-size:26px}
.cert .k{font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
.cert h2{font-family:var(--font-eq);font-size:30px;margin:8px 0}
.cert .name{font-size:28px;font-weight:700;color:var(--primary-d);margin:10px 0;
  border-bottom:2px solid var(--line-2);display:inline-block;padding:0 24px 6px}
.cert .facts{display:flex;justify-content:center;gap:40px;flex-wrap:wrap;margin-top:14px}
.cert .facts .fv{font-family:var(--font-head);font-size:20px;font-weight:700;color:var(--primary-d)}
.cert .facts .fl{font-size:12px;color:var(--ink-soft)}

/* modal */
.modal-back{position:fixed;inset:0;background:rgba(35,39,47,.44);z-index:100;display:none;place-items:center;padding:20px}
.modal-back.show{display:grid;animation:rise .2s both}
.modal{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);
  max-width:560px;width:100%;padding:28px;max-height:88vh;overflow:auto}
.modal h3{font-size:var(--fs-h2);margin-bottom:12px}
.modal ul{margin:8px 0;padding-left:20px}
.modal li{margin:7px 0;color:var(--ink-soft)}
.settings-row{display:flex;align-items:center;justify-content:space-between;gap:14px;
  padding:13px 0;border-bottom:1px solid var(--line)}
.settings-row:last-of-type{border-bottom:0}
.settings-row .sl{font-weight:600}
.settings-row .sd{font-size:13px;color:var(--ink-soft)}
.switch{width:46px;height:26px;border-radius:99px;background:var(--surface-3);border:1px solid var(--line-2);
  position:relative;cursor:pointer;flex:0 0 auto;transition:background .2s}
.switch::after{content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;
  background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.2);transition:left .2s}
.switch[aria-checked="true"]{background:var(--primary)}
.switch[aria-checked="true"]::after{left:22px}

/* toast (restrained) */
#toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(20px);z-index:120;
  background:var(--surface);border:1px solid var(--line-2);border-radius:12px;padding:11px 16px;
  display:flex;align-items:center;gap:11px;opacity:0;transition:all .3s;pointer-events:none;box-shadow:0 6px 20px rgba(35,39,47,.12)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast .ti{width:32px;height:32px;border-radius:9px;background:var(--primary-soft);display:grid;place-items:center;font-size:17px}
#toast .t1{font-weight:700;font-size:14px}
#toast .t2{font-size:12.5px;color:var(--ink-soft)}

#confetti{position:fixed;inset:0;pointer-events:none;z-index:110;display:none}

footer.foot{max-width:var(--canvas);margin:40px auto 0;padding-top:20px;border-top:1px solid var(--line);
  color:var(--ink-soft);font-size:var(--fs-small)}
footer.foot .brand{font-weight:600;color:var(--ink)}
footer.foot .note{color:var(--ink-faint);font-size:13.5px;margin-top:6px;max-width:70ch}

.empty{text-align:center;padding:40px 20px;color:var(--ink-soft)}
.empty .em-ic{width:60px;height:60px;border-radius:16px;background:var(--surface-3);display:grid;place-items:center;
  margin:0 auto 14px;font-size:26px}

/* responsive */
@media(max-width:820px){
  .hero-split{grid-template-columns:1fr;gap:24px}
  .path{grid-template-columns:1fr}
  .path .step{border-right:0;border-bottom:1px solid var(--line)}
  .path .step:last-child{border-bottom:0}
}
@media(max-width:560px){
  .shell{padding:0 15px 48px}
  header.topbar{padding:10px 15px;margin:0 -15px 0;gap:8px}
  .identity h1{font-size:15px}
  .identity .ch{display:none}
  .hdr-progress{display:none}
  .tm-toggle span.lbltxt{display:none}
  .result-top{padding:20px}
  .cert{padding:26px 18px}
  .cert .name{padding:0 12px 6px;font-size:24px}
  .cert .facts{gap:22px}
  .page-title{font-size:28px}
  /* keep enlarged Teaching-Mode type sane on small phones */
  body.teaching{--fs-title:26px;--fs-h2:22px;--fs-lead:19px;--fs-body:18px;--fs-opt:18px;--fs-eq:24px}
}
#toast{max-width:calc(100vw - 32px)}

@media print{
  header.topbar,nav.mainnav,.tmbar,.roadmap,.qcontrols,.slide-nav,.btnrow,#toast,.no-print,footer .note{display:none!important}
  body{background:#fff;font-size:12pt}
  .canvas,.shell{max-width:100%}
  .callout,.work,.set-row,.dash-card,.result-top,.cert{break-inside:avoid}
}

@media(prefers-reduced-motion:reduce){
  *{animation-duration:.001ms!important;transition-duration:.001ms!important}
}

const SKILLS=["Basic Distribution","Signs and Subtraction","Negative Multipliers","Combining Like Terms","Multi-Step Expressions","Error Analysis"];

];

function mc(o){o.type="mc";return o;} function typed(o){o.type="typed";return o;}
function tf(o){o.type="tf";return o;} function sall(o){o.type="selectall";return o;}
function match(o){o.type="match";return o;} function order(o){o.type="order";return o;}

const SET1=[
  mc({expr:"Expand 2(x + 4)",prompt:"Expand the brackets.",skill:"Basic Distribution",

    explain:"4 × m = 4m and 4 × 3 = 12, so 4(m − 3) = 4m − 12."}),
  mc({expr:"Which expression is equal to 6(p + 1)?",prompt:"Choose the correct expansion.",skill:"Basic Distribution",
    choices:["6p + 1","6p + 6","6 + p","7p"],answer:1,
    hint:"Remember to multiply the 1 as well.",explain:"6 × p = 6p and 6 × 1 = 6, so 6(p + 1) = 6p + 6."}),
  mc({expr:"3(k + 7)",prompt:"Which first step is correct?",skill:"Basic Distribution",
    choices:["3 × k + 3 × 7","3 × k + 7","3 + k × 7","k × 7 + 3"],answer:0,

  typed({expr:"8(t + 2) = 8t + ___",prompt:"Fill in the blank.",skill:"Basic Distribution",

  mc({expr:"A student wrote 5(a + 2) = 5a + 2",prompt:"Find and fix the mistake. What is the correct answer?",skill:"Error Analysis",

    pairs:[{left:"2(x + 1)",right:"2x + 2"},{left:"3(x + 2)",right:"3x + 6"},{left:"4(x + 1)",right:"4x + 4"},{left:"2(x + 3)",right:"2x + 6"}],

const SET2=[

/* ============================================================ LINEAR NORMALIZER ============================================================ */
function normLin(str){
  if(str===null||str===undefined)return null;
  let s=String(str).toLowerCase().trim().replace(/\s+/g,"").replace(/[−–—]/g,"-").replace(/[×·*]/g,"").replace(/=/g,"");
  if(s==="")return null;
  if(!/^[+-]/.test(s))s="+"+s;
  const terms=s.match(/[+-][^+-]*/g);if(!terms)return null;
  const map={};
  for(const t of terms){
    const sign=t[0]==="-"?-1:1;let body=t.slice(1);if(body==="")return "ERR";
    const m=body.match(/^(\d*\.?\d*)([a-z]?)$/);if(!m)return "ERR";
    let coefStr=m[1],varStr=m[2];if(coefStr===""&&varStr==="")return "ERR";
    let coef=coefStr===""?1:parseFloat(coefStr);if(isNaN(coef))return "ERR";
    coef*=sign;map[varStr]=(map[varStr]||0)+coef;
  }
  const keys=Object.keys(map).filter(k=>Math.abs(map[k])>1e-9).sort();
  if(keys.length===0)return "0";
  return keys.map(k=>`${map[k]}${k}`).join("+");
}
function typedCorrect(input,answer){const a=normLin(input),b=normLin(answer);
  if(a===null)return {ok:false,err:"empty"};if(a==="ERR")return {ok:false,err:"format"};
  return {ok:a===b,err:null};}

function eqFmt(str){let s=String(str).replace(/-/g,"−");
  s=s.replace(/ ([+−]) /g,' <span class="op">$1</span> ').replace(/×/g,'<span class="mul">×</span>');return s;}
function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

  return `<div class="work" data-ex="${id}">
    <div class="expr" data-expr>${ex.display}</div>
    <div class="steps">${ex.steps.map(()=>'<div class="step"></div>').join("")}</div>
    <div class="answer"><span class="eq">= <span class="res"></span></span></div>
    <div class="controls">
      <button class="btn sm" data-act="next">Reveal step</button>
      <button class="btn ghost sm" data-act="answer">Reveal answer</button>
      <button class="btn ghost sm" data-act="reset">Reset</button>
    </div>
  </div>`;
}
const EX_DATA={};
function initWorked(root,id,ex){
  EX_DATA[id]={ex,shown:0,done:false};
  const el=root.querySelector(`[data-ex="${id}"]`);
  const expr=el.querySelector("[data-expr]");
  const steps=[...el.querySelectorAll(".step")];
  const ansWrap=el.querySelector(".answer"), ansRes=el.querySelector(".res");
  const nextBtn=el.querySelector('[data-act="next"]');
  function lightFocus(focus){
    expr.classList.add("stepping");
    expr.querySelectorAll(".term").forEach(t=>t.classList.remove("lit"));
    if(focus)focus.forEach(f=>{const t=expr.querySelector(`[data-t="${f}"]`);if(t)t.classList.add("lit");});
  }
  function showStep(i){
    const st=EX_DATA[id].ex.steps[i];
    steps[i].innerHTML=eqFmt(st.calc);steps[i].classList.add("show");
    lightFocus(st.focus);
  }
  function revealAnswer(){
    while(EX_DATA[id].shown<steps.length){showStep(EX_DATA[id].shown);EX_DATA[id].shown++;}
    expr.classList.remove("stepping");expr.querySelectorAll(".term").forEach(t=>t.classList.remove("lit"));
    ansRes.innerHTML=eqFmt(EX_DATA[id].ex.answer);ansWrap.classList.add("show");
    EX_DATA[id].done=true;nextBtn.disabled=true;beep("tick");
  }
  el.querySelector('[data-act="next"]').onclick=()=>{
    const S=EX_DATA[id];if(S.shown<steps.length){showStep(S.shown);S.shown++;beep("tick");
      if(S.shown===steps.length)nextBtn.textContent="All steps shown";}
  };
  el.querySelector('[data-act="answer"]').onclick=revealAnswer;
  el.querySelector('[data-act="reset"]').onclick=()=>{
    EX_DATA[id].shown=0;EX_DATA[id].done=false;
    steps.forEach(s=>{s.classList.remove("show");s.innerHTML="";});
    ansWrap.classList.remove("show");ansRes.innerHTML="";
    expr.classList.remove("stepping");expr.querySelectorAll(".term").forEach(t=>t.classList.remove("lit"));
    nextBtn.disabled=false;nextBtn.textContent="Reveal step";
  };
}

/* ============================================================ QUIZ ENGINE ============================================================ */
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function startQuiz(setNo){
  const S=SETS[setNo];
  let qs=S.questions.map((q,idx)=>prepQuestion(q,idx));
  if(STORE.shuffleQ)qs=shuffle(qs);
  quiz={setNo,S,qs,i:0,score:0,correct:0,wrong:0,hints:0,streak:0,bestStreak:0,start:Date.now(),perSkill:{},records:[]};
  SKILLS.forEach(s=>quiz.perSkill[s]={c:0,t:0});
  drawQuiz();
}
function prepQuestion(q,idx){
  const c=Object.assign({},q);c.oidx=idx;
  if(q.type==="mc"||q.type==="tf"){
    let choices=q.type==="tf"?[{t:"True",v:true},{t:"False",v:false}]:q.choices.map((t,k)=>({t,v:k}));
    c.answerVal=q.answer;c.display=shuffle(choices);
  }else if(q.type==="selectall"){c.display=shuffle(q.choices.map((t,k)=>({t,v:k})));c.answerSet=new Set(q.answer);}
  else if(q.type==="match"){c.rights=shuffle(q.pairs.map(p=>p.right));}
  else if(q.type==="order"){let sh=shuffle(q.steps);if(sh.join("|")===q.steps.join("|"))sh=shuffle(q.steps);c.current=sh;}
  c.attempts=0;c.hintUsed=false;c.answered=false;c.awarded=0;return c;
}
function drawQuiz(){
  const Q=quiz.qs[quiz.i],S=quiz.S,n=quiz.qs.length;

        <button class="btn" id="submitBtn">Check answer</button>

  </section>`;
  renderAnswers(Q);

}
function typeLabel(Q){return {mc:"Choose one",tf:"True or false",typed:"Type your answer",selectall:"Select all that apply",match:"Match the pairs",order:"Put in order"}[Q.type]||"Question";}

function renderAnswers(Q){
  const box=document.getElementById("answers");
  if(Q.type==="mc"||Q.type==="tf"){
    const grid=(Q.type==="tf")?"choices grid2":"choices";
    box.innerHTML=`<div class="${grid}" role="listbox">`+Q.display.map((c,k)=>
      `<button class="choice" data-k="${k}" role="option" aria-selected="false"><span class="key">${String.fromCharCode(65+k)}</span><span class="eqc">${eqFmt(c.t)}</span></button>`).join("")+`</div>`;
    box.querySelectorAll(".choice").forEach(b=>b.onclick=()=>{if(Q.answered)return;
      box.querySelectorAll(".choice").forEach(x=>{x.classList.remove("selected");x.setAttribute("aria-selected","false");});
      b.classList.add("selected");b.setAttribute("aria-selected","true");Q.sel=+b.dataset.k;});
  }else if(Q.type==="selectall"){
    box.innerHTML=`<div class="choices">`+Q.display.map((c,k)=>
      `<button class="choice" data-k="${k}" aria-pressed="false"><span class="key">＋</span><span class="eqc">${eqFmt(c.t)}</span></button>`).join("")+`</div>`;
    box.querySelectorAll(".choice").forEach(b=>b.onclick=()=>{if(Q.answered)return;
      const on=b.classList.toggle("selected");b.setAttribute("aria-pressed",on);b.querySelector(".key").textContent=on?"✓":"＋";});
  }else if(Q.type==="typed"){
    box.innerHTML=`<div class="typed"><input id="tin" type="text" inputmode="text" autocomplete="off" spellcheck="false" placeholder="Type your answer" aria-label="Type your answer"></div><div class="fmt-hint">Spaces are ignored · order doesn’t matter.</div>`;
    const inp=document.getElementById("tin");inp.focus();inp.addEventListener("keydown",e=>{if(e.key==="Enter")submit(Q);});
  }else if(Q.type==="match"){
    box.innerHTML=`<div class="match-wrap">`+Q.pairs.map((p,k)=>`
      <div class="match-row" data-k="${k}">
        <span class="from">${eqFmt(p.left)}</span><span class="arr">→</span>
        <select aria-label="Match for ${p.left}"><option value="">Choose…</option>${Q.rights.map(r=>`<option value="${r}">${r}</option>`).join("")}</select>
      </div>`).join("")+`</div>`;
  }else if(Q.type==="order"){drawOrder(Q);}
}
function drawOrder(Q){
  const box=document.getElementById("answers");box.innerHTML=`<div class="order-list" id="orderlist"></div>`;
  const list=document.getElementById("orderlist");
  function paint(){
    list.innerHTML=Q.current.map((s,k)=>`
      <div class="order-item" data-k="${k}"><span class="rank">${k+1}</span><span class="txt">${eqFmt(s)}</span>
        <span class="mv"><button data-up="${k}" ${k===0?"disabled":""} aria-label="Move up">▲</button><button data-dn="${k}" ${k===Q.current.length-1?"disabled":""} aria-label="Move down">▼</button></span></div>`).join("");
    list.querySelectorAll("[data-up]").forEach(b=>b.onclick=()=>{if(Q.answered)return;const k=+b.dataset.up;[Q.current[k-1],Q.current[k]]=[Q.current[k],Q.current[k-1]];paint();});
    list.querySelectorAll("[data-dn]").forEach(b=>b.onclick=()=>{if(Q.answered)return;const k=+b.dataset.dn;[Q.current[k+1],Q.current[k]]=[Q.current[k],Q.current[k+1]];paint();});
  }
  paint();Q._paintOrder=paint;
}
function useHint(Q){const h=document.getElementById("hintbox");h.innerHTML=`<b>Hint:</b> ${Q.hint}`;h.classList.add("show");if(!Q.hintUsed){Q.hintUsed=true;quiz.hints++;}}

function gradeQuestion(Q){
  if(Q.type==="mc"||Q.type==="tf"){if(Q.sel==null)return {empty:true};const c=Q.display[Q.sel];return {ok:c.v===Q.answerVal,chosenText:c.t};}
  if(Q.type==="typed"){const v=document.getElementById("tin").value;const r=typedCorrect(v,Q.answer);if(r.err==="empty")return {empty:true};if(r.err==="format")return {format:true};return {ok:r.ok,chosenText:v};}
  if(Q.type==="selectall"){const sel=[...document.querySelectorAll("#answers .choice.selected")].map(b=>Q.display[+b.dataset.k].v);if(sel.length===0)return {empty:true};const s=new Set(sel);return {ok:s.size===Q.answerSet.size&&[...s].every(x=>Q.answerSet.has(x)),chosenText:sel.map(i=>Q.choices[i]).join(", ")};}
  if(Q.type==="match"){const rows=[...document.querySelectorAll("#answers .match-row")];if(rows.some(r=>!r.querySelector("select").value))return {empty:true};let ok=true;rows.forEach(r=>{const k=+r.dataset.k;if(r.querySelector("select").value!==Q.pairs[k].right)ok=false;});return {ok,chosenText:"matching"};}
  if(Q.type==="order"){return {ok:Q.current.join("|")===Q.steps.join("|"),chosenText:"ordering"};}
}

function submit(Q){
  if(Q.answered)return;
  if(Q.type==="typed"){const inp=document.getElementById("tin");if(inp)Q._typed=inp.value;}
  if(Q.type==="selectall"){Q._sel=[...document.querySelectorAll("#answers .choice.selected")].map(b=>eqFmt(Q.display[+b.dataset.k].t)).join(", ")||"—";}
  const g=gradeQuestion(Q),fb=document.getElementById("fb");
  if(g.empty){fb.className="feedback note show";fb.innerHTML=`<div class="head"><span class="ic">i</span>Choose or type an answer first</div>`;return;}
  if(g.format){fb.className="feedback note show";fb.innerHTML=`<div class="head"><span class="ic">i</span>I couldn’t read that</div><p>Try a form like <b>2x + 6</b>.</p>`;return;}
  Q.attempts++;markFirst();
  if(g.ok){
    Q.answered=true;let pts=Q.attempts===1?10:6;if(Q.hintUsed)pts=Math.max(0,pts-2);Q.awarded=pts;
    quiz.score+=pts;quiz.correct++;quiz.streak++;quiz.bestStreak=Math.max(quiz.bestStreak,quiz.streak);
    quiz.perSkill[Q.skill].c++;quiz.perSkill[Q.skill].t++;
    lockChoices(Q,true);
    if(quiz.streak>0&&quiz.streak%3===0){unlock("three");quiz.score+=5;toast("▲","Streak bonus","+5 for 3 in a row");}
    if(Q.skill==="Error Analysis")unlock("sign");
    fb.className="feedback good show";fb.innerHTML=`<div class="head"><span class="ic">✓</span>${posMsg()}</div><p>${Q.explain}</p>`;
    beep("good");swapToNext();
  }else{
    quiz.streak=0;
    if(Q.attempts<2&&["mc","tf","typed","selectall"].includes(Q.type)){
      fb.className="feedback bad show";fb.innerHTML=`<div class="head"><span class="ic">✕</span>Not quite — try once more</div><p>${retryHint(Q)}</p>`;
      if(Q.type==="mc"||Q.type==="tf"){const btns=document.querySelectorAll("#answers .choice");btns.forEach(b=>{if(+b.dataset.k===Q.sel)b.classList.add("wrong");});setTimeout(()=>btns.forEach(b=>b.classList.remove("wrong","selected")),850);Q.sel=null;}
      const st=document.getElementById("qstage");st.classList.add("shake");setTimeout(()=>{const s=document.getElementById("qstage");if(s)s.classList.remove("shake");},350);beep("bad");
    }else{
      Q.answered=true;Q.awarded=0;quiz.wrong++;quiz.perSkill[Q.skill].t++;lockChoices(Q,false);
      fb.className="feedback bad show";fb.innerHTML=`<div class="head"><span class="ic">✕</span>${negMsg()}</div><p>${Q.explain}</p>`;beep("bad");swapToNext();
    }
  }
}
function retryHint(Q){if(Q.type==="typed")return "Check each multiplication and the sign of every term.";if(Q.type==="selectall")return "Re-check each option — you may have missed one or included an extra.";return "Look again — multiply the outside term by everything inside.";}
function lockChoices(Q,ok){
  if(Q.type==="mc"||Q.type==="tf"){document.querySelectorAll("#answers .choice").forEach(b=>{b.disabled=true;const k=+b.dataset.k,c=Q.display[k],isAns=c.v===Q.answerVal;
    if(isAns){b.classList.add("correct");b.querySelector(".key").textContent="✓";}else if(k===Q.sel){b.classList.add("wrong");b.querySelector(".key").textContent="✕";}});}
  else if(Q.type==="typed"){const inp=document.getElementById("tin");if(inp)inp.disabled=true;}
  else if(Q.type==="selectall"){document.querySelectorAll("#answers .choice").forEach(b=>{b.disabled=true;const k=+b.dataset.k;
    if(Q.answerSet.has(Q.display[k].v)){b.classList.add("correct");b.querySelector(".key").textContent="✓";}else if(b.classList.contains("selected")){b.classList.add("wrong");b.querySelector(".key").textContent="✕";}});}
  else if(Q.type==="match"){document.querySelectorAll("#answers .match-row").forEach(r=>{const k=+r.dataset.k,sel=r.querySelector("select");sel.disabled=true;r.classList.add(sel.value===Q.pairs[k].right?"ok":"no");if(sel.value!==Q.pairs[k].right)sel.value=Q.pairs[k].right;});}
  else if(Q.type==="order"){document.querySelectorAll("#answers .order-item").forEach((it,k)=>{it.querySelectorAll("button").forEach(b=>b.disabled=true);it.classList.add(Q.current[k]===Q.steps[k]?"ok":"no");});
    if(!ok){Q.current=Q.steps.slice();if(Q._paintOrder)Q._paintOrder();document.querySelectorAll("#answers .order-item").forEach(it=>{it.querySelectorAll("button").forEach(b=>b.disabled=true);it.classList.add("ok");});}}
}
function swapToNext(){document.getElementById("hintBtn").disabled=true;const sb=document.getElementById("submitBtn");sb.textContent=(quiz.i===quiz.qs.length-1)?"See results →":"Next question →";sb.onclick=nextQuestion;}
function nextQuestion(){if(quiz.i<quiz.qs.length-1){quiz.i++;drawQuiz();}else finishQuiz();}
function posMsg(){return ["Correct — you multiplied every term.","Nice work — signs all correct.","Exactly right.","Perfect distribution."][Math.floor(Math.random()*4)];}
function negMsg(){return ["Not quite — here’s the worked solution.","Let’s look at this one together.","Close — study the steps below."][Math.floor(Math.random()*3)];}

/* ============================================================ RESULTS ============================================================ */
function finishQuiz(){
  const n=quiz.qs.length,pct=Math.round(quiz.correct/n*100),secs=Math.round((Date.now()-quiz.start)/1000),noHint=quiz.hints===0;
  const rec=STORE.sets[quiz.setNo]||{attempts:0,best:null};
  rec.attempts=(rec.attempts||0)+1;rec.last=pct;rec.best=(rec.best==null)?pct:Math.max(rec.best,pct);
  rec.bestStreak=Math.max(rec.bestStreak||0,quiz.bestStreak);rec.stars=(rec.stars||0)+Math.round(quiz.score/10);rec.done=true;
  STORE.sets[quiz.setNo]=rec;
  if(pct===100)unlock("perfect");if(noHint)unlock("nohint");
  if(quiz.setNo===1)unlock("s1done");if(quiz.setNo===2)unlock("s2done");if(quiz.setNo===3&&pct>=90)unlock("master");

  <section class="screen">
    <div class="result-top">

      <div>
        <span class="tag">Set ${quiz.setNo} · ${quiz.S.name}</span>

      <div class="cell"><div class="v" style="color:var(--no)">${quiz.wrong}</div><div class="l">Incorrect</div></div>
      <div class="cell"><div class="v">${quiz.bestStreak}</div><div class="l">Best streak</div></div>
      <div class="cell"><div class="v">${quiz.hints}</div><div class="l">Hints used</div></div>
      <div class="cell"><div class="v">${fmtTime(secs)}</div><div class="l">Time</div></div>
    </div>

      <button class="btn" onclick="go('quiz',${quiz.setNo})">Retry set</button>
      ${quiz.setNo<3?`<button class="btn subtle" onclick="go('quiz',${quiz.setNo+1})">Next level →</button>`:``}
      <button class="btn ghost" onclick="go('quizzes')">All quizzes</button>
      <button class="btn ghost" onclick="window.print()">Print</button>
    </div>
    ${allSetsDone()?`<div class="btnrow center" style="margin-top:14px"><button class="btn gold" onclick="go('cert')">Get your certificate →</button></div>`:``}
  </section>`;
  setTimeout(()=>document.querySelectorAll(".skill-row .track>i").forEach(el=>el.style.width=el.dataset.w+"%"),80);
}
function skillBars(){return SKILLS.map(s=>{const d=quiz.perSkill[s];if(d.t===0)return "";const p=Math.round(d.c/d.t*100);
  return `<div class="skill-row"><span class="nm">${s}</span><span class="track"><i data-w="${p}"></i></span><span class="v">${d.c}/${d.t}</span></div>`;}).join("");}
function resultLevel(p){
  if(p>=90)return {title:"Bracket Master",msg:"Outstanding — you expand and simplify with real confidence."};
  if(p>=75)return {title:"Strong Expander",msg:"Great work. You’ve got the method; a little polish and you’re a master."};
  if(p>=60)return {title:"Getting There",msg:"Good progress. Review the tricky signs and give it another go."};
  return {title:"Keep Practising",msg:"Every expert started here. Revisit the lesson, then try again."};
}
function ring(pct){const r=58,c=2*Math.PI*r,off=c*(1-pct/100);
  return `<svg width="100%" height="100%" viewBox="0 0 132 132"><circle cx="66" cy="66" r="${r}" fill="none" stroke="var(--surface-3)" stroke-width="11"/>
    <circle cx="66" cy="66" r="${r}" fill="none" stroke="var(--primary)" stroke-width="11" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${c}" transform="rotate(-90 66 66)">
    <animate attributeName="stroke-dashoffset" from="${c}" to="${off}" dur="1s" fill="freeze"/></circle></svg>`;}
function fmtTime(s){const m=Math.floor(s/60);return m?`${m}m ${s%60}s`:`${s}s`;}

function showReview(){

function studentText(Q){
  if(Q.type==="mc"||Q.type==="tf")return Q.sel!=null?eqFmt(Q.display[Q.sel].t):"<i>no answer</i>";
  if(Q.type==="typed")return Q._typed?eqFmt(Q._typed):"—";
  if(Q.type==="selectall")return Q._sel||"—";
  if(Q.type==="match")return Q.awarded>0?"all matched":"see correct";
  if(Q.type==="order")return Q.awarded>0?"correct order":"see correct order";return "—";
}
function correctText(Q){
  if(Q.type==="mc")return eqFmt(Q.choices[Q.answer]);if(Q.type==="tf")return Q.answer?"True":"False";
  if(Q.type==="typed")return eqFmt(Q.answer);if(Q.type==="selectall")return Q.answer.map(i=>eqFmt(Q.choices[i])).join(", ");
  if(Q.type==="match")return Q.pairs.map(p=>`${eqFmt(p.left)} → ${eqFmt(p.right)}`).join("; ");
  if(Q.type==="order")return Q.steps.map(eqFmt).join(" → ");return "";
}

function answerKeyTable(n){

/* ============================================================ CONFETTI (restrained) ============================================================ */
function launchConfetti(){
  if(prefersReduced())return;
  const cv=document.getElementById("confetti");cv.style.display="block";const ctx=cv.getContext("2d");
  cv.width=innerWidth;cv.height=innerHeight;
  const cols=["#0f6e64","#c9852b","#b1543f","#2f8f5b","#43b1a2"];
  let parts=Array.from({length:90}).map(()=>({x:Math.random()*cv.width,y:-20-Math.random()*cv.height*.4,r:4+Math.random()*5,c:cols[Math.floor(Math.random()*cols.length)],vy:2+Math.random()*2.5,vx:-1+Math.random()*2,rot:Math.random()*6,vr:-.2+Math.random()*.4}));
  let t=0;(function frame(){ctx.clearRect(0,0,cv.width,cv.height);parts.forEach(p=>{p.y+=p.vy;p.x+=p.vx;p.rot+=p.vr;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.c;ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*.6);ctx.restore();});t++;if(t<150)requestAnimationFrame(frame);else{ctx.clearRect(0,0,cv.width,cv.height);cv.style.display="none";}})();
}

/* ============================================================ SOUND ============================================================ */
let audioCtx=null;
function beep(kind){if(!STORE.sound)return;try{audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();
  const seq={good:[[660,0],[880,.09]],bad:[[300,0]],done:[[523,0],[659,.1],[784,.2]],tick:[[520,0]]}[kind]||[[440,0]];
  seq.forEach(([f,d])=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type="sine";o.frequency.value=f;o.connect(g);g.connect(audioCtx.destination);const t=audioCtx.currentTime+d;g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(.1,t+.02);g.gain.exponentialRampToValueAtTime(.0001,t+.18);o.start(t);o.stop(t+.2);});}catch(e){}}

/* ============================================================ MODAL / SETTINGS ============================================================ */
function openModal(html){document.getElementById("modalBody").innerHTML=html;document.getElementById("modalBack").classList.add("show");}
function closeModal(){document.getElementById("modalBack").classList.remove("show");}
document.getElementById("modalBack").addEventListener("click",e=>{if(e.target.id==="modalBack")closeModal();});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal();});
function openSettings(){
  openModal(`<h3 id="modalTitle">Settings</h3>
    <div class="settings-row"><div><div class="sl">Dark mode</div><div class="sd">Warm dark theme for low-light rooms.</div></div>
      <button class="switch" id="s_theme" role="switch" aria-checked="${STORE.theme==='dark'}"></button></div>
    <div class="settings-row"><div><div class="sl">Sound</div><div class="sd">Gentle tones on correct answers. Off by default.</div></div>
      <button class="switch" id="s_sound" role="switch" aria-checked="${STORE.sound}"></button></div>
    <div class="settings-row"><div><div class="sl">Teacher notes</div><div class="sd">Show teaching prompts in Learn & Practise.</div></div>
      <button class="switch" id="s_tnotes" role="switch" aria-checked="${STORE.tnotes}"></button></div>
    <div class="settings-row"><div><div class="sl">Shuffle quiz questions</div><div class="sd">Randomise question order at the start of each set.</div></div>
      <button class="switch" id="s_shuf" role="switch" aria-checked="${STORE.shuffleQ}"></button></div>
    <div class="btnrow" style="justify-content:flex-end;margin-top:14px"><button class="btn" onclick="closeModal()">Done</button></div>`);
  const bind=(id,fn)=>{const el=document.getElementById(id);el.onclick=()=>{fn();el.setAttribute("aria-checked",el.getAttribute("aria-checked")!=="true");};};
  bind("s_theme",()=>{STORE.theme=STORE.theme==="dark"?"light":"dark";saveStore();applyTheme();});
  bind("s_sound",()=>{STORE.sound=!STORE.sound;saveStore();if(STORE.sound)beep("good");});
  bind("s_tnotes",()=>{STORE.tnotes=!STORE.tnotes;saveStore();applyModes();});
  bind("s_shuf",()=>{STORE.shuffleQ=!STORE.shuffleQ;saveStore();});
}

/* ============================================================ MODE / CHROME CONTROLS ============================================================ */
function setTeaching(on){STORE.teaching=on;saveStore();applyModes();
  document.getElementById("tmBtn").setAttribute("aria-pressed",on);
  if(on&&!document.fullscreenElement&&document.documentElement.requestFullscreen){document.documentElement.requestFullscreen().catch(()=>{});}
  rerender();}
function applyModes(){
  document.body.classList.toggle("teaching",!!STORE.teaching);
  document.body.classList.toggle("tnotes-on",!!STORE.tnotes);
  const b=document.getElementById("tmBtn");b.setAttribute("aria-pressed",!!STORE.teaching);
  rerenderNotesOnly();
}
function rerenderNotesOnly(){ /* notes visibility is pure CSS; no re-render needed */ }
function applyTheme(){document.documentElement.setAttribute("data-theme",STORE.theme==="dark"?"dark":"light");}

document.getElementById("homeBtn").onclick=()=>go("home");
document.getElementById("mainnav").addEventListener("click",e=>{const b=e.target.closest("button[data-nav]");if(b)go(b.dataset.nav);});
document.getElementById("tmBtn").onclick=()=>setTeaching(!STORE.teaching);
document.getElementById("tmExit").onclick=()=>setTeaching(false);
document.getElementById("setBtn").onclick=openSettings;
document.getElementById("fsBtn").onclick=()=>{if(!document.fullscreenElement)document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen();else document.exitFullscreen&&document.exitFullscreen();};
function prefersReduced(){return window.matchMedia&&matchMedia("(prefers-reduced-motion: reduce)").matches;}

/* ============================================================ BOOT ============================================================ */
applyTheme();applyModes();
go("home");

window.__QC__={normLin,typedCorrect,SET1,SET2,SET3,GUIDED,SKILLS,SETS};
</script>
