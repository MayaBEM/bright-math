 cases where the digit checked is exactly at a boundary already) unchanged — it depends on the digit being checked.`,correctionTip:`Rounding down happens just as often as rounding up — always apply the rule rather than assuming a direction.`}],challengeQuestion:{id:`u7-c1`,unitId:`unit-7`,difficulty:`challenge`,type:`mcq`,category:`challenge`,prompt:`Liam's pedometer shows he has walked 9.55 km, given to 2 decimal places. What range of actual distances could Liam have walked?`,choices:[{id:`a`,text:`From 9.545 km up to (but not including) 9.555 km`},{id:`b`,text:`Exactly 9.55 km and no other value`},{id:`c`,text:`From 9.5 km up to (but not including) 9.6 km`},{id:`d`,text:`From 9.549 km up to (but not including) 9.551 km`}],correctChoiceId:`a`,explanation:`A value rounded to 2 decimal places could have come from anywhere in a range that rounds to it. Since 9.55 is the rounding digit, any distance from 9.545 up to (but not including) 9.555 rounds to 9.55, so Liam's actual distance lies somewhere in that range.`,correctionTip:`A rounded number always represents a whole range of possible exact values, not just one — the range spans half a unit below and half a unit above the rounded value at that degree of accuracy.`},commonMistakes:[{title:`Checking the wrong digit`,wrong:`Checking the rounding digit itself instead of the digit to its right.`,right:`Always check the digit immediately to the right of the rounding digit.`,tip:`Underline the rounding digit first, then circle the digit right next to it before deciding.`},{title:`Rounding every digit instead of just one`,wrong:`Changing several digits throughout the number instead of only the rounding digit.`,right:`Only the rounding digit changes (by at most 1); every digit to its right becomes a placeholder zero.`,tip:`Leave all digits to the left of the rounding digit completely unchanged.`},{title:`Forgetting to carry when the rounding digit is 9`,wrong:`Writing 2,995 rounded to the nearest ten as 2,910 or leaving it as 2,990.`,right:`2,995 rounds to 3,000, because rounding the 9 up causes it to carry into the next place value column.`,tip:`If the rounding digit is 9 and you need to round up, check whether the carry affects the digit to its left as well.`}],summary:[`Rounding replaces an exact value with a nearby, easier-to-read approximate value.`,`The degree of accuracy tells you which digit is the rounding digit.`,`Check the digit immediately to the right of the rounding digit: 5 or more rounds up, less than 5 stays the same.`,`A rounding digit of 9 that rounds up can carry into the digit on its left.`]},fr={id:`unit-8`,number:8,title:`Rounding to the Nearest Whole Number`,shortDescription:`Round decimals to the nearest whole number with number-line confidence.`,estimatedMinutes:18,difficulty:`Foundation`,color:`teal`,learningGoals:[`Identify the units digit as the rounding digit when rounding to the nearest whole number`,`Use the tenths digit to decide whether to round up or keep the same`,`Round decimal numbers to the nearest whole number accurately`,`Use a number line to visualise rounding decisions`],vocabulary:[{term:`Whole number`,definition:`A number with no fractional or decimal part, such as 17 or 254.`},{term:`Tenths digit`,definition:`The digit immediately to the right of the decimal point, used to decide rounding to the nearest whole number.`}],rules:[{title:`Rounding to the nearest whole number`,content:`The rounding digit is the units digit. Check the tenths digit (the first digit after the decimal point): if it is 5 or more, round the units digit up by 1; if it is less than 5, keep the units digit the same. All decimal digits are then removed.`}],introduction:`Rounding to the nearest whole number is one of the most common rounding tasks — from measurements to money to game scores. The rule is always the same: look only at the tenths digit to make your decision.`,workedExamples:[{id:`u8-we1`,question:`Round 17.8 to the nearest whole number.`,steps:[{title:`Step 1 — Find the rounding digit`,content:`The rounding digit is the units digit: 7.`},{title:`Step 2 — Check the tenths digit`,content:`The tenths digit is 8.`},{title:`Step 3 — Apply the rule`,content:`8 is 5 or more, so the units digit rounds up from 7 to 8.`}],answer:`18`,reason:`The number 17.8 sits closer to 18 than to 17 on a number line, matching the rounding rule.`},{id:`u8-we2`,question:`Round 88.88 to the nearest whole number.`,steps:[{title:`Step 1 — Find the rounding digit`,content:`The rounding digit is the units digit: 8.`},{title:`Step 2 — Check the tenths digit`,content:`The tenths digit is 8.`},{title:`Step 3 — Apply the rule`,content:`8 is 5 or more, so the units digit rounds up from 8 to 9.`}],answer:`89`,reason:`Only the tenths digit is checked, even though there are more decimal digits after it.`},{id:`u8-we3`,question:`Round 124.09 to the nearest whole number.`,steps:[{title:`Step 1 — Find the rounding digit`,content:`The rounding digit is the units digit: 4.`},{title:`Step 2 — Check the tenths digit`,content:`The tenths digit is 0.`},{title:`Step 3 — Apply the rule`,content:`0 is less than 5, so the units digit stays as 4.`}],answer:`124`,reason:`Even though there is a non-zero hundredths digit (9), only the tenths digit matters when rounding to the nearest whole number.`}],practiceQuiz:[{id:`u8-p1`,unitId:`unit-8`,difficulty:`easy`,type:`numeric`,category:`skill`,prompt:`Round 6.7 to the nearest whole number.`,correctAnswer:`7`,visual:`number-line`,visualData:{value:6.7,lower:6,upper:7,rounded:7},explanation:`The tenths digit (7) is 5 or more, so 6.7 rounds up to 7.`,correctionTip:`On a number line, 6.7 sits closer to 7 than to 6.`},{id:`u8-p2`,unitId:`unit-8`,difficulty:`easy`,type:`numeric`,category:`skill`,prompt:`Round 4.2 to the nearest whole number.`,correctAnswer:`4`,visual:`number-line`,visualData:{value:4.2,lower:4,upper:5,rounded:4},explanation:`The tenths digit (2) is less than 5, so 4.2 rounds down to 4.`,correctionTip:`On a number line, 4.2 sits closer to 4 than to 5.`},{id:`u8-p3`,unitId:`unit-8`,difficulty:`easy`,type:`mcq`,category:`skill`,prompt:`Round 145.1 to the nearest whole number.`,choices:[{id:`a`,text:`145`},{id:`b`,text:`146`},{id:`c`,text:`144`},{id:`d`,text:`150`}],correctChoiceId:`a`,explanation:`The tenths digit (1) is less than 5, so 145.1 rounds down to 145.`,correctionTip:`Only the tenths digit decides whether the units digit rounds up.`},{id:`u8-p4`,unitId:`unit-8`,difficulty:`easy`,type:`true-false`,category:`skill`,prompt:`True or false: 253.61 rounds to 254 to the nearest whole number.`,trueFalseAnswer:!0,explanation:`The tenths digit (6) is 5 or more, so 253.61 rounds up to 254.`,correctionTip:`The hundredths digit (1) is not used when rounding to the nearest whole number.`},{id:`u8-p5`,unitId:`unit-8`,difficulty:`easy`,type:`fill-blank`,category:`skill`,prompt:`Round 124.09 to the nearest whole number.`,correctAnswer:`124`,explanation:`The tenths digit (0) is less than 5, so 124.09 rounds down to 124.`,correctionTip:`Check only the tenths digit, even when later decimal digits are larger.`}],mainQuiz:[{id:`u8-m1`,unitId:`unit-8`,difficulty:`standard`,type:`numeric`,category:`skill`,prompt:`Round 17.8 to the nearest whole number.`,correctAnswer:`18`,explanation:`The tenths digit (8) is 5 or more, so 17.8 rounds up to 18.`,correctionTip:`Underline the units digit, then circle the tenths digit before deciding.`},{id:`u8-m2`,unitId:`unit-8`,difficulty:`standard`,type:`numeric`,category:`skill`,prompt:`Round 88.88 to the nearest whole number.`,correctAnswer:`89`,explanation:`The tenths digit (8) is 5 or more, so 88.88 rounds up to 89.`,correctionTip:`Ignore all decimal digits after the tenths digit when rounding to the nearest whole number.`},{id:`u8-m3`,unitId:`unit-8`,difficulty:`standard`,type:`mcq`,category:`application`,prompt:`A recipe calls for 4.6 cups of flour, but the scale only measures to the nearest whole cup. Which reading would the scale show?`,choices:[{id:`a`,text:`4 cups`},{id:`b`,text:`5 cups`},{id:`c`,text:`4.5 cups`},{id:`d`,text:`6 cups`}],correctChoiceId:`b`,explanation:`The tenths digit (6) is 5 or more, so 4.6 rounds up to 5 whole cups.`,correctionTip:`Translate the real-world measurement into a rounding question before solving.`},{id:`u8-m4`,unitId:`unit-8`,difficulty:`standard`,type:`true-false`,category:`error-analysis`,prompt:`Arun rounds 124.09 to the nearest whole number and gets 125, because he added the tenths and hundredths digits together (0 + 9 = 9, which he thought meant round up). Is his method correct?`,trueFalseAnswer:!1,explanation:`The correct answer is 124. Only the tenths digit (0) should be checked; combining digits from different place values is not part of the rounding rule.`,correctionTip:`Never combine digits from different place values — check only the single digit immediately to the right of the rounding digit.`},{id:`u8-m5`,unitId:`unit-8`,difficulty:`standard`,type:`numeric`,category:`skill`,prompt:`Round 253.61 to the nearest whole number.`,correctAnswer:`254`,explanation:`The tenths digit (6) is 5 or more, so 253.61 rounds up to 254.`,correctionTip:`Only the units and tenths digits matter here — 253 stays as the "whole number part" that may or may not increase.`},{id:`u8-m6`,unitId:`unit-8`,difficulty:`standard`,type:`mcq`,category:`error-analysis`,prompt:`Fina says: "9.999 rounds to 9, because I only look at the units digit and it's already a whole number-ish shape." What is the correct rounded value?`,choices:[{id:`a`,text:`9`},{id:`b`,text:`10`},{id:`c`,text:`9.9`},{id:`d`,text:`9.99`}],correctChoiceId:`b`,explanation:`The tenths digit (9) is 5 or more, so the units digit 9 rounds up. This causes a carry: 9.999 rounds to 10, not 9.`,correctionTip:`Watch for carrying when the units digit is 9 and needs to round up — it can change more than one digit.`},{id:`u8-m7`,unitId:`unit-8`,difficulty:`standard`,type:`fill-blank`,category:`application`,prompt:`A runner's time is recorded as 32.5 seconds. Round this time to the nearest whole second.`,correctAnswer:`33`,explanation:`The tenths digit (5) is 5 or more, so 32.5 rounds up to 33 seconds.`,correctionTip:`A tenths digit of exactly 5 always rounds up, following the standard rounding rule.`},{id:`u8-m8`,unitId:`unit-8`,difficulty:`standard`,type:`true-false`,category:`skill`,prompt:`True or false: 4.2 rounds to 4 because 4.2 is closer to 4 than to 5 on a number line.`,trueFalseAnswer:!0,explanation:`On a number line, 4.2 is only 0.2 away from 4 but 0.8 away from 5, so it rounds down to 4.`,correctionTip:`A number line is a useful way to check that your rounded answer makes sense.`},{id:`u8-m9`,unitId:`unit-8`,difficulty:`standard`,type:`numeric`,category:`skill`,prompt:`Round 6.7 to the nearest whole number.`,correctAnswer:`7`,explanation:`The tenths digit (7) is 5 or more, so 6.7 rounds up to 7.`,correctionTip:`Check the tenths digit first, then decide the direction of rounding.`},{id:`u8-m10`,unitId:`unit-8`,difficulty:`standard`,type:`mcq`,category:`skill`,prompt:`Which of these decimals rounds to 88 (not 89) to the nearest whole number?`,choices:[{id:`a`,text:`88.5`},{id:`b`,text:`88.49`},{id:`c`,text:`88.9`},{id:`d`,text:`88.88`}],correctChoiceId:`b`,explanation:`88.49 has a tenths digit of 4, which is less than 5, so it rounds down to 88. All the other options have a tenths digit of 5 or more.`,correctionTip:`Check the tenths digit of each option carefully — do not be misled by digits further along.`}],challengeQuestion:{id:`u8-c1`,unitId:`unit-8`,difficulty:`challenge`,type:`numeric`,category:`challenge`,prompt:`A whole number rounded to the nearest whole number is always itself unchanged. A decimal number x rounds to 90 to the nearest whole number, and x has a tenths digit of exactly 5. What is the smallest possible value of x?`,correctAnswer:`89.5`,explanation:`If x has a tenths digit of exactly 5, then x is a multiple of 0.5 like 89.5 or 90.5. For x to round up to 90, the smallest such value is 89.5, since a tenths digit of 5 always rounds up.`,correctionTip:`Think about which values with a tenths digit of exactly 5 are close to 90 on either side, then decide which one rounds up to 90.`},commonMistakes:[{title:`Checking more than one decimal digit`,wrong:`Looking at both the tenths and hundredths digits to decide on rounding to the nearest whole number.`,right:`Only the tenths digit is checked when rounding to the nearest whole number.`,tip:`Cover up every decimal digit except the tenths digit before making your decision.`},{title:`Forgetting to carry when the units digit is 9`,wrong:`Writing 9.999 rounded to the nearest whole number as 9.`,right:`9.999 rounds to 10, because rounding the 9 up causes it to carry into the tens column.`,tip:`If the units digit is 9 and needs to round up, check whether the carry changes the digit to its left too.`},{title:`Rounding down when the digit is exactly 5`,wrong:`Treating a tenths digit of exactly 5 as "stay the same".`,right:`A tenths digit of 5 always rounds the units digit up by 1, following the standard rule.`,tip:`Remember the rule applies to "5 or more," which includes exactly 5.`}],summary:[`To round to the nearest whole number, check only the tenths digit.`,`A tenths digit of 5 or more rounds the units digit up by 1; less than 5 keeps it the same.`,`A number line is a useful way to visualise and check a rounding decision.`,`Watch for carrying when the units digit is 9 and rounds up.`]},pr={id:`unit-9`,number:9,title:`Rounding to Decimal Places`,shortDescription:`Round precise decimals to 1, 2, 3, 4, 6 or 7 decimal places.`,estimatedMinutes:25,difficulty:`Advanced`,color:`coral`,learningGoals:[`Round decimal numbers to a stated number of decimal places`,`Identify the correct rounding digit for any number of decimal places`,`Recognise when rounding causes several digits to change at once`,`Give answers with exactly the required number of decimal places`],vocabulary:[{term:`Decimal place (d.p.)`,definition:`A digit position to the right of the decimal point; "2 d.p." means two digits after the point.`},{term:`Carrying`,definition:`When rounding up a digit of 9 causes the next digit to the left to increase too.`}],rules:[{title:`Rounding to n decimal places`,content:`The rounding digit is the nth digit after the decimal point. Check the digit immediately after it: if it is 5 or more, round the rounding digit up by 1; if it is less than 5, keep it the same. All digits after the rounding digit are then removed, and the answer must show exactly n decimal places, including any necessary trailing zeros.`}],introduction:`Rounding to a set number of decimal places uses the same golden rule as before — but now you must count decimal places carefully, and be ready for cases where rounding up causes several digits to change at once.`,workedExamples:[{id:`u9-we1`,question:`Round 39.555 to 2 decimal places.`,steps:[{title:`Step 1 — Find the rounding digit`,content:`For 2 d.p., the rounding digit is the second decimal digit: 5 (in the hundredths place).`},{title:`Step 2 — Check the next digit`,content:`The next digit (thousandths) is 5.`},{title:`Step 3 — Apply the rule`,content:`5 is 5 or more, so the hundredths digit rounds up from 5 to 6.`}],answer:`39.56`,reason:`Every answer to 2 d.p. must show exactly two digits after the decimal point.`},{id:`u9-we2`,question:`Round 12.8943 to 3 decimal places.`,steps:[{title:`Step 1 — Find the rounding digit`,content:`For 3 d.p., the rounding digit is the third decimal digit: 4 (in the thousandths place).`},{title:`Step 2 — Check the next digit`,content:`The next digit (ten-thousandths) is 3.`},{title:`Step 3 — Apply the rule`,content:`3 is less than 5, so the thousandths digit stays as 4.`}],answer:`12.894`,reason:`Since the digit after the rounding digit was less than 5, no rounding up was needed.`},{id:`u9-we3`,question:`Round 99.9961 to 1 decimal place.`,steps:[{title:`Step 1 — Find the rounding digit`,content:`For 1 d.p., the rounding digit is the first decimal digit: 9 (in the tenths place).`},{title:`Step 2 — Check the next digit`,content:`The next digit (hundredths) is 9.`},{title:`Step 3 — Apply the rule and carry`,content:`9 is 5 or more, so the tenths digit rounds up. But 9 + 1 = 10, so this carries: the units digit 9 becomes 10, which carries again into the tens digit.`}],answer:`100.0`,reason:`When every digit being carried into is also a 9, rounding up can ripple through several digits at once — here, 99.9961 rounds all the way up to 100.0.`}],practiceQuiz:[{id:`u9-p1`,unitId:`unit-9`,difficulty:`easy`,type:`numeric`,category:`skill`,prompt:`Round 0.487 to 2 decimal places.`,correctAnswer:`0.49`,explanation:`The thousandths digit (7) is 5 or more, so the hundredths digit rounds up from 8 to 9, giving 0.49.`,correctionTip:`Write exactly 2 digits after the decimal point in your final answer.`},{id:`u9-p2`,unitId:`unit-9`,difficulty:`easy`,type:`numeric`,category:`skill`,prompt:`Round 0.06901 to 2 decimal places.`,correctAnswer:`0.07`,explanation:`The thousandths digit (9) is 5 or more, so the hundredths digit rounds up from 6 to 7, giving 0.07.`,correctionTip:`Do not be distracted by the leading zero — count decimal places from the decimal point.`},{id:`u9-p3`,unitId:`unit-9`,difficulty:`easy`,type:`fill-blank`,category:`skill`,prompt:`Round 78.931 to 2 decimal places.`,correctAnswer:`78.93`,explanation:`The thousandths digit (1) is less than 5, so the hundredths digit stays as 3, giving 78.93.`,correctionTip:`Only the digit directly after your rounding digit affects the decision.`},{id:`u9-p4`,unitId:`unit-9`,difficulty:`easy`,type:`true-false`,category:`skill`,prompt:`True or false: 3.9975 rounds to 4.00 when rounded to 2 decimal places.`,trueFalseAnswer:!0,explanation:`Rounding 3.9975 to 2 d.p. causes a carry through the hundredths, tenths and units digits, giving exactly 4.00.`,correctionTip:`Write the full 2 decimal places, even when the digits are both zero.`},{id:`u9-p5`,unitId:`unit-9`,difficulty:`easy`,type:`numeric`,category:`skill`,prompt:`Round 127.99652 to 3 decimal places.`,correctAnswer:`127.997`,explanation:`The digit after the rounding digit (ten-thousandths, 5) is 5 or more, so the thousandths digit rounds up from 6 to 7, giving 127.997.`,correctionTip:`Count exactly 3 digits after the decimal point for the rounding digit.`}],mainQuiz:[{id:`u9-m1`,unitId:`unit-9`,difficulty:`standard`,type:`mcq`,category:`error-analysis`,prompt:`Arun and Sofia both round 34.8972 to 2 decimal places. Arun writes 34.90. Sofia writes 34.89, saying she checked the ten-thousandths digit (2), which is less than 5, so she made no change. Who is correct?`,choices:[{id:`a`,text:`Arun is correct — 34.90`},{id:`b`,text:`Sofia is correct — 34.89`},{id:`c`,text:`Both are correct`},{id:`d`,text:`Neither is correct`}],correctChoiceId:`a`,explanation:`For 2 d.p., the rounding digit is the hundredths digit (9), and the digit that must be checked is the thousandths digit (7), not the ten-thousandths digit. Since 7 is 5 or more, the hundredths digit rounds up, carrying into the tenths digit: 34.8972 rounds to 34.90.`,correctionTip:`Sofia checked a digit two places too far to the right — always check exactly the digit right after your rounding digit.`},{id:`u9-m2`,unitId:`unit-9`,difficulty:`standard`,type:`numeric`,category:`skill`,prompt:`Round 17.825684 to 4 decimal places.`,correctAnswer:`17.8257`,explanation:`The digit after the rounding digit (fifth decimal digit, 8) is 5 or more, so the fourth decimal digit rounds up from 6 to 7, giving 17.8257.`,correctionTip:`Count carefully to the fourth digit after the decimal point.`},{id:`u9-m3`,unitId:`unit-9`,difficulty:`standard`,type:`numeric`,category:`skill`,prompt:`Round 3.141592654 to 7 decimal places.`,correctAnswer:`3.1415927`,explanation:`The eighth decimal digit (5) is 5 or more, so the seventh decimal digit rounds up from 6 to 7, giving 3.1415927.`,correctionTip:`With many decimal places, count one digit at a time to avoid losing track.`},{id:`u9-m4`,unitId:`unit-9`,difficulty:`standard`,type:`fill-blank`,category:`skill`,prompt:`Round 782.02972 to 3 decimal places.`,correctAnswer:`782.030`,explanation:`The fourth decimal digit (7) is 5 or more, so the thousandths digit rounds up from 9 to 10, carrying into the hundredths digit: 782.02972 rounds to 782.030.`,correctionTip:`Keep the trailing zero — an answer to 3 d.p. must always show exactly three decimal digits.`},{id:`u9-m5`,unitId:`unit-9`,difficulty:`standard`,type:`mcq`,category:`skill`,prompt:`Round 9.349612 to 4 decimal places.`,choices:[{id:`a`,text:`9.3496`},{id:`b`,text:`9.3497`},{id:`c`,text:`9.34961`}],correctChoiceId:`a`,explanation:`The fifth decimal digit (1) is less than 5, so the fourth decimal digit stays as 6, giving 9.3496.`,correctionTip:`Check the fifth decimal digit only — the digits further along do not matter.`},{id:`u9-m6`,unitId:`unit-9`,difficulty:`standard`,type:`mcq`,category:`skill`,prompt:`Round 5.662198 to 4 decimal places.`,choices:[{id:`a`,text:`5.6621`},{id:`b`,text:`5.6622`},{id:`c`,text:`5.6623`}],correctChoiceId:`b`,explanation:`The fifth decimal digit (9) is 5 or more, so the fourth decimal digit rounds up from 1 to 2, giving 5.6622.`,correctionTip:`A jump of exactly one in the rounding digit is common — double check you rounded up only once.`},{id:`u9-m7`,unitId:`unit-9`,difficulty:`standard`,type:`mcq`,category:`skill`,prompt:`Round 197.020549 to 4 decimal places.`,choices:[{id:`a`,text:`197.0205`},{id:`b`,text:`197.0206`},{id:`c`,text:`197.0215`}],correctChoiceId:`a`,explanation:`The fifth decimal digit (4) is less than 5, so the fourth decimal digit stays as 5, giving 197.0205.`,correctionTip:`Do not round up unless the very next digit is 5 or more.`},{id:`u9-m8`,unitId:`unit-9`,difficulty:`standard`,type:`numeric`,category:`application`,prompt:`A lab measures a chemical sample at 154.82909 grams. Round this mass to 3 decimal places.`,correctAnswer:`154.829`,explanation:`The fourth decimal digit (0) is less than 5, so the thousandths digit stays as 9, giving 154.829.`,correctionTip:`Scientific measurements are often rounded to a stated number of decimal places for consistency.`},{id:`u9-m9`,unitId:`unit-9`,difficulty:`standard`,type:`numeric`,category:`skill`,prompt:`Round 6.50504993 to 6 decimal places.`,correctAnswer:`6.505050`,explanation:`The seventh decimal digit (9) is 5 or more, so the sixth decimal digit rounds up from 9 to 10, which carries into the fifth decimal digit: 6.50504993 rounds to 6.505050.`,correctionTip:`When the rounding digit itself is 9, remember rounding up will carry into the next digit to the left.`},{id:`u9-m10`,unitId:`unit-9`,difficulty:`standard`,type:`fill-blank`,category:`skill`,prompt:`Round 0.66739 to 4 decimal places.`,correctAnswer:`0.6674`,explanation:`The fifth decimal digit (9) is 5 or more, so the fourth decimal digit rounds up from 3 to 4, giving 0.6674.`,correctionTip:`Count from the decimal point, not from the first non-zero digit.`}],challengeQuestion:{id:`u9-c1`,unitId:`unit-9`,difficulty:`challenge`,type:`mcq`,category:`challenge`,prompt:`99.9961 is rounded to 1 decimal place. Why does the answer, 100.0, look so different from the original number?`,choices:[{id:`a`,text:`Because rounding to 1 d.p. always changes the whole-number part.`},{id:`b`,text:`Because rounding the tenths digit up caused a chain of carries through the units and tens digits, since both were also 9.`},{id:`c`,text:`Because the question was answered incorrectly — the true answer is 99.9.`},{id:`d`,text:`Because 1 decimal place rounding ignores the units digit.`}],correctChoiceId:`b`,explanation:`The hundredths digit (9) forces the tenths digit (9) to round up, which becomes 10 and carries into the units digit (9), which also becomes 10 and carries into the tens digit. This chain reaction is why 99.9961 rounds all the way up to 100.0, even though only one decimal place was requested.`,correctionTip:`A chain of 9s rounding up can ripple far beyond the rounding digit — always check the whole number after rounding, not just the digit you changed first.`},commonMistakes:[{title:`Giving too many or too few decimal places`,wrong:`Writing 782.03 as the answer when 3 decimal places were required.`,right:`782.030, with the trailing zero included to show exactly 3 decimal places.`,tip:`Count the required decimal places in your final answer before submitting it.`},{title:`Checking a digit that is too far to the right`,wrong:`Checking the ten-thousandths digit when rounding to 2 decimal places, instead of the thousandths digit.`,right:`Always check the single digit immediately after the rounding digit.`,tip:`Count the decimal places out loud: "1st, 2nd — the next one is the one I check."`},{title:`Missing a carry through multiple 9s`,wrong:`Rounding 99.9961 to 1 d.p. as 99.10 or leaving it as 99.9.`,right:`99.9961 rounds to 100.0, because the carry passes through several 9s in a row.`,tip:`After rounding up a 9, always check whether the digit to its left is also a 9 that needs to carry.`}],summary:[`Rounding to n decimal places means checking the digit immediately after the nth decimal digit.`,`Your final answer must show exactly the number of decimal places requested, including trailing zeros.`,`Carries can pass through several 9s in a row, sometimes changing the whole-number part completely.`,`Always double-check which digit you are supposed to look at before rounding.`]},mr={id:`unit-10`,number:10,title:`Error Analysis and Mathematical Reasoning`,shortDescription:`Sharpen your reasoning by spotting mistakes and comparing methods.`,estimatedMinutes:25,difficulty:`Advanced`,color:`sage`,learningGoals:[`Decide whether a mathematical statement is true or false, and justify your answer`,`Find and correct errors in worked calculations`,`Compare two different solution methods and judge their reliability`,`Explain why a shortcut method sometimes fails`],vocabulary:[{term:`Justification`,definition:`A clear mathematical reason that supports why an answer or method is correct.`},{term:`Efficient method`,definition:`A method that reaches a correct answer reliably, without unnecessary extra steps.`},{term:`Misconception`,definition:`An incorrect belief about how a mathematical rule works, often caused by over-applying a shortcut.`}],rules:[{title:`Checking your own reasoning`,content:`Good mathematical reasoning includes checking a method against a case where a shortcut might fail — for example, testing whether "cross out zeros" still works when there are not enough zeros to cross out.`},{title:`A correct answer does not always mean a correct method`,content:`Sometimes an incorrect method still produces the right answer by coincidence. Strong mathematical reasoning checks whether a method would keep working for other, similar numbers.`}],introduction:`This unit brings together everything from powers of 10, decimals, metric conversions and rounding. Instead of just calculating, you will compare methods, hunt for errors, and explain your reasoning like a real mathematician.`,workedExamples:[{id:`u10-we1`,question:`Zara and Liam both work out 6,400 ÷ 10². Zara shifts the digits two places to the right using a place-value chart. Liam crosses out two zeros from 6,400. Compare their methods.`,steps:[{title:`Step 1 — Check Zara's method`,content:`Shifting the digits of 6,400 two places to the right gives 64.`},{title:`Step 2 — Check Liam's method`,content:`Crossing out two of the trailing zeros in 6,400 also gives 64.`},{title:`Step 3 — Compare reliability`,content:`Both methods give the correct answer here, but Liam's method only works because 6,400 happens to end in enough zeros. Zara's place-value method would also work correctly for a number like 830 ÷ 1,000, where Liam's method would fail.`}],answer:`64`,reason:`Two different methods can both be correct for one question, but only a place-value method is reliable for every possible number.`},{id:`u10-we2`,question:`Fina rounds 5.096 to 2 decimal places and writes 5.10. Marcus says this must be wrong because "you shouldn't have a zero straight after a 1". Who is correct?`,steps:[{title:`Step 1 — Round independently`,content:`The rounding digit is the hundredths digit (9). The next digit (thousandths, 6) is 5 or more, so 9 rounds up to 10, which carries into the tenths digit: 0 becomes 1.`},{title:`Step 2 — Write the full answer`,content:`The result is 5.10, written with exactly 2 decimal places.`},{title:`Step 3 — Evaluate Marcus's claim`,content:`A trailing zero after a rounded digit is completely normal and required to show the correct degree of accuracy — Marcus's objection is a misconception, not a mathematical rule.`}],answer:`5.10 (Fina is correct)`,reason:`Trailing zeros are meaningful in a decimal-place answer; they are not "extra" or incorrect.`},{id:`u10-we3`,question:`Sofia converts 4,500,000 mm to km and writes: "4,500,000 ÷ 1,000 = 4,500, so the answer is 4,500 km." Find and correct her mistake.`,steps:[{title:`Step 1 — Check the conversion factor`,content:`Converting mm to km requires dividing by 1,000,000, not 1,000.`},{title:`Step 2 — Recalculate`,content:`4,500,000 ÷ 1,000,000 = 4.5.`},{title:`Step 3 — State the correct answer`,content:`The correct conversion is 4.5 km — Sofia's answer was 1,000 times too large because she used the wrong conversion factor.`}],answer:`4.5 km`,reason:`Choosing the correct conversion factor matters just as much as choosing the correct operation.`}],practiceQuiz:[{id:`u10-p1`,unitId:`unit-10`,difficulty:`easy`,type:`true-false`,category:`error-analysis`,prompt:`True or false: to convert a length from cm to m, you divide by 100.`,trueFalseAnswer:!0,explanation:`Centimetres are smaller than metres, so converting cm to m means dividing by 100.`,correctionTip:`Converting to a larger unit always means dividing.`},{id:`u10-p2`,unitId:`unit-10`,difficulty:`easy`,type:`mcq`,category:`error-analysis`,prompt:`Maya says 6.2 × 10² = 62.0. What has she done wrong?`,choices:[{id:`a`,text:`She shifted the digits 1 place instead of 2 places.`},{id:`b`,text:`She divided instead of multiplying.`},{id:`c`,text:`She made no mistake.`},{id:`d`,text:`She used the wrong number of decimal places.`}],correctChoiceId:`a`,explanation:`The correct answer is 620. Maya only shifted the digits one place to the left, which matches multiplying by 10, not 10².`,correctionTip:`Always match the number of place-value shifts to the index of the power of 10.`},{id:`u10-p3`,unitId:`unit-10`,difficulty:`easy`,type:`true-false`,category:`error-analysis`,prompt:`True or false: a correct final answer always proves that the method used was fully reliable.`,trueFalseAnswer:!1,explanation:`A method can give a correct answer for one question by coincidence, without being reliable for every similar question.`,correctionTip:`Test a method against a tricky case (like a number with few trailing zeros) before trusting it completely.`},{id:`u10-p4`,unitId:`unit-10`,difficulty:`easy`,type:`mcq`,category:`error-analysis`,prompt:`Which of these is the most efficient way to check whether 7.2 × 100 = 72 is correct?`,choices:[{id:`a`,text:`Divide 72 by 100 and check you get back to 7.2.`},{id:`b`,text:`Guess a different answer and see if it feels right.`},{id:`c`,text:`Ignore the decimal point entirely.`},{id:`d`,text:`Assume it must be correct because it looks similar to other answers.`}],correctChoiceId:`a`,explanation:`Reversing the operation (dividing the answer by the same power of 10) is a fast, reliable way to check a multiplication.`,correctionTip:`Checking with the inverse operation works for both multiplication and division questions.`},{id:`u10-p5`,unitId:`unit-10`,difficulty:`easy`,type:`true-false`,category:`error-analysis`,prompt:`True or false: 5.10 and 5.1 represent the same value.`,trueFalseAnswer:!0,explanation:`Adding a trailing zero after the last decimal digit does not change the value of a number — 5.10 = 5.1.`,correctionTip:`Trailing zeros can be required to show a degree of accuracy, even though they do not change the actual value.`}],mainQuiz:[{id:`u10-m1`,unitId:`unit-10`,difficulty:`standard`,type:`mcq`,category:`error-analysis`,prompt:`Arun says: "830 ÷ 1,000 = 0.83, and I can check this is sensible because dividing by 1,000 should make the number much smaller." Is his reasoning sound?`,choices:[{id:`a`,text:`Yes — his answer is correct and his size check is a valid way to catch mistakes.`},{id:`b`,text:`No — 830 ÷ 1,000 should be larger than 830.`},{id:`c`,text:`No — you cannot check division answers this way.`},{id:`d`,text:`Yes, but only because 830 is an even number.`}],correctChoiceId:`a`,explanation:`0.83 is indeed much smaller than 830, so Arun's size check confirms his answer is reasonable — this kind of size-sense check is a valuable reasoning tool.`,correctionTip:`A quick "is the answer the right size?" check can catch many common mistakes.`},{id:`u10-m2`,unitId:`unit-10`,difficulty:`standard`,type:`fill-blank`,category:`error-analysis`,prompt:`Zara incorrectly writes 0.45 × 100 = 0.045. Work out the correct answer.`,correctAnswer:`45`,explanation:`Zara shifted the digits to the right instead of the left. Multiplying by 100 shifts digits 2 places left, giving 0.45 × 100 = 45.`,correctionTip:`Multiplying always shifts digits to the left; dividing shifts them to the right.`},{id:`u10-m3`,unitId:`unit-10`,difficulty:`standard`,type:`mcq`,category:`error-analysis`,prompt:`Liam rounds 6.849 to 1 decimal place. He checks the hundredths digit (4) and rounds down to get 6.8. Sofia checks the same number and also gets 6.8. Both used the correct digit. What can you conclude?`,choices:[{id:`a`,text:`Both are correct: the hundredths digit (4) is less than 5, so 6.849 rounds down to 6.8.`},{id:`b`,text:`Both are wrong: the answer should be 6.9.`},{id:`c`,text:`Liam is right and Sofia is wrong.`},{id:`d`,text:`The question cannot be answered without a calculator.`}],correctChoiceId:`a`,explanation:`For rounding to 1 d.p., the digit to check is the hundredths digit. Since 4 is less than 5, the tenths digit (8) stays the same: 6.849 rounds to 6.8.`,correctionTip:`When two people check the correct digit and agree, that is strong evidence the answer is right.`},{id:`u10-m4`,unitId:`unit-10`,difficulty:`standard`,type:`true-false`,category:`error-analysis`,prompt:`True or false: "cross out the zeros" is always a valid method for dividing by a power of 10.`,trueFalseAnswer:!1,explanation:`Crossing out zeros only works when the dividend has enough trailing zeros to remove — it fails for numbers like 830 ÷ 1,000.`,correctionTip:`A place-value shifting method always works, even when zero-crossing does not.`},{id:`u10-m5`,unitId:`unit-10`,difficulty:`standard`,type:`matching`,category:`error-analysis`,prompt:`Match each mistake to the correct explanation of what went wrong.`,matchPairs:[{id:`m1`,left:`3.2 × 100 = 3.200`,right:`Zeros were added after the decimal digits instead of shifting them.`},{id:`m2`,left:`90,000,000 mm converted to km by multiplying`,right:`The wrong operation was chosen for converting to a larger unit.`},{id:`m3`,left:`99.9961 to 1 d.p. written as 99.9`,right:`The carry through repeated 9s was missed.`},{id:`m4`,left:`830 ÷ 1,000 solved by crossing out zeros`,right:`There were not enough trailing zeros for this shortcut to work.`}],explanation:`Each of these mistakes comes from applying a shortcut without checking whether it truly fits the numbers involved.`,correctionTip:`For every shortcut, ask: "would this still work if the numbers were slightly different?"`},{id:`u10-m6`,unitId:`unit-10`,difficulty:`standard`,type:`mcq`,category:`error-analysis`,prompt:`Which method is the most efficient and reliable way to work out 47,000 ÷ 10³ for any similar problem?`,choices:[{id:`a`,text:`Shift every digit 3 places to the right in a place-value chart.`},{id:`b`,text:`Guess an answer that looks about right.`},{id:`c`,text:`Cross out zeros only if there happen to be exactly 3 of them.`},{id:`d`,text:`Multiply by 10³ instead.`}],correctChoiceId:`a`,explanation:`Shifting digits through the place-value chart works reliably for every number, unlike zero-crossing, which depends on the number having matching trailing zeros.`,correctionTip:`Choose methods that work in general, not just for numbers with convenient trailing zeros.`},{id:`u10-m7`,unitId:`unit-10`,difficulty:`standard`,type:`fill-blank`,category:`error-analysis`,prompt:`Fina says 10⁶ ÷ 10³ has 6 zeros in the answer. Work out the actual number of zeros in the correct answer.`,correctAnswer:`3`,explanation:`10⁶ = 1,000,000 and dividing by 10³ = 1,000 shifts the digits 3 places right, giving 1,000, which has 3 zeros.`,correctionTip:`Divide the values directly rather than combining the indices without checking.`},{id:`u10-m8`,unitId:`unit-10`,difficulty:`standard`,type:`true-false`,category:`error-analysis`,prompt:`True or false: explaining why a method works is just as important as getting the correct final answer.`,trueFalseAnswer:!0,explanation:`Being able to explain why a method works shows genuine understanding and helps you spot when the method might fail for different numbers.`,correctionTip:`Practise explaining your reasoning out loud, not just writing the final answer.`},{id:`u10-m9`,unitId:`unit-10`,difficulty:`standard`,type:`mcq`,category:`error-analysis`,prompt:`Marcus and Maya both convert 2.4 km to m. Marcus writes 2.4 × 1,000 = 2,400 m. Maya writes 2.4 ÷ 1,000 = 0.0024 m. Who is correct?`,choices:[{id:`a`,text:`Marcus, because converting km (larger) to m (smaller) requires multiplying.`},{id:`b`,text:`Maya, because converting always means dividing.`},{id:`c`,text:`Both, because they reach different but equally valid answers.`},{id:`d`,text:`Neither, because km cannot convert to m.`}],correctChoiceId:`a`,explanation:`Kilometres are a larger unit than metres, so converting km to m means multiplying: 2.4 × 1,000 = 2,400 m.`,correctionTip:`Always decide "bigger unit to smaller unit" or "smaller unit to bigger unit" before choosing to multiply or divide.`},{id:`u10-m10`,unitId:`unit-10`,difficulty:`standard`,type:`mcq`,category:`error-analysis`,prompt:`Which single change would fix this incorrect statement: "0.8 ÷ 10 = 8"?`,choices:[{id:`a`,text:`Change the answer to 0.08.`},{id:`b`,text:`Change the operation to multiplication.`},{id:`c`,text:`Change 0.8 to 8.`},{id:`d`,text:`No change is needed.`}],correctChoiceId:`a`,explanation:`Dividing 0.8 by 10 shifts the digits one place to the right, giving 0.08, not 8. The direction of the shift was reversed in the incorrect statement.`,correctionTip:`A division answer should always be smaller than (or equal to) the starting number — 8 is clearly too large to be correct here.`}],challengeQuestion:{id:`u10-c1`,unitId:`unit-10`,difficulty:`challenge`,type:`mcq`,category:`challenge`,prompt:`Two students convert 630,000 mm to km. Student A writes: "630,000 ÷ 1,000 = 630, so the answer is 630 km." Student B writes: "630,000 ÷ 1,000,000 = 0.63, so the answer is 0.63 km." Which student is correct, and what was the key difference between their methods?`,choices:[{id:`a`,text:`Student A is correct; Student B used too large a conversion factor.`},{id:`b`,text:`Student B is correct; Student A used the mm-to-m factor instead of the mm-to-km factor.`},{id:`c`,text:`Both are correct, since 630 km and 0.63 km describe the same distance.`},{id:`d`,text:`Neither is correct, since the conversion requires multiplying, not dividing.`}],correctChoiceId:`b`,explanation:`The correct conversion factor from mm to km is 1,000,000 (since 1 km = 1,000,000 mm). Student B applied this correctly, getting 0.63 km. Student A only divided by 1,000, which is the mm-to-m conversion factor, giving an answer 1,000 times too large.`,correctionTip:`When a multi-step conversion is involved, check which single combined factor connects the two units directly, rather than reusing a factor from a different pair of units.`},commonMistakes:[{title:`Trusting a shortcut without testing it`,wrong:`Assuming "cross out zeros" always works for division by powers of 10.`,right:`Test any shortcut against a case with few or no trailing zeros before trusting it fully.`,tip:`Always ask: "would this method still work for a trickier example?"`},{title:`Confusing a correct answer with a correct method`,wrong:`Believing a method must be reliable just because it worked once.`,right:`A method is only reliable if it works for every similar case, not just the one you tried.`,tip:`Check a method against at least one "awkward" example, such as a number with no useful trailing zeros.`},{title:`Mixing up conversion factors between different unit pairs`,wrong:`Using the mm-to-m factor (1,000) when converting mm to km.`,right:`Use the correct combined factor for the specific pair of units in the question (1,000,000 for mm to km).`,tip:`Write out each intermediate conversion step if you are not confident with a direct combined factor.`}],summary:[`A correct final answer does not always guarantee a reliable method.`,`Comparing two methods on the same problem can reveal which one is more generally trustworthy.`,`Checking the size and direction of an answer is a fast way to catch common mistakes.`,`Strong reasoning includes explaining why a method works, not only calculating an answer.`]},hr={id:`unit-11`,number:11,title:`Mixed Review`,shortDescription:`Combine every skill from this course in one flexible practice set.`,estimatedMinutes:20,difficulty:`Intermediate`,color:`sky`,learningGoals:[`Apply powers of 10, multiplication, division, decimals and rounding together`,`Choose the right skill for each question without being told which unit it comes from`,`Practise at Easy, Standard or Challenge level, in any order`],vocabulary:[],rules:[],introduction:`This mixed review draws questions from every unit in the course. Choose Easy, Standard or Challenge mode — you can attempt any mode as many times as you like, in any order.`,workedExamples:[],practiceQuiz:[],mainQuiz:[],challengeQuestion:{id:`u11-placeholder`,unitId:`unit-11`,difficulty:`challenge`,type:`mcq`,category:`challenge`,prompt:`Choose a mode to begin the Mixed Review.`,choices:[{id:`a`,text:`Start from the unit page`}],correctChoiceId:`a`,explanation:`Select Easy, Standard or Challenge mode to begin.`},commonMistakes:[],summary:[`Mixed Review combines every skill taught across the course.`,`You can attempt Easy, Standard or Challenge mode as many times as you like.`],kind:`mixed-review`,mixedReviewModes:{easy:[{id:`mr-e1`,unitId:`unit-11`,difficulty:`easy`,type:`numeric`,category:`skill`,prompt:`Write 10³ as a number.`,correctAnswer:`1000`,acceptedAnswers:[`1000`,`1,000`],explanation:`10³ = 10 × 10 × 10 = 1,000.`},{id:`mr-e2`,unitId:`unit-11`,difficulty:`easy`,type:`numeric`,category:`skill`,prompt:`Work out 34 × 10.`,correctAnswer:`340`,explanation:`Multiplying by 10 shifts every digit one place to the left, giving 340.`},{id:`mr-e3`,unitId:`unit-11`,difficulty:`easy`,type:`numeric`,category:`skill`,prompt:`Work out 2.5 × 100.`,correctAnswer:`250`,explanation:`Multiplying by 100 shifts every digit two places to the left, giving 250.`},{id:`mr-e4`,unitId:`unit-11`,difficulty:`easy`,type:`numeric`,category:`skill`,prompt:`Work out 12 ÷ 100.`,correctAnswer:`0.12`,explanation:`Dividing by 100 shifts every digit two places to the right, giving 0.12.`},{id:`mr-e5`,unitId:`unit-11`,difficulty:`easy`,type:`true-false`,category:`skill`,prompt:`True or false: 1 cm = 10 mm.`,trueFalseAnswer:!0,explanation:`There are always 10 mm in every 1 cm.`},{id:`mr-e6`,unitId:`unit-11`,difficulty:`easy`,type:`numeric`,category:`skill`,prompt:`Round 6.7 to the nearest whole number.`,correctAnswer:`7`,explanation:`The tenths digit (7) is 5 or more, so 6.7 rounds up to 7.`},{id:`mr-e7`,unitId:`unit-11`,difficulty:`easy`,type:`mcq`,category:`skill`,prompt:`15 × 100 = ?`,choices:[{id:`a`,text:`150`},{id:`b`,text:`1,500`},{id:`c`,text:`15,000`}],correctChoiceId:`b`,explanation:`Multiplying by 100 shifts the digits of 15 two places to the left, giving 1,500.`},{id:`mr-e8`,unitId:`unit-11`,difficulty:`easy`,type:`fill-blank`,category:`skill`,prompt:`100,000 = 10 to the power of ___.`,correctAnswer:`5`,acceptedAnswers:[`5`,`five`],explanation:`100,000 has five zeros after the 1, so it equals 10⁵.`}],standard:[{id:`mr-s1`,unitId:`unit-11`,difficulty:`standard`,type:`numeric`,category:`skill`,prompt:`Work out 768 × 10⁴.`,correctAnswer:`7680000`,acceptedAnswers:[`7680000`,`7,680,000`],explanation:`10⁴ shifts the digits of 768 four places to the left, giving 7,680,000.`},{id:`mr-s2`,unitId:`unit-11`,difficulty:`standard`,type:`numeric`,category:`skill`,prompt:`Work out 2,350,000 ÷ 10⁵.`,correctAnswer:`23.5`,explanation:`10⁵ shifts the digits of 2,350,000 five places to the right, giving 23.5.`},{id:`mr-s3`,unitId:`unit-11`,difficulty:`standard`,type:`numeric`,category:`application`,prompt:`Convert 9 km to mm.`,correctAnswer:`9000000`,acceptedAnswers:[`9000000`,`9,000,000`],explanation:`1 km = 1,000,000 mm, so 9 km = 9,000,000 mm.`},{id:`mr-s4`,unitId:`unit-11`,difficulty:`standard`,type:`numeric`,category:`skill`,prompt:`Round 34.8972 to 2 decimal places.`,correctAnswer:`34.90`,explanation:`The thousandths digit (7) is 5 or more, so 34.8972 rounds up to 34.90.`},{id:`mr-s5`,unitId:`unit-11`,difficulty:`standard`,type:`mcq`,category:`error-analysis`,prompt:`Marcus says: "0.57 × 1,000 means I add three zeros to the end, giving 0.57000." Why is this wrong?`,choices:[{id:`a`,text:`Adding zeros after decimal digits does not change the value at all.`},{id:`b`,text:`He should have added four zeros.`},{id:`c`,text:`The answer should have been negative.`},{id:`d`,text:`Nothing is wrong — his answer is correct.`}],correctChoiceId:`a`,explanation:`0.57000 has the same value as 0.57. The digits needed to shift across the decimal point instead, giving the correct answer of 570.`},{id:`mr-s6`,unitId:`unit-11`,difficulty:`standard`,type:`numeric`,category:`skill`,prompt:`Work out 8.95 ÷ 1,000.`,correctAnswer:`0.00895`,explanation:`Dividing by 1,000 shifts the digits of 8.95 three places to the right, giving 0.00895.`},{id:`mr-s7`,unitId:`unit-11`,difficulty:`standard`,type:`numeric`,category:`application`,prompt:`Convert 15,600,000 mm to km.`,correctAnswer:`15.6`,explanation:`Dividing by 1,000,000 shifts the digits of 15,600,000 six places to the right, giving 15.6.`},{id:`mr-s8`,unitId:`unit-11`,difficulty:`standard`,type:`true-false`,category:`skill`,prompt:`True or false: 99.9961 rounds to 100.0 when rounded to 1 decimal place.`,trueFalseAnswer:!0,explanation:`The carry passes through several 9s: 99.9961 rounds all the way up to 100.0.`},{id:`mr-s9`,unitId:`unit-11`,difficulty:`standard`,type:`fill-blank`,category:`skill`,prompt:`Work out 291 × 1,000.`,correctAnswer:`291000`,acceptedAnswers:[`291000`,`291,000`],explanation:`Multiplying by 1,000 shifts the digits of 291 three places to the left, giving 291,000.`},{id:`mr-s10`,unitId:`unit-11`,difficulty:`standard`,type:`mcq`,category:`skill`,prompt:`Which expression is equal to 1,000,000?`,choices:[{id:`a`,text:`10⁵`},{id:`b`,text:`10⁶`},{id:`c`,text:`6 × 10`}],correctChoiceId:`b`,explanation:`1,000,000 has six zeros after the 1, so it equals 10⁶.`}],challenge:[{id:`mr-c1`,unitId:`unit-11`,difficulty:`challenge`,type:`numeric`,category:`challenge`,prompt:`A whole number is multiplied by 10³ and the result is 82,000. What was the original number?`,correctAnswer:`82`,explanation:`Reversing the shift, 82,000 ÷ 10³ = 82.`},{id:`mr-c2`,unitId:`unit-11`,difficulty:`challenge`,type:`mcq`,category:`challenge`,prompt:`Which is greater: 10⁴ or 4¹⁰?`,choices:[{id:`a`,text:`10⁴ is greater`},{id:`b`,text:`4¹⁰ is greater`},{id:`c`,text:`They are equal`}],correctChoiceId:`b`,explanation:`10⁴ = 10,000, but 4¹⁰ = 1,048,576, which is over one hundred times larger.`},{id:`mr-c3`,unitId:`unit-11`,difficulty:`challenge`,type:`numeric`,category:`application`,prompt:`Convert 0.045 km to mm.`,correctAnswer:`45000`,acceptedAnswers:[`45000`,`45,000`],explanation:`0.045 km × 1,000,000 = 45,000 mm.`},{id:`mr-c4`,unitId:`unit-11`,difficulty:`challenge`,type:`numeric`,category:`skill`,prompt:`Round 782.02972 to 3 decimal places.`,correctAnswer:`782.030`,explanation:`The fourth decimal digit (7) rounds the thousandths digit up from 9 to 10, carrying into the hundredths digit: 782.030.`},{id:`mr-c5`,unitId:`unit-11`,difficulty:`challenge`,type:`mcq`,category:`error-analysis`,prompt:`A student converts 630,000 mm to km by dividing by 1,000 and gets 630 km. What mistake did they make?`,choices:[{id:`a`,text:`They used the mm-to-m factor instead of the mm-to-km factor.`},{id:`b`,text:`They should have multiplied instead of dividing.`},{id:`c`,text:`They made no mistake.`},{id:`d`,text:`They rounded incorrectly.`}],correctChoiceId:`a`,explanation:`The correct factor for mm to km is 1,000,000, not 1,000. The correct answer is 0.63 km.`},{id:`mr-c6`,unitId:`unit-11`,difficulty:`challenge`,type:`numeric`,category:`application`,prompt:`Convert 2.5 km to mm, then divide the result by 100. What is the final value?`,correctAnswer:`25000`,acceptedAnswers:[`25000`,`25,000`],explanation:`2.5 km = 2,500,000 mm. Dividing by 100 gives 25,000.`}]}},gr=[{id:`final-1`,unitId:`unit-12`,difficulty:`easy`,type:`numeric`,category:`skill`,prompt:`Write 10⁶ as a number.`,correctAnswer:`1000000`,acceptedAnswers:[`1000000`,`1,000,000`],explanation:`10⁶ has six zeros after the 1, giving 1,000,000.`},{id:`final-2`,unitId:`unit-12`,difficulty:`easy`,type:`mcq`,category:`skill`,prompt:`Which of these is equal to 10⁴?`,choices:[{id:`a`,text:`40,000`},{id:`b`,text:`10,000`},{id:`c`,text:`4,000`},{id:`d`,text:`100,000`}],correctChoiceId:`b`,explanation:`10⁴ has four zeros after the 1, giving 10,000.`},{id:`final-3`,unitId:`unit-12`,difficulty:`easy`,type:`numeric`,category:`skill`,prompt:`Work out 47 × 10.`,correctAnswer:`470`,explanation:`Multiplying by 10 shifts every digit one place left, giving 470.`},{id:`final-4`,unitId:`unit-12`,difficulty:`standard`,type:`numeric`,category:`skill`,prompt:`Work out 91.5 × 10².`,correctAnswer:`9150`,explanation:`10² shifts every digit two places left, giving 9,150.`},{id:`final-5`,unitId:`unit-12`,difficulty:`standard`,type:`numeric`,category:`skill`,prompt:`Work out 4.56 × 10⁵.`,correctAnswer:`456000`,acceptedAnswers:[`456000`,`456,000`],explanation:`10⁵ shifts every digit five places left, giving 456,000.`},{id:`final-6`,unitId:`unit-12`,difficulty:`standard`,type:`true-false`,category:`skill`,prompt:`True or false: 2.87 × 1,000,000 = 2,870,000.`,trueFalseAnswer:!0,explanation:`10⁶ shifts every digit six places left: 2.87 becomes 2,870,000.`},{id:`final-7`,unitId:`unit-12`,difficulty:`standard`,type:`numeric`,category:`skill`,prompt:`Work out 510,000 ÷ 10⁵.`,correctAnswer:`5.1`,explanation:`10⁵ shifts every digit five places right, giving 5.1.`},{id:`final-8`,unitId:`unit-12`,difficulty:`standard`,type:`mcq`,category:`skill`,prompt:`80,500,000 ÷ 10⁵ = ?`,choices:[{id:`a`,text:`80.5`},{id:`b`,text:`805`},{id:`c`,text:`8,050`},{id:`d`,text:`80,500`}],correctChoiceId:`b`,explanation:`10⁵ shifts every digit five places right: 80,500,000 becomes 805.`},{id:`final-9`,unitId:`unit-12`,difficulty:`standard`,type:`numeric`,category:`skill`,prompt:`Work out 4,250 ÷ 1,000.`,correctAnswer:`4.25`,explanation:`1,000 = 10³, shifting digits three places right: 4,250 becomes 4.25.`},{id:`final-10`,unitId:`unit-12`,difficulty:`standard`,type:`numeric`,category:`skill`,prompt:`Work out 8.95 ÷ 1,000.`,correctAnswer:`0.00895`,explanation:`Shifting the digits of 8.95 three places right gives 0.00895.`},{id:`final-11`,unitId:`unit-12`,difficulty:`standard`,type:`numeric`,category:`application`,prompt:`Convert 90,000,000 mm to km.`,correctAnswer:`90`,acceptedAnswers:[`90`,`90 km`],requiresUnits:`Answer in km.`,explanation:`Dividing by 1,000,000 gives 90,000,000 mm = 90 km.`},{id:`final-12`,unitId:`unit-12`,difficulty:`standard`,type:`numeric`,category:`application`,prompt:`Convert 770,000 mm to km.`,correctAnswer:`0.77`,acceptedAnswers:[`0.77`,`0.77 km`],requiresUnits:`Answer in km.`,explanation:`Dividing by 1,000,000 gives 770,000 mm = 0.77 km.`},{id:`final-13`,unitId:`unit-12`,difficulty:`standard`,type:`numeric`,category:`application`,prompt:`A football match attendance of 74,836 is rounded to the nearest thousand for a news report. What figure is reported?`,correctAnswer:`75000`,acceptedAnswers:[`75000`,`75,000`],explanation:`The hundreds digit (8) is 5 or more, so the thousands digit rounds up from 4 to 5, giving 75,000.`},{id:`final-14`,unitId:`unit-12`,difficulty:`standard`,type:`mcq`,category:`skill`,prompt:`Round 8,432 to the nearest hundred.`,choices:[{id:`a`,text:`8,400`},{id:`b`,text:`8,500`},{id:`c`,text:`8,300`},{id:`d`,text:`8,000`}],correctChoiceId:`a`,explanation:`The tens digit (3) is less than 5, so the hundreds digit stays as 4, giving 8,400.`},{id:`final-15`,unitId:`unit-12`,difficulty:`easy`,type:`numeric`,category:`skill`,prompt:`Round 88.88 to the nearest whole number.`,correctAnswer:`89`,explanation:`The tenths digit (8) is 5 or more, so 88.88 rounds up to 89.`},{id:`final-16`,unitId:`unit-12`,difficulty:`easy`,type:`true-false`,category:`skill`,prompt:`True or false: 124.09 rounds to 124 when rounded to the nearest whole number.`,trueFalseAnswer:!0,explanation:`The tenths digit (0) is less than 5, so 124.09 rounds down to 124.`},{id:`final-17`,unitId:`unit-12`,difficulty:`standard`,type:`numeric`,category:`skill`,prompt:`Round 17.825684 to 4 decimal places.`,correctAnswer:`17.8257`,explanation:`The fifth decimal digit (8) is 5 or more, so the fourth decimal digit rounds up from 6 to 7, giving 17.8257.`},{id:`final-18`,unitId:`unit-12`,difficulty:`standard`,type:`fill-blank`,category:`skill`,prompt:`Round 3.9975 to 2 decimal places.`,correctAnswer:`4.00`,explanation:`Rounding 3.9975 to 2 d.p. carries through the hundredths, tenths and units digits, giving exactly 4.00.`},{id:`final-19`,unitId:`unit-12`,difficulty:`challenge`,type:`numeric`,category:`challenge`,prompt:`Round 99.9961 to 1 decimal place.`,correctAnswer:`100.0`,explanation:`The hundredths digit (9) forces a carry that ripples through the tenths, units and tens digits, so 99.9961 rounds all the way up to 100.0.`},{id:`final-20`,unitId:`unit-12`,difficulty:`challenge`,type:`mcq`,category:`error-analysis`,prompt:`Which method reliably divides any whole number by a power of 10, even when there are few or no trailing zeros?`,choices:[{id:`a`,text:`Crossing out zeros equal to the index of the power of 10`},{id:`b`,text:`Shifting every digit right through the place-value chart, using placeholder zeros where needed`},{id:`c`,text:`Guessing based on the size of the divisor`},{id:`d`,text:`Rounding first, then dividing`}],correctChoiceId:`b`,explanation:`Place-value shifting works for every number, while crossing out zeros only works when there are enough trailing zeros to remove.`},{id:`final-21`,unitId:`unit-12`,difficulty:`standard`,type:`true-false`,category:`error-analysis`,prompt:`True or false: crossing out zeros is always a valid method for dividing by a power of 10.`,trueFalseAnswer:!1,explanation:`It only works when there are enough trailing zeros — for example, it fails for 830 ÷ 1,000.`},{id:`final-22`,unitId:`unit-12`,difficulty:`standard`,type:`matching`,category:`skill`,prompt:`Match each power of 10 to its value.`,matchPairs:[{id:`m1`,left:`10²`,right:`100`},{id:`m2`,left:`10³`,right:`1,000`},{id:`m3`,left:`10⁴`,right:`10,000`},{id:`m4`,left:`10⁵`,right:`100,000`}],explanation:`The index of a power of 10 always matches the number of zeros that follow the leading 1.`},{id:`final-23`,unitId:`unit-12`,difficulty:`standard`,type:`numeric`,category:`application`,prompt:`A stadium crowd of 253,674 people is reported in the media rounded to the nearest thousand. What figure is reported?`,correctAnswer:`254000`,acceptedAnswer
