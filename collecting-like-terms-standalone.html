,`5a`],[`5a`,`7a`],[`12a`]],blanks:[`r1c0`,`r2c0`],answers:{r1c0:`5a`,r1c1:`7a`,r2c0:`12a`}},hint:`Add the two blocks directly below the one you're filling in.`,explanation:`3a + 2a = 5a, then 5a + 7a = 12a.`,workedSolution:`Row 2 left: 3a + 2a = 5a. Row 2 right (given): 2a + 5a = 7a. Apex: 5a + 7a = 12a.`}),T({id:`gp5-guided-2`,difficulty:`easy`,prompt:`Guided pyramid 2 — fill in the missing blocks.`,pyramid:{rows:[[`4x`,`x`,`3x`],[`5x`,`4x`],[`9x`]],blanks:[`r1c1`,`r2c0`],answers:{r1c0:`5x`,r1c1:`4x`,r2c0:`9x`}},hint:`Remember x on its own means 1x when you add.`,explanation:`x + 3x = 4x, then 5x + 4x = 9x.`,workedSolution:`Row 2 left (given): 4x + x = 5x. Row 2 right: x + 3x = 4x. Apex: 5x + 4x = 9x.`}),T({id:`gp5-independent-1`,difficulty:`medium`,prompt:`Independent pyramid 1 — fill in all three missing blocks.`,pyramid:{rows:[[`a + b`,`2a + b`,`a + 2b`],[`3a + 2b`,`3a + 3b`],[`6a + 5b`]],blanks:[`r1c0`,`r1c1`,`r2c0`],answers:{r1c0:`3a + 2b`,r1c1:`3a + 3b`,r2c0:`6a + 5b`}},hint:`Add the two full expressions below each blank block, term by term.`,explanation:`(a + b) + (2a + b) = 3a + 2b, and (2a + b) + (a + 2b) = 3a + 3b, then (3a + 2b) + (3a + 3b) = 6a + 5b.`,workedSolution:`Row 2 left: (a+b)+(2a+b) = 3a+2b. Row 2 right: (2a+b)+(a+2b) = 3a+3b. Apex: (3a+2b)+(3a+3b) = 6a+5b.`}),T({id:`gp5-independent-2`,difficulty:`medium`,prompt:`Independent pyramid 2 — fill in all three missing blocks.`,pyramid:{rows:[[`2a − b`,`a + b`,`3a − 2b`],[`3a`,`4a − b`],[`7a − b`]],blanks:[`r1c0`,`r1c1`,`r2c0`],answers:{r1c0:`3a`,r1c1:`4a - b`,r2c0:`7a - b`}},hint:`Watch the signs carefully — some terms will cancel out.`,explanation:`(2a − b) + (a + b) = 3a (the b-terms cancel), and (a + b) + (3a − 2b) = 4a − b, then 3a + (4a − b) = 7a − b.`,workedSolution:`Row 2 left: (2a−b)+(a+b) = 3a. Row 2 right: (a+b)+(3a−2b) = 4a−b. Apex: 3a+(4a−b) = 7a−b.`}),T({id:`gp5-independent-3`,difficulty:`hard`,prompt:`Independent pyramid 3 — fill in all three missing blocks.`,pyramid:{rows:[[`3x + y`,`2x − y`,`x + 3y`],[`5x`,`3x + 2y`],[`8x + 2y`]],blanks:[`r1c0`,`r1c1`,`r2c0`],answers:{r1c0:`5x`,r1c1:`3x + 2y`,r2c0:`8x + 2y`}},hint:`Combine the x-terms and y-terms separately for each addition.`,explanation:`(3x + y) + (2x − y) = 5x (the y-terms cancel), and (2x − y) + (x + 3y) = 3x + 2y, then 5x + (3x + 2y) = 8x + 2y.`,workedSolution:`Row 2 left: (3x+y)+(2x−y) = 5x. Row 2 right: (2x−y)+(x+3y) = 3x+2y. Apex: 5x+(3x+2y) = 8x+2y.`})]}],re={rows:[[`2x`,`3x`,`4x`],[`5x`,`7x`],[`12x`]],steps:[`2x + 3x = 5x`,`3x + 4x = 7x`,`5x + 7x = 12x`]},D=[{id:`set1`,title:`Set 1 · Foundations`,difficulty:`Easy`,description:`Identifying like terms, one-variable addition and subtraction, and recognising expressions that can't be simplified further.`,questions:[_({id:`s1-1`,skill:`likeUnlike`,difficulty:`easy`,prompt:`Which pair below are like terms?`,options:[`4a and 9a`,`4a and 9b`,`4x and 4x²`,`7 and y`],correctIndex:0,hint:`Like terms must have the exact same variable part.`,explanation:`4a and 9a both have the variable part a, so they are like terms.`,workedSolution:`4a → variable part a. 9a → variable part a. Match → like terms.`}),v({id:`s1-2`,skill:`likeUnlike`,difficulty:`easy`,prompt:`5x and 5 are like terms.`,answer:!1,hint:`One of these terms has a variable and one doesn't.`,explanation:`5x has a variable part (x) but 5 is a constant. They are unlike terms.`,workedSolution:`5x → variable part x. 5 → no variable (constant). Different → unlike terms.`}),y({id:`s1-3`,skill:`addition`,difficulty:`easy`,prompt:`Simplify: 3a + 4a`,expressionTemplate:`3a + 4a = [ ]a`,accepted:[`7`],hint:`Add the coefficients 3 and 4.`,explanation:`3a + 4a = (3 + 4)a = 7a.`,workedSolution:`3 + 4 = 7, so 3a + 4a = 7a.`}),y({id:`s1-4`,skill:`subtraction`,difficulty:`easy`,prompt:`Simplify: 9x − 4x`,expressionTemplate:`9x − 4x = [ ]x`,accepted:[`5`],hint:`Subtract the coefficients 9 and 4.`,explanation:`9x − 4x = (9 − 4)x = 5x.`,workedSolution:`9 − 4 = 5, so 9x − 4x = 5x.`}),_({id:`s1-5`,skill:`coefficients`,difficulty:`easy`,prompt:`What is the coefficient of the term 7m?`,options:[`7`,`m`,`7m`,`1`],correctIndex:0,hint:`The coefficient is the number in front of the variable.`,explanation:`In 7m, the number 7 is the coefficient and m is the variable.`,workedSolution:`7m = 7 × m, so the coefficient is 7.`}),_({id:`s1-6`,skill:`coefficients`,difficulty:`easy`,prompt:`What is the variable in the term 12y?`,options:[`y`,`12`,`12y`,`1`],correctIndex:0,hint:`The variable is the letter part of the term.`,explanation:`In 12y, y is the variable and 12 is the coefficient.`,workedSolution:`12y is made of coefficient 12 and variable y.`}),v({id:`s1-7`,skill:`coefficients`,difficulty:`easy`,prompt:`x means the same as 1x.`,answer:!0,hint:`A variable with no visible number has a hidden coefficient.`,explanation:`When no coefficient is written, it is understood to be 1. x and 1x are the same.`,workedSolution:`By convention, a coefficient of 1 is not written, so x = 1x.`}),y({id:`s1-8`,skill:`addition`,difficulty:`easy`,prompt:`Simplify: 5a + 2a + 3a`,expressionTemplate:`5a + 2a + 3a = [ ]a`,accepted:[`10`],hint:`Add all three coefficients together.`,explanation:`5a + 2a + 3a = (5 + 2 + 3)a = 10a.`,workedSolution:`5 + 2 + 3 = 10, so the answer is 10a.`}),v({id:`s1-9`,skill:`cannotCombine`,difficulty:`easy`,prompt:`3a + 2b can be simplified further.`,answer:!1,hint:`Are a and b the same letter?`,explanation:`a and b are different variables, so 3a and 2b are unlike terms. The expression is already fully simplified.`,workedSolution:`3a and 2b have different variable parts — nothing to collect.`}),y({id:`s1-10`,skill:`subtraction`,difficulty:`easy`,prompt:`Simplify: 6y − y`,expressionTemplate:`6y − y = [ ]y`,accepted:[`5`],hint:`Remember y on its own means 1y.`,explanation:`6y − y = 6y − 1y = (6 − 1)y = 5y.`,workedSolution:`y = 1y, so 6y − 1y = 5y.`}),_({id:`s1-11`,skill:`cannotCombine`,difficulty:`easy`,prompt:`Which expression is already fully simplified?`,options:[`3a + 2b`,`4x + 5x`,`7m − 2m`,`2y + 3y`],correctIndex:0,hint:`Look for the option where the two terms are unlike terms.`,explanation:`3a and 2b are unlike terms, so 3a + 2b cannot be simplified any further. The other options all contain like terms that can still be collected.`,workedSolution:`4x+5x=9x, 7m−2m=5m, 2y+3y=5y — all reducible. Only 3a+2b is already simplest.`}),y({id:`s1-12`,skill:`addition`,difficulty:`easy`,type:`missingTerm`,prompt:`What term is missing? ___ + 3a = 8a`,expressionTemplate:`[ ] + 3a = 8a`,accepted:[`5a`],placeholder:`missing term`,hint:`What plus 3a gives 8a? Think about the coefficients.`,explanation:`5a + 3a = 8a, so the missing term is 5a.`,workedSolution:`8a − 3a = 5a.`}),v({id:`s1-13`,skill:`coefficients`,difficulty:`easy`,prompt:`−x means −1 lots of x.`,answer:!0,hint:`What hidden number sits in front of a lone −x?`,explanation:`−x is the same as −1x, so it represents −1 lots of x.`,workedSolution:`−x = −1 × x = −1x.`}),y({id:`s1-14`,skill:`subtraction`,difficulty:`easy`,prompt:`Simplify: 10m − 3m`,expressionTemplate:`10m − 3m = [ ]m`,accepted:[`7`],hint:`Subtract the coefficients 10 and 3.`,explanation:`10m − 3m = (10 − 3)m = 7m.`,workedSolution:`10 − 3 = 7, so the answer is 7m.`}),x({id:`s1-15`,skill:`multiVariable`,difficulty:`easy`,prompt:`Simplify fully: 4p + 3p + 2q`,accepted:[`7p+2q`],hint:`Only the p-terms can be collected. The q-term stays on its own.`,explanation:`4p + 3p = 7p. There is only one q-term, so it stays as 2q.`,workedSolution:`4p + 3p + 2q = (4p + 3p) + 2q = 7p + 2q.`})]},{id:`set2`,title:`Set 2 · Mixed Practice`,difficulty:`Medium`,description:`Two and three groups of like terms, constants mixed with variables, missing coefficients, error analysis, algebra pyramids, and matching.`,questions:[b({id:`s2-1`,skill:`multiVariable`,difficulty:`medium`,prompt:`Simplify: 3a + 5b + 2a + 4b`,expressionTemplate:`3a + 5b + 2a + 4b = [ ]a + [ ]b`,blanks:[{accepted:[`5`]},{accepted:[`9`]}],hint:`Collect the a-terms, then the b-terms.`,explanation:`The a-terms give 3a + 2a = 5a. The b-terms give 5b + 4b = 9b.`,workedSolution:`(3a + 2a) + (5b + 4b) = 5a + 9b.`}),b({id:`s2-2`,skill:`constants`,difficulty:`medium`,prompt:`Simplify: 7x + 4 + 2x + 6`,expressionTemplate:`7x + 4 + 2x + 6 = [ ]x + [ ]`,blanks:[{accepted:[`9`]},{accepted:[`10`]}],hint:`Collect the x-terms separately from the constants.`,explanation:`The x-terms give 7x + 2x = 9x. The constants give 4 + 6 = 10.`,workedSolution:`(7x + 2x) + (4 + 6) = 9x + 10.`}),y({id:`s2-3`,skill:`addition`,difficulty:`medium`,type:`missingTerm`,prompt:`What term is missing? 4x + ___ = 9x`,expressionTemplate:`4x + [ ] = 9x`,accepted:[`5x`],placeholder:`missing term`,hint:`What must be added to 4x to reach 9x?`,explanation:`4x + 5x = 9x, so the missing term is 5x.`,workedSolution:`9x − 4x = 5x.`}),S({id:`s2-4`,difficulty:`medium`,prompt:`A student simplified 3x + 4y and wrote 7xy. What mistake did they make?`,sub:`Correct expression: 3x + 4y`,options:[`Combined two unlike variables into one term`,`Forgot the coefficient of one term`,`Subtracted instead of added`,`Dropped a term entirely`],correctIndex:0,misconception:`combining unlike variables`,hint:`x and y are different letters.`,explanation:`3x and 4y are unlike terms because x and y are different variables — they cannot be combined into 7xy.`,workedSolution:`3x + 4y is already fully simplified.`}),w({id:`s2-5`,skill:`likeUnlike`,difficulty:`medium`,prompt:`Sort each term into the correct group.`,sub:`Some terms belong with the a-terms, some with the b-terms, and some are constants.`,groups:[{key:`a`,label:`a-terms`},{key:`b`,label:`b-terms`},{key:`const`,label:`Constants`}],items:[{label:`3a`,group:`a`},{label:`7`,group:`const`},{label:`5b`,group:`b`},{label:`9a`,group:`a`},{label:`2`,group:`const`},{label:`4b`,group:`b`}],hint:`Group by variable part first, then put the plain numbers together.`,explanation:`3a and 9a share the variable a. 5b and 4b share the variable b. 7 and 2 are constants with no variable.`,workedSolution:`a-terms: 3a, 9a. b-terms: 5b, 4b. Constants: 7, 2.`}),C({id:`s2-6`,skill:`addition`,difficulty:`medium`,prompt:`Match each expression to its simplified form.`,pairs:[{left:`4m + 3m`,right:`7m`},{left:`6y − 2y`,right:`4y`},{left:`2p + p + 3p`,right:`6p`},{left:`8a − 5a`,right:`3a`},{left:`5n + 2n − n`,right:`6n`}],hint:`Collect the coefficients for each expression before matching.`,explanation:`Each expression simplifies by adding or subtracting its coefficients while keeping the variable the same.`,workedSolution:`4m+3m=7m · 6y−2y=4y · 2p+p+3p=6p · 8a−5a=3a · 5n+2n−n=6n`}),b({id:`s2-7`,skill:`multiVariable`,difficulty:`medium`,prompt:`Simplify: 6a − 2a + 3b − b`,expressionTemplate:`6a − 2a + 3b − b = [ ]a + [ ]b`,blanks:[{accepted:[`4`]},{accepted:[`2`]}],hint:`Remember b on its own means 1b.`,explanation:`The a-terms give 6a − 2a = 4a. The b-terms give 3b − b = 2b.`,workedSolution:`(6a − 2a) + (3b − 1b) = 4a + 2b.`}),_({id:`s2-8`,skill:`addition`,difficulty:`medium`,prompt:`What is the coefficient of a in the simplified form of 2a + 3a + 4a?`,options:[`9`,`2`,`3`,`4`],correctIndex:0,hint:`Add all three coefficients first.`,explanation:`2a + 3a + 4a = (2 + 3 + 4)a = 9a, so the coefficient is 9.`,workedSolution:`2 + 3 + 4 = 9.`}),v({id:`s2-9`,skill:`likeUnlike`,difficulty:`medium`,prompt:`7xy and 7yx are like terms.`,answer:!0,hint:`Does the order of letters in a product matter?`,explanation:`Multiplication is commutative, so xy and yx are the same variable part. 7xy and 7yx are like terms.`,workedSolution:`xy = yx, so the variable parts match.`}),T({id:`s2-10`,difficulty:`medium`,prompt:`Complete the algebra pyramid. Each block equals the sum of the two blocks below it.`,pyramid:{rows:[[`2a`,`3a`,`a`],[`5a`,`4a`],[`9a`]],blanks:[`r1c1`,`r2c0`],answers:{r1c0:`5a`,r1c1:`4a`,r2c0:`9a`}},hint:`Add the two blocks directly beneath the one you're finding.`,explanation:`3a + a = 4a, and 5a + 4a = 9a.`,workedSolution:`Row 2 left (given): 2a + 3a = 5a. Row 2 right: 3a + a = 4a. Apex: 5a + 4a = 9a.`}),S({id:`s2-11`,difficulty:`medium`,prompt:`A student simplified 5m + 3 and wrote 8m. What mistake did they make?`,sub:`Correct expression: 5m + 3`,options:[`Added the coefficient and the constant as if they were like terms`,`Forgot the variable in the answer`,`Multiplied instead of added`,`Combined with a different variable`],correctIndex:0,misconception:`adding a coefficient to a constant`,hint:`Is 3 a like term with 5m?`,explanation:`5m and 3 are unlike terms — 5m has a variable and 3 does not — so they cannot be combined.`,workedSolution:`5m + 3 is already fully simplified.`}),b({id:`s2-12`,skill:`multiVariable`,difficulty:`medium`,prompt:`Simplify: 4x + 2y + 3x + 5y + 2x`,expressionTemplate:`4x + 2y + 3x + 5y + 2x = [ ]x + [ ]y`,blanks:[{accepted:[`9`]},{accepted:[`7`]}],hint:`There are three x-terms and two y-terms — collect each group.`,explanation:`The x-terms give 4x + 3x + 2x = 9x. The y-terms give 2y + 5y = 7y.`,workedSolution:`(4x + 3x + 2x) + (2y + 5y) = 9x + 7y.`}),y({id:`s2-13`,skill:`subtraction`,difficulty:`medium`,type:`missingTerm`,prompt:`What term is missing? ___ − 3y = 4y`,expressionTemplate:`[ ] − 3y = 4y`,accepted:[`7y`],placeholder:`missing term`,hint:`What minus 3y leaves 4y?`,explanation:`7y − 3y = 4y, so the missing term is 7y.`,workedSolution:`4y + 3y = 7y.`}),x({id:`s2-14`,skill:`multiVariable`,difficulty:`medium`,prompt:`Simplify fully: 5a + 3b − 2a + b`,accepted:[`3a+4b`],hint:`Collect the a-terms, then the b-terms. Remember b means 1b.`,explanation:`The a-terms give 5a − 2a = 3a. The b-terms give 3b + b = 4b.`,workedSolution:`(5a − 2a) + (3b + 1b) = 3a + 4b.`}),v({id:`s2-15`,skill:`likeUnlike`,difficulty:`medium`,prompt:`3x² and 3x are like terms.`,answer:!1,hint:`Compare the powers of x in both terms.`,explanation:`3x² has x to the power 2, while 3x has x to the power 1. Different powers mean unlike terms.`,workedSolution:`Variable part of 3x² is x². Variable part of 3x is x¹. Different → unlike terms.`})]},{id:`set3`,title:`Set 3 · Exam Practice`,difficulty:`Medium–Challenging`,description:`Longer expressions, negative coefficients, squared variables, products such as ab and xy, simple fractions, puzzles, visual length problems, and multi-step simplification.`,questions:[te({id:`s3-1`,skill:`multiVariable`,difficulty:`hard`,prompt:`Simplify fully: 4a + 3b − 2a + 5b − a`,parts:[{id:`p0`,prompt:`Add the a-terms together: 4a, −2a, and −a. What is the result?`,accepted:[`a`,`1a`],inputLabel:`a-terms total`},{id:`p1`,prompt:`Add the b-terms together: 3b and 5b. What is the result?`,accepted:[`8b`],inputLabel:`b-terms total`},{id:`p2`,prompt:`Write the fully simplified expression.`,accepted:[`a+8b`],inputLabel:`final answer`}],hint:`Work through the a-terms first, then the b-terms, then combine both results.`,explanation:`The a-terms combine to a, and the b-terms combine to 8b, giving a final answer of a + 8b.`,workedSolution:`a-terms: 4a − 2a − a = a. b-terms: 3b + 5b = 8b. Final: a + 8b.`}),x({id:`s3-2`,skill:`subtraction`,difficulty:`hard`,prompt:`Simplify fully: −3x + 5x − 2x`,accepted:[`0`],hint:`Add the three coefficients carefully, including their signs.`,explanation:`−3 + 5 − 2 = 0, so all the x-terms cancel out completely, leaving 0.`,workedSolution:`(−3 + 5 − 2)x = 0x = 0.`}),x({id:`s3-3`,skill:`multiVariable`,difficulty:`hard`,prompt:`Simplify fully: 4y² + 3y − 2y² + y`,sub:`Type ^2 for a squared term, e.g. y^2`,accepted:[`2y^2+4y`],hint:`Collect the y²-terms separately from the y-terms — they are unlike terms.`,explanation:`The y²-terms give 4y² − 2y² = 2y². The y-terms give 3y + y = 4y.`,workedSolution:`(4y² − 2y²) + (3y + y) = 2y² + 4y.`}),x({id:`s3-4`,skill:`multiVariable`,difficulty:`hard`,prompt:`Simplify fully: 5ab − 2ab + 3ab`,accepted:[`6ab`],hint:`All three terms have the same variable part — just combine the coefficients.`,explanation:`5ab − 2ab + 3ab = (5 − 2 + 3)ab = 6ab.`,workedSolution:`5 − 2 + 3 = 6, so the answer is 6ab.`
