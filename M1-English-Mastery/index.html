<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>M.1 English Entrance Exam Mastery — Advanced Practice for Competitive School Admission</title>
  <meta name="description" content="Seven interactive English practice tests (175 questions) with Thai explanations for Thai Grade 6 students preparing for competitive M.1 entrance examinations." />

  <!-- Fonts (loaded once; app works with system fallbacks if offline) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#128218;</text></svg>" />
</head>
<body>
  <!-- Skip link for accessibility -->
  <a href="#app" class="skip-link">Skip to content</a>

  <!-- Top navigation bar -->
  <header class="site-header" id="siteHeader">
    <div class="header-inner">
      <button class="brand" data-nav="landing" aria-label="Go to home page">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 40 40" width="34" height="34"><use href="#icon-logo"></use></svg>
        </span>
        <span class="brand-text">
          <strong>M.1 English Mastery</strong>
          <small>Bright EngMath</small>
        </span>
      </button>

      <nav class="main-nav" aria-label="Main navigation">
        <button class="nav-link" data-nav="dashboard">Dashboard</button>
        <button class="nav-link" data-nav="sets">Test Sets</button>
        <button class="nav-link" data-nav="tips">Study Tips</button>
      </nav>

      <button class="hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- Main application root -->
  <main id="app" tabindex="-1"></main>

  <!-- Global toast / confetti layer -->
  <div id="toastLayer" class="toast-layer" aria-live="polite" aria-atomic="true"></div>
  <canvas id="confettiCanvas" class="confetti-canvas" aria-hidden="true"></canvas>

  <!-- Modal container -->
  <div id="modalRoot"></div>

  <!-- ============ SVG icon sprite ============ -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <symbol id="icon-logo" viewBox="0 0 40 40">
        <rect x="5" y="7" width="30" height="26" rx="4" fill="currentColor" opacity="0.15"/>
        <path d="M20 9c-3-2-8-2-11 0v20c3-2 8-2 11 0 3-2 8-2 11 0V9c-3-2-8-2-11 0z" fill="currentColor"/>
        <path d="M20 9v20" stroke="#fff" stroke-width="1.5"/>
        <path d="M24 4l1.4 3 3 1.4-3 1.4L24 13l-1.4-3.2-3-1.4 3-1.4z" fill="#f59e0b"/>
      </symbol>
      <symbol id="icon-grammar" viewBox="0 0 24 24"><path fill="currentColor" d="M5 4h14a1 1 0 011 1v14a1 1 0 01-1 1H5a1 1 0 01-1-1V5a1 1 0 011-1zm2 4v2h10V8H7zm0 4v2h7v-2H7z"/></symbol>
      <symbol id="icon-vocab" viewBox="0 0 24 24"><path fill="currentColor" d="M4 5a2 2 0 012-2h9l5 5v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm10 1v3h3l-3-3z"/></symbol>
      <symbol id="icon-chat" viewBox="0 0 24 24"><path fill="currentColor" d="M4 4h16a2 2 0 012 2v9a2 2 0 01-2 2H9l-5 4v-4a2 2 0 01-2-2V6a2 2 0 012-2z"/></symbol>
      <symbol id="icon-cloze" viewBox="0 0 24 24"><path fill="currentColor" d="M3 5h18v3H3zm0 5h12v3H3zm0 5h18v3H3z"/></symbol>
      <symbol id="icon-reading" viewBox="0 0 24 24"><path fill="currentColor" d="M12 6c-2.5-1.7-6-1.7-8.5 0v12c2.5-1.7 6-1.7 8.5 0 2.5-1.7 6-1.7 8.5 0V6c-2.5-1.7-6-1.7-8.5 0z"/></symbol>
      <symbol id="icon-star" viewBox="0 0 24 24"><path fill="currentColor" d="M12 2l2.9 6.3 6.9.8-5.1 4.7 1.4 6.8L12 17.9 5.9 21.4l1.4-6.8L2.2 9.9l6.9-.8z"/></symbol>
      <symbol id="icon-trophy" viewBox="0 0 24 24"><path fill="currentColor" d="M6 3h12v2h3v3a4 4 0 01-4 4h-.4A6 6 0 0113 18.9V21h3v2H8v-2h3v-2.1A6 6 0 017.4 12H7a4 4 0 01-4-4V5h3V3zm0 4H5v1a2 2 0 002 2V7zm12 0v3a2 2 0 002-2V7h-2z"/></symbol>
      <symbol id="icon-clock" viewBox="0 0 24 24"><path fill="currentColor" d="M12 2a10 10 0 100 20 10 10 0 000-20zm1 5h-2v6l5 3 1-1.7-4-2.3z"/></symbol>
      <symbol id="icon-flag" viewBox="0 0 24 24"><path fill="currentColor" d="M6 3v18H4V3zm2 1h11l-2 4 2 4H8z"/></symbol>
      <symbol id="icon-check" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></symbol>
      <symbol id="icon-lightbulb" viewBox="0 0 24 24"><path fill="currentColor" d="M9 21h6v-1H9v1zm3-19a7 7 0 00-4 12.7V17h8v-2.3A7 7 0 0012 2z"/></symbol>
      <symbol id="icon-target" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-width="2" d="M12 3a9 9 0 100 18 9 9 0 000-18zm0 4a5 5 0 100 10 5 5 0 000-10zm0 4a1 1 0 100 2 1 1 0 000-2z"/></symbol>
      <symbol id="icon-teacher" viewBox="0 0 24 24"><path fill="currentColor" d="M3 5h18v11H3zm2 2v7h14V7zm-2 12h18v2H3z"/></symbol>
    </defs>
  </svg>

  <!-- ============ Data (questions stored separately from UI) ============ -->
  <script src="data/meta.js"></script>
  <script src="data/set1.js"></script>
  <script src="data/set2.js"></script>
  <script src="data/set3.js"></script>
  <script src="data/set4.js"></script>
  <script src="data/set5.js"></script>
  <script src="data/set6.js"></script>
  <script src="data/set7.js"></script>

  <!-- ============ Application logic ============ -->
  <script src="app.js"></script>
</body>
</html>
